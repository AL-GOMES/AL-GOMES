<style id="shell-override">
  .topbar{position:relative!important;top:auto!important}
  .topbar .topbar-right{display:none!important}
  .topbar .topbar-left>a[href]{display:none!important}
  .topbar .topbar-left>.topbar-sep:first-of-type{display:none!important}
  body{padding-top:0!important;margin-top:0!important}
  /* topbar repassé en flux (relative) ci-dessus : le contenu ne doit plus
     réserver sa hauteur (48px) en double → margin-top 160-48 = 112px */
  .content{margin-top:112px!important}
</style>

<title>Calculs Individuels — ENEDIS</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:13px}
body{min-height:100vh;background:#14161e;color:rgba(236,239,246,0.90);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px),
  repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px);background-size:4px 4px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 70% at 50% 30%,transparent 0%,rgba(10,12,20,0.55) 100%)}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:linear-gradient(180deg,rgba(20,22,30,0.92) 0%,rgba(20,22,30,0.75) 100%);border-bottom:1px solid rgba(104,118,156,0.10);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-center{display:flex;align-items:center;gap:16px}
.btn-top{display:flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(104,118,156,0.25);border-radius:6px;
  background:rgba(62,76,112,0.08);color:rgba(208,217,233,0.85);font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease;text-decoration:none}
.btn-top:hover{background:rgba(62,76,112,0.20);border-color:rgba(104,118,156,0.45);color:#EDF0F7}
.btn-top svg{width:14px;height:14px;opacity:0.7}
.topbar-sep{width:1px;height:18px;background:rgba(104,118,156,0.15)}
.topbar-title{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:600;color:rgba(236,239,246,0.9);letter-spacing:1px}
.topbar-clock{display:flex;align-items:center;gap:20px;font-family:'Segoe UI',system-ui,sans-serif;color:rgba(208,217,233,0.6);font-size:13px;letter-spacing:0.8px}
.topbar-time{font-size:15px;font-weight:500;color:rgba(236,239,246,0.85);font-variant-numeric:tabular-nums;letter-spacing:1.5px}
.topbar-date{font-size:12.5px;color:rgba(190,199,219,0.50);letter-spacing:1px;text-transform:uppercase}
.topbar-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge-purple{background:rgba(62,76,112,0.15);color:rgba(150,165,200,0.85);border:1px solid rgba(104,118,156,0.20)}
.badge-count{background:rgba(62,76,112,0.25);color:rgba(208,217,233,0.90);border:1px solid rgba(104,118,156,0.30)}

.tabs{position:fixed;top:98px;left:0;right:0;z-index:99;display:flex;gap:0;padding:0 12px;height:62px;align-items:stretch;
  background:linear-gradient(180deg,rgba(20,22,30,0.92),rgba(20,22,30,0.88));border-bottom:1px solid rgba(104,118,156,0.18);
  backdrop-filter:blur(12px)}
.tab{padding:0 18px;display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;letter-spacing:0.4px;
  color:rgba(190,199,219,0.50);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:inherit;transition:all 0.25s;text-align:left;text-transform:none;position:relative}
.tab:hover{color:rgba(236,239,246,0.90);background:rgba(62,76,112,0.06)}
.tab.active{color:#EDF0F7;border-bottom-color:#7E7BCE;background:linear-gradient(180deg,rgba(62,76,112,0.10) 0%,transparent 100%)}
.tab-cfg{margin-left:auto;align-self:center;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;
  border:1px solid rgba(139,134,210,0.30);background:rgba(139,134,210,0.10);color:#C7BEF6;font-family:inherit;font-size:11.5px;font-weight:600;
  letter-spacing:0.3px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.tab-cfg:hover{background:rgba(139,134,210,0.18);border-color:rgba(139,134,210,0.5);color:#DFDBFF}
.tab-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:rgba(62,76,112,0.20);color:rgba(150,165,200,0.85);
  border:1px solid rgba(104,118,156,0.30);border-radius:50%;font-family:'Courier New',monospace;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:0}
.tab.active .tab-num{background:#7E7BCE;color:#fff;border-color:#7E7BCE;box-shadow:0 2px 6px rgba(104,118,156,0.40)}
.tab-ic{font-size:16px;flex-shrink:0}
.tab-lbl{font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;font-weight:700;letter-spacing:0.3px;line-height:1.2;display:flex;flex-direction:column}
.tab-lbl small{font-size:10px;font-weight:500;color:rgba(190,199,219,0.55);letter-spacing:0.2px;text-transform:none}
.tab.active .tab-lbl small{color:rgba(208,217,233,0.65)}

/* Toggle de mode (Calcul complet / C1 seul) */
.scope-toggle{display:inline-flex;border:1px solid rgba(104,118,156,0.35);border-radius:8px;overflow:hidden;background:rgba(29,33,48,0.65)}
.scope-btn{padding:7px 16px;font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;font-weight:600;letter-spacing:0.4px;
  background:none;border:none;color:rgba(190,199,219,0.65);cursor:pointer;transition:all 0.2s;font-family:inherit;white-space:nowrap}
.scope-btn:hover{color:rgba(236,239,246,0.95);background:rgba(62,76,112,0.10)}
.scope-btn.on{background:linear-gradient(180deg,rgba(104,118,156,0.40),rgba(62,76,112,0.25));color:#fff;font-weight:700;box-shadow:inset 0 0 0 1px rgba(150,165,200,0.50),0 2px 6px rgba(104,118,156,0.20)}

/* Ligne comptage : couleur distinctive + cellule fusionnée */
tr.row-compt td.bat,tr.row-compt td.fl{background:rgba(0,176,240,0.06)}
tr.row-compt:hover td{background:rgba(0,176,240,0.05)}
tr.row-compt td[colspan]{background:rgba(0,176,240,0.04)}
.compt-cell{display:flex;align-items:center;gap:10px;padding:2px 6px}
.compt-cell input[type="text"]{flex:1;min-width:180px;text-align:left;font-size:12.5px;padding:6px 12px;font-weight:600;
  background:rgba(0,176,240,0.08);border:1px solid rgba(0,176,240,0.30);color:#EDF0F7}
.compt-cell input[type="text"]:focus{border-color:rgba(0,176,240,0.65);background:rgba(0,176,240,0.14)}
.compt-cell input[type="text"]::placeholder{color:rgba(180,210,235,0.40);font-weight:400;font-style:italic}
.compt-cell .sel{font-weight:700;color:#7BC8FF;background:rgba(0,176,240,0.10);border-color:rgba(0,176,240,0.30);min-width:88px;font-size:12.5px}
.compt-cell .compt-tri{padding:4px 10px;font-size:10.5px;letter-spacing:0.5px;background:rgba(0,176,240,0.16);color:#7BC8FF;border-color:rgba(0,176,240,0.35)}

/* Encart d'intro en haut de chaque onglet */
.intro{position:relative;display:flex;align-items:flex-start;gap:14px;padding:14px 18px;margin-bottom:18px;border-radius:10px;
  border:1px solid rgba(104,118,156,0.20);background:linear-gradient(165deg,rgba(62,76,112,0.10) 0%,rgba(29,33,48,0.5) 100%)}
.intro-num{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7E7BCE;color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:800;box-shadow:0 3px 8px rgba(104,118,156,0.40)}
.intro-txt{flex:1;font-size:12.5px;color:rgba(236,239,246,0.85);line-height:1.5}
.intro-txt b{color:#C7BEF6;font-weight:700}
.intro-txt code{background:rgba(62,76,112,0.18);padding:1px 7px;border-radius:4px;color:#C7BEF6;font-family:'Courier New',monospace;font-size:11px}
.intro-h{font-family:'Segoe UI',system-ui,sans-serif;font-size:13.5px;font-weight:700;color:#EDF0F7;letter-spacing:0.4px;margin-bottom:4px}

.content{position:relative;z-index:1;margin-top:160px;padding:20px 24px 60px}

/* Barre de mode (juste sous le bandeau du haut) */
.mode-bar{position:fixed;top:48px;left:0;right:0;z-index:99;display:flex;align-items:center;gap:14px;padding:10px 24px;height:50px;flex-wrap:wrap;overflow:hidden;
  background:linear-gradient(180deg,rgba(20,22,30,0.94),rgba(20,22,30,0.85));border-bottom:1px solid rgba(104,118,156,0.15);
  backdrop-filter:blur(10px)}
.mode-lbl{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:rgba(150,165,200,0.75)}
.mode-help{flex:1;font-size:11px;color:rgba(190,199,219,0.55);font-style:italic;letter-spacing:0.2px;min-width:200px}
.sheet{display:none;animation:shIn .3s ease}.sheet.active{display:block}
@keyframes shIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.card{position:relative;border-radius:10px;border:1px solid rgba(104,118,156,0.12);
  background:linear-gradient(165deg,rgba(29,33,48,0.85) 0%,rgba(20,22,30,0.92) 100%);margin-bottom:18px;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.010) 1px,rgba(255,255,255,0.010) 2px),
  repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.010) 1px,rgba(255,255,255,0.010) 2px);background-size:4px 4px}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(104,118,156,0.18),transparent);pointer-events:none}
.card-h{position:relative;padding:14px 20px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(104,118,156,0.08);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(208,217,233,0.75)}
.card-h .ic{width:30px;height:30px;border-radius:7px;background:rgba(62,76,112,0.15);border:1px solid rgba(104,118,156,0.15);
  display:flex;align-items:center;justify-content:center;font-size:14px}
.card-h .rt{margin-left:auto;display:flex;align-items:center;gap:8px}
.card-b{position:relative;padding:14px 18px}

table{width:100%;border-collapse:collapse}
th{padding:8px 6px;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;
  color:rgba(150,165,200,0.70);text-align:center;border-bottom:1px solid rgba(104,118,156,0.12);background:rgba(62,76,112,0.06);white-space:nowrap}
td{padding:6px 6px;text-align:center;border-bottom:1px solid rgba(104,118,156,0.06);font-size:12px;
  color:rgba(236,239,246,0.80);font-variant-numeric:tabular-nums}
tr:hover td{background:rgba(62,76,112,0.04)}
td.L{text-align:left}
td.bat{font-weight:700;color:#9BA6DB;letter-spacing:0.5px}
td.fl{font-weight:700;color:#9BA6DB;letter-spacing:1px}
td.fm{color:rgba(150,165,200,0.95);font-weight:600}
td.sx{color:#C2BAF6;font-weight:700}
td.vu{color:rgba(200,180,230,0.85);font-family:'Courier New',monospace;font-size:11.5px}
td.ok{color:#5FE09A;font-weight:600}
td.warn{color:#FFB86C;font-weight:600}
td.bad{color:#FF6B6B;font-weight:700}
tr.tot td{background:rgba(62,76,112,0.10);border-top:1px solid rgba(104,118,156,0.20);font-weight:700;color:rgba(240,243,250,0.95)}
tr.fsep td{border-top:2px solid rgba(104,118,156,0.35);padding-top:9px}
/* Couleur de fond propre à chaque REMBT (étapes 2 & 3) + séparateur de groupe */
tr.rb-start td{border-top:3px solid rgba(140,150,225,0.65)}
tr.rb-c0 td{background:rgba(104,118,156,0.16)}  tr.rb-c0:hover td{background:rgba(104,118,156,0.22)}
tr.rb-c1 td{background:rgba(0,176,240,0.13)}   tr.rb-c1:hover td{background:rgba(0,176,240,0.19)}
tr.rb-c2 td{background:rgba(46,213,115,0.12)}  tr.rb-c2:hover td{background:rgba(46,213,115,0.18)}
tr.rb-c3 td{background:rgba(255,159,67,0.12)}  tr.rb-c3:hover td{background:rgba(255,159,67,0.18)}
tr.rb-c4 td{background:rgba(255,107,170,0.13)} tr.rb-c4:hover td{background:rgba(255,107,170,0.19)}
tr.rb-c5 td{background:rgba(91,130,230,0.15)}  tr.rb-c5:hover td{background:rgba(91,130,230,0.21)}
tr.rb-c6 td{background:rgba(0,200,180,0.12)}   tr.rb-c6:hover td{background:rgba(0,200,180,0.18)}
tr.rb-c7 td{background:rgba(230,200,80,0.11)}  tr.rb-c7:hover td{background:rgba(230,200,80,0.17)}

input[type="number"],input[type="text"]{background:rgba(29,33,48,0.80);border:1px solid rgba(104,118,156,0.18);color:rgba(236,239,246,0.90);
  font-family:inherit;font-size:12px;padding:4px 6px;border-radius:5px;text-align:center;transition:all .25s;font-variant-numeric:tabular-nums}
input:focus{outline:none;border-color:rgba(104,118,156,0.50);background:rgba(40,46,66,0.90);box-shadow:0 0 0 3px rgba(62,76,112,0.12)}
input.ns{-moz-appearance:textfield}
input.ns::-webkit-outer-spin-button,input.ns::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.ws{width:52px}input.wm{width:70px}input.wl{width:110px;text-align:left}input.wlc{width:110px;text-align:center}
select.sel{background:rgba(29,33,48,0.80);border:1px solid rgba(104,118,156,0.18);color:rgba(236,239,246,0.90);
  font-family:inherit;font-size:12px;padding:4px 6px;border-radius:5px;text-align:center;cursor:pointer;transition:all .25s;
  -webkit-appearance:none;appearance:none;min-width:50px}
select.sel:focus{outline:none;border-color:rgba(104,118,156,0.50);background:rgba(40,46,66,0.90);box-shadow:0 0 0 3px rgba(62,76,112,0.12)}
select.sel option{background:#1a1228;color:rgba(236,239,246,0.90)}

.ch{display:inline-block;padding:3px 10px;border-radius:5px;font-weight:700;font-size:11.5px;letter-spacing:.5px;white-space:nowrap}
.cp{background:rgba(62,76,112,0.20);color:#B7C0E8;border:1px solid rgba(104,118,156,0.20)}
.cg{background:rgba(46,213,115,0.10);color:#5FE09A;border:1px solid rgba(46,213,115,0.15)}
.co{background:rgba(255,159,67,0.10);color:#FFB86C;border:1px solid rgba(255,159,67,0.15)}
.cr{background:rgba(255,85,85,0.12);color:#FF6B6B;border:1px solid rgba(255,85,85,0.15)}
.cc{background:rgba(100,200,255,0.10);color:#7BC8FF;border:1px solid rgba(100,200,255,0.12)}

.ban{padding:14px 20px;border-radius:8px;margin:14px 0;font-weight:700;font-size:13px;text-align:center;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.ban-ok{background:rgba(46,213,115,0.08);color:#5FE09A;border:1px solid rgba(46,213,115,0.15)}
.ban-no{background:rgba(255,85,85,0.08);color:#FF6B6B;border:1px solid rgba(255,85,85,0.15)}
.ban-w{background:rgba(255,159,67,0.08);color:#FFB86C;border:1px solid rgba(255,159,67,0.15)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:11.5px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;border:1px solid rgba(104,118,156,0.20);background:rgba(62,76,112,0.10);color:rgba(208,217,233,0.80);
  font-family:inherit;transition:all .3s}
.btn:hover{background:rgba(62,76,112,0.22);border-color:rgba(104,118,156,0.40);color:#EDF0F7}
.ba{border-color:rgba(46,213,115,0.25);background:rgba(46,213,115,0.08);color:rgba(95,224,154,0.85)}
.ba:hover{background:rgba(46,213,115,0.16);color:#5FE09A}
.bd{border-color:rgba(255,85,85,0.20);color:rgba(255,107,107,0.70);background:transparent}
.bd:hover{background:rgba(255,85,85,0.08);color:#FF6B6B}
.bg_{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;align-items:center}

.rd{opacity:0;cursor:pointer;color:rgba(255,85,85,0.50);font-size:12px;background:none;border:none;padding:2px 6px;transition:opacity .2s}
tr:hover .rd{opacity:1}.rd:hover{color:#FF6B6B}

.limits-bar{display:flex;flex-wrap:wrap;align-items:center;gap:18px;padding:12px 18px;margin-bottom:14px;border-radius:8px;
  border:1px solid rgba(104,118,156,0.18);background:linear-gradient(165deg,rgba(62,76,112,0.10) 0%,rgba(29,33,48,0.5) 100%)}
.limits-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(208,217,233,0.80);padding-right:10px;border-right:1px solid rgba(104,118,156,0.18)}
.limits-field{display:flex;align-items:center;gap:7px;font-size:11.5px;color:rgba(208,217,233,0.65)}
.limits-field input{width:60px}
.limits-unit{font-size:11px;color:rgba(190,199,219,0.55);min-width:14px}
.limits-presets{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.summary-tile{background:rgba(29,33,48,0.6);border:1px solid rgba(104,118,156,0.15);border-radius:8px;padding:12px 16px}
.summary-lbl{font-size:10px;color:rgba(190,199,219,0.50);letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
.summary-val{font-size:20px;color:#EDF0F7;font-weight:700;letter-spacing:.5px;margin-top:4px;font-variant-numeric:tabular-nums}
.summary-val.green{color:#5FE09A}.summary-val.orange{color:#FFB86C}.summary-val.red{color:#FF6B6B}
.summary-sub{font-size:10px;color:rgba(190,199,219,0.40);margin-top:2px}

.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.dim-grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}}

/* ═══ REMBT cards ═══ */
.rembt-topbar{display:flex;align-items:center;gap:18px;padding:14px 18px;margin-bottom:14px;border-radius:10px;
  border:1px solid rgba(104,118,156,0.18);background:linear-gradient(165deg,rgba(62,76,112,0.10) 0%,rgba(29,33,48,0.5) 100%)}
.rembt-top-info{display:flex;flex-direction:column;gap:2px}

.cf-auto-h{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(150,165,200,0.75);margin-bottom:7px;padding-bottom:5px;border-bottom:1px dashed rgba(104,118,156,0.18)}
.cf-auto-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:rgba(208,217,233,0.70);padding:2.5px 0}
.cf-auto-row b{font-family:'Courier New',monospace;color:rgba(236,239,246,0.92);font-weight:700;font-variant-numeric:tabular-nums}
.cf-auto-row.hl{margin-top:5px;padding-top:6px;border-top:1px solid rgba(104,118,156,0.20);color:#C7BEF6;font-weight:600}
.cf-auto-row.hl b.cf-cal{color:#00B0F0;background:rgba(0,176,240,0.12);border:1px solid rgba(0,176,240,0.30);padding:2px 9px;border-radius:5px;font-size:12px}

/* ═══ CF box dans le schéma — style plan d'architecte ═══ */
.schema-cf{display:flex;flex-direction:column;align-items:center;gap:0;margin-top:0}
.schema-cf-box{background:#fff;
  border:2px solid #1a1a1a;border-radius:0;padding:7px 14px;text-align:center;min-width:200px;max-width:280px;
  font-family:'Helvetica','Arial',sans-serif;color:#1a1a1a}
.schema-cf-name{font-family:'Helvetica','Arial',sans-serif;font-size:11.5px;font-weight:700;color:#1f3864;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid #1a1a1a}
.schema-cf-meta{font-family:'Helvetica','Arial',sans-serif;font-size:10px;color:#444;letter-spacing:0.3px}
.schema-cf-chute{margin-top:3px;font-family:'Helvetica','Arial',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:0.3px}
.schema-cf-chute.ok{color:#2e6b3e}.schema-cf-chute.warn{color:#b26d24}.schema-cf-chute.bad{color:#a83232}
.schema-cable-lbl{font-family:'Helvetica','Arial',sans-serif;font-size:9.5px;color:#1a1a1a;
  background:#fff;padding:2px 8px;border-radius:0;margin:2px 0;letter-spacing:0.5px;border:1px solid #1a1a1a;text-transform:uppercase;font-weight:600}

/* ═══ SCHÉMA RÉCAPITULATIF — style PLAN HORIZONTAL ENEDIS ═══ */
.schema-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.schema-stats{grid-template-columns:repeat(2,1fr)}}
.schema-stat{background:rgba(29,33,48,0.6);border:1px solid rgba(104,118,156,0.18);border-radius:6px;padding:14px 16px;text-align:center}
.schema-stat-lbl{font-size:10px;color:rgba(190,199,219,0.55);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.schema-stat-val{font-family:'Helvetica','Arial',sans-serif;font-size:22px;font-weight:700;color:#EDF0F7;letter-spacing:0.5px;font-variant-numeric:tabular-nums}
.schema-stat-val.green{color:#5FE09A}.schema-stat-val.orange{color:#FFB86C}.schema-stat-val.red{color:#FF6B6B}
.schema-stat-sub{font-size:10px;color:rgba(190,199,219,0.40);margin-top:3px;letter-spacing:0.3px}

.schema-actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px}
.schema-empty{padding:60px 20px;text-align:center;color:rgba(190,199,219,0.55);font-size:13px}

/* Feuille de plan papier ENEDIS */
.plan-paper{
  background:
    linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px) 0 0 / 20px 20px,
    linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px) 0 0 / 20px 20px,
    #faf7ee;
  color:#1a1a1a;border:2.5px solid #1a1a1a;border-radius:2px;
  padding:46px 30px 20px;margin-bottom:18px;
  overflow-x:auto;position:relative;font-family:'Helvetica','Arial',sans-serif;
  box-shadow:0 6px 22px rgba(0,0,0,0.30)}
.plan-paper::before{
  content:attr(data-title);position:absolute;top:0;left:0;right:0;
  background:#1f3864;color:#fff;
  font-family:'Helvetica','Arial',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  padding:9px 18px;border-bottom:2.5px solid #1a1a1a;text-align:center}

/* Bloc REMBT (une "ligne" complète Réseau→CIBE + dérivations) */
.plan-cascade{display:inline-flex;align-items:center;gap:7px;margin:0 0 14px;padding:7px 13px;background:#fff;border:1.5px solid #1f3864;border-left:5px solid #1f3864;font-family:'Helvetica','Arial',sans-serif;font-size:11px;font-weight:600;color:#1f3864;letter-spacing:0.3px}
.plan-cascade b{color:#1a1a1a}
.plan-cascade b.ok{color:#2e6b3e}.plan-cascade b.warn{color:#b26d24}.plan-cascade b.bad{color:#a83232}
.plan-rembt-section{margin-bottom:30px;padding-bottom:20px;border-bottom:1.5px dashed #c2b89a}
.plan-rembt-section:last-of-type{border-bottom:none}
.plan-rembt-title{font-family:'Helvetica','Arial',sans-serif;font-size:12px;font-weight:700;color:#1f3864;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;padding:6px 12px;background:#fff;border:1.5px solid #1f3864;display:inline-block}

/* Ligne principale horizontale Réseau→CCPI→REMBT→CIBE */
.plan-line{display:flex;align-items:center;gap:0;position:relative;min-width:fit-content;margin-bottom:16px}

/* Blocs (boîtes type "armoire" double bordure ENEDIS) */
.plan-block{background:#fff;color:#1f3864;border:1.5px solid #1f3864;padding:10px 14px;text-align:center;
  font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.3;min-width:80px;white-space:nowrap;
  box-shadow:inset 0 0 0 1.5px #fff,inset 0 0 0 3px #1f3864;border-radius:0}
.plan-block-source{background:#1f3864;color:#fff;box-shadow:inset 0 0 0 1.5px #1f3864,inset 0 0 0 3px #fff,inset 0 0 0 4.5px #1f3864}

/* Segment de câble entre 2 blocs */
.plan-segment{flex:0 0 auto;min-width:140px;position:relative;height:54px;display:flex;align-items:center;justify-content:center}
.plan-seg-line{position:absolute;top:50%;left:0;right:0;height:2px;background:#1f3864;transform:translateY(-50%)}
.plan-seg-lbl{position:relative;background:#faf7ee;padding:0 7px;font-size:9.5px;font-weight:600;letter-spacing:0.4px;color:#1a1a1a;text-align:center;line-height:1.3;text-transform:none;font-family:'Helvetica','Arial',sans-serif}

/* Pastilles de connexion (points de raccordement/liaison) */
.plan-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid #1a1a1a;display:inline-block}
.plan-dot.dot-green{background:#3a9b4f}
.plan-dot.dot-orange{background:#e08a1f}
.plan-segment > .plan-dot{position:absolute;right:-6.5px;top:50%;transform:translateY(-50%);z-index:2}
.plan-dot-inline{vertical-align:middle;margin-right:4px}

/* Schéma unifilaire SVG */
.uni-wrap{overflow-x:auto;background:#fff;border:1.5px solid #1a1a1a;padding:8px;margin-bottom:8px}
.uni-svg{display:block;margin:0 auto}

/* Dérivations individuelles — chaque logement = ligne de câble horizontale */
.plan-derivations{margin-top:14px}
.plan-deriv-h{font-family:'Helvetica','Arial',sans-serif;font-size:9.5px;font-weight:700;color:#1f3864;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding:3px 8px;background:#fff;border:1px solid #1f3864;display:inline-block}

.plan-deriv{display:flex;align-items:center;gap:0;padding:8px 12px;margin-bottom:6px;background:#fff;border:1px solid #1a1a1a;border-radius:0;font-family:'Helvetica','Arial',sans-serif;font-size:11px;color:#1a1a1a;position:relative;min-width:fit-content}
.plan-deriv.ok    {border-left:5px solid #2e6b3e}
.plan-deriv.warn  {border-left:5px solid #b26d24}
.plan-deriv.bad   {border-left:5px solid #a83232;background:#fdeaea}
.plan-deriv-id{font-weight:700;color:#1f3864;font-size:12px;letter-spacing:0.6px;min-width:130px;text-transform:uppercase;padding-right:10px}
.plan-deriv-kva{font-size:9.5px;font-weight:500;color:#555;letter-spacing:0.2px;text-transform:none;margin-top:2px}
/* Tronçon de câble dans une dérivation (réutilise plan-segment) */
.plan-seg-deriv{min-width:150px;height:46px}
.plan-block-sm{min-width:54px;padding:7px 8px;font-size:9.5px;box-shadow:inset 0 0 0 1.5px #fff,inset 0 0 0 3px #1f3864}
.plan-deriv-wh{background:#fff;border:1.5px solid #1f3864;padding:4px 9px;font-size:10px;font-weight:700;letter-spacing:1px;color:#1f3864;text-transform:uppercase;text-align:center;line-height:1.2;flex-shrink:0;margin-left:2px;
  box-shadow:inset 0 0 0 1px #fff,inset 0 0 0 2px #1f3864}
.plan-deriv-wh small{font-size:9px;font-weight:600;color:#666;letter-spacing:0.3px}
.plan-deriv-house{padding:6px 12px;border:2px dashed #c00;color:#c00;font-weight:700;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;background:#fff5f5;white-space:nowrap;margin-left:6px}
.plan-deriv-pc{display:flex;flex-direction:column;align-items:flex-end;gap:1px;font-family:'Helvetica','Arial',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.2px;min-width:74px;text-align:right;margin-left:auto;padding-left:10px}
.plan-deriv-pc .pc-tot{color:#1a1a1a;font-size:14px}
.plan-deriv.ok   .plan-deriv-pc .pc-tot{color:#2e6b3e}
.plan-deriv.warn .plan-deriv-pc .pc-tot{color:#b26d24}
.plan-deriv.bad  .plan-deriv-pc .pc-tot{color:#a83232}
/* couleurs des % de chute dans les étiquettes de segment */
.plan-seg-lbl .seg-pc.ok{color:#2e6b3e}
.plan-seg-lbl .seg-pc.warn{color:#b26d24}
.plan-seg-lbl .seg-pc.bad{color:#a83232}
.plan-seg-lbl .seg-pc.vu{color:#666}
.plan-deriv.ok   .plan-deriv-pc .pc-tot{color:#2e6b3e}
.plan-deriv.warn .plan-deriv-pc .pc-tot{color:#b26d24}
.plan-deriv.bad  .plan-deriv-pc .pc-tot{color:#a83232}

/* Zones normatives (NFC 11-201 / 14-100 / 15-100) */
.plan-zones{display:flex;margin-top:24px;border:1.5px solid #1a1a1a;background:#fff;position:relative}
.plan-zone{flex:1;text-align:center;padding:7px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#1a1a1a;text-transform:uppercase;border-right:1.5px solid #1a1a1a;position:relative;background:#fff}
.plan-zone-wide{flex:2.2}
.plan-zone:last-child{border-right:none}
.plan-zone small{display:block;font-size:9px;font-weight:500;color:#666;letter-spacing:1px;margin-top:2px}
.plan-zone::before{content:'×';color:#c00;font-size:18px;font-weight:700;position:absolute;left:-2px;top:50%;transform:translate(-50%,-50%);background:#fff;padding:0 2px;line-height:1}

/* Notes */
.plan-notes{margin-top:14px;padding:6px 12px;background:#fcf5d8;border-left:3px solid #b26d24;font-size:10.5px;font-style:italic;color:#7a5500;font-family:'Helvetica','Arial',sans-serif;line-height:1.5}

/* Légende */
.plan-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;padding:10px 14px;margin-top:18px;
  border:1.5px solid #1a1a1a;background:#fff;font-family:'Helvetica','Arial',sans-serif}
.plan-leg-item{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:#1a1a1a;letter-spacing:0.4px;font-weight:600;text-transform:uppercase}
.schema-leg-swatch{width:13px;height:13px;border-radius:0;border:1.5px solid #1a1a1a;display:inline-block}
.schema-leg-swatch.ok{background:#2e6b3e}
.schema-leg-swatch.warn{background:#b26d24}
.schema-leg-swatch.bad{background:#a83232}

/* Cartouche pied de plan */
.schema-cartouche{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;border:2.5px solid #1a1a1a;background:#fff;margin-top:14px;color:#1a1a1a;font-family:'Helvetica','Arial',sans-serif}
.schema-cartouche-cell{padding:8px 12px;border-right:1.5px solid #1a1a1a;display:flex;flex-direction:column;gap:2px}
.schema-cartouche-cell:last-child{border-right:none}
.schema-cart-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#444}
.schema-cart-val{font-size:13px;font-weight:700;color:#1a1a1a;letter-spacing:0.3px}
.schema-cartouche-foot{grid-column:1/-1;border-top:1.5px solid #1a1a1a;background:#1f3864;color:#fff;
  padding:6px 12px;font-size:10.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center}
</style>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════════════
function tk(){
  const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('tT').textContent=h+':'+m+':'+s;
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('topDate').textContent=days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}
tk();setInterval(tk,1000);

// ═══════════════════════════════════════════════════════════════════════
// DATA MODEL
// Une liste partagée de logements (lgts). Chaque logement contient :
//   - bat, niv, type, lett, hall, S (surface), K (M/T)
//   - rc: { O: longueur REMBT-CIBE, P: section retenue REMBT-CIBE }
//   - ct: { O: longueur CIBE-TA,   P: section retenue CIBE-TA   }
// Plus un compteur de modules pour le dimensionnement REMBT.
// ═══════════════════════════════════════════════════════════════════════
const SECTIONS = [16, 25, 35, 50, 70, 95, 120, 150];   // 10 mm² non utilisé
const SECTIONS_CT = [16, 25, 35];   // CIBE → TA (AR2V) : plafonné à 35 mm²
const SECT_MAX_CT = 35;
// Section maxi retenue. Un LOGEMENT est plafonné à 35 mm² (HN33S33 / AR2V)
// sur les deux tronçons — il n'y a rien au-dessus. Un comptage commercial :
// ct plafonné à 35, rc (REMBT → CIBE) libre (puissances plus élevées).
function maxSection(l, side){
  if(!l || l.kind !== 'compt') return SECT_MAX_CT;
  return side === 'ct' ? SECT_MAX_CT : null;
}
const PHASES = ['M','T'];

const MODULES = [
  { k:'RAC240',  n:'RAC 240',        l:'Module RAC 240 (3Ph+1N) — arrivée réseau 240² / N 150²  ·  ENEDIS 67.71.700', p:2 },
  { k:'RAC150',  n:'RAC 150 (150²)', l:'Module RAC 150 (3Ph+1N) — câble 150²  ·  ENEDIS 67.71.702',                 p:2 },
  { k:'RAC150b', n:'RAC 150 (≤95²)', l:'Module RAC 150 (3Ph+1N) — câble 50 à 95²  ·  ENEDIS 67.71.702',             p:1 },
  { k:'RAC35',   n:'RAC 35',         l:'Module RAC 35 (3Ph+1N) — 3 départs tri, câble 10 à 35²  ·  ENEDIS 67.71.704', p:1 },
  { k:'BR60T',   n:'BR 60T',         l:'Module BR 60T (3Ph+1N) — départ tri protégé 60 A  ·  ENEDIS 67.71.708',     p:1 },
  { k:'BR60M',   n:'BR 60M',         l:'Module BR 60M (1Ph+1N) — départ mono protégé 60 A  ·  ENEDIS 67.71.706',    p:1 },
  { k:'RCP400',  n:'RCP 400',        l:'Module RCP 400 — coupure 400 A / protection 200 A  ·  réf 0540879',          p:4 },
];

function defaultLgts(){
  return [
    { bat:'A', niv:'RDC', type:'ST', lett:'1P1', hall:14, S:30.16, K:'M', rc:{O:5,P:35}, ct:{O:4,P:35} },
    { bat:'A', niv:'RDC', type:'3P', lett:'3P1', hall:14, S:67.21, K:'M', rc:{O:5,P:35}, ct:{O:7,P:35} },
    { bat:'A', niv:'RDC', type:'3P', lett:'3P2', hall:12, S:30,    K:'M', rc:{O:5,P:35}, ct:{O:3,P:35} },
    { bat:'A', niv:'RDC', type:'3P', lett:'3P3', hall:12, S:63.57, K:'M', rc:{O:5,P:35}, ct:{O:3,P:35} },
    { bat:'A', niv:'RDC', type:'2P', lett:'2P1', hall:10, S:50.21, K:'M', rc:{O:5,P:35}, ct:{O:5,P:35} },
  ];
}

function emptyDim(){
  const d={};MODULES.forEach(m=>d[m.k]=0);return d;
}

// ─── REMBT helpers ───────────────────────────────────────────────
// Tailles standard de support G3 REMMO/REMBT (plages, entre-axe 50 mm)
//   REMMO 300 →  6 plages (ENEDIS 67.70.112)
//   REMMO 450 →  9 plages (ENEDIS 67.70.122)
//   REMMO 600 → 12 plages (ENEDIS 67.70.132) — option module RCP 400 (réf 0540879)
// Règle « petit collectif » NF C 14-100 §10 : 6 dérivations maxi par REMBT.
// Au-delà → grand collectif → diviser en plusieurs REMBT (ou utiliser RCP400).
const REMBT_SIZES = [6, 9, 12];
const REMBT_MAX_LGTS = 6;

function newRembtId(existing){
  const used = new Set((existing||[]).map(r=>r.id));
  let i = 1; while(used.has('r'+i)) i++;
  return 'r'+i;
}
function newRembt(name, existing){
  const id = newRembtId(existing);
  return { id, name: name || ('REMBT '+id.slice(1)), notes:'', parentId:null, dim:emptyDim(),
           cf: defaultCF(), link: defaultLink(), manual:false };
}
// Coffret de façade (CCPI) — entre ENEDIS et un REMBT racine.
// Inactif par défaut pour préserver la compat ascendante.
// Le calibre disj. et la phase sont calculés automatiquement à partir
// des logements rattachés (foisonnement NF C 14-100).
function defaultCF(){
  return { active:false, name:'CF', long:5, section:35 };
}
// Câble de liaison cascade (REMBT parent → ce REMBT), pour les REMBT non racine.
function defaultLink(){
  return { long:5, section:50 };
}
// Configuration issue de l'assistant (Étape 1) : réglages projet uniquement
// (périmètre via CI.scope, CCPI via le REMBT racine). Ne stocke ici que la
// phase pré-sélectionnée des nouveaux logements et la présence de commerces.
function defaultSetup(){
  return { done:false, defPhase:'M', hasCommerce:false };
}
function normSetup(x){
  if(!x || typeof x !== 'object') return defaultSetup();
  return {
    done: !!x.done,
    defPhase: x.defPhase === 'T' ? 'T' : 'M',
    hasCommerce: !!x.hasCommerce
  };
}

// Coefficients de foisonnement NF C 14-100 (puissance simultanée)
const FOIS = [
  { upTo: 1,  k: 1.00 },
  { upTo: 4,  k: 1.00 },
  { upTo: 9,  k: 0.78 },
  { upTo: 14, k: 0.63 },
  { upTo: 19, k: 0.53 },
  { upTo: 24, k: 0.49 },
  { upTo: 29, k: 0.46 },
  { upTo: 34, k: 0.44 },
  { upTo: 39, k: 0.42 },
  { upTo: 49, k: 0.41 },
  { upTo: Infinity, k: 0.38 }
];
function foisK(n){
  for(const r of FOIS) if(n <= r.upTo) return r.k;
  return 0.38;
}
// Calibres standard ENEDIS pour disjoncteur de branchement (collectif)
const STD_CAL = [30, 45, 60, 90, 125, 160, 200, 250, 400];

// Calibre automatique (tri 400 V) d'un câble alimentant un REMBT : il porte
// la charge foisonnée de TOUT le sous-arbre aval (le REMBT + ses cascades).
//   I = P_foisonnée × 1000 / (U × √3)
function rembtSubtreeIds(rid){
  const out = [rid];
  CI.rembts.forEach(r => { if(r.parentId === rid) out.push(...rembtSubtreeIds(r.id)); });
  return out;
}
function rembtAutoCalibre(rid){
  const ids = new Set(rembtSubtreeIds(rid));
  const lgts = CI.lgts.filter(l => ids.has(l.rembtId));
  const sumP = lgts.reduce((s, l) => s + (lgtKva(l) || 0), 0);
  const k = foisK(lgts.length);
  const Pfois = sumP * k;
  const Itri = (Pfois * 1000) / (400 * Math.sqrt(3));
  const cal = STD_CAL.find(c => c >= Itri) || 400;
  return { nLgts:lgts.length, sumP, k, Pfois, Itri, cal };
}

// Chute de tension sur le câble Coffret façade → REMBT (formule ALU, tri 400 V).
// La chute est calculée au COURANT D'EMPLOI foisonné (Itri), pas au calibre
// normalisé du dispositif de protection (NF C 14-100, conforme Elium).
function cfChute(rembt){
  if(!rembt || !rembt.cf || !rembt.cf.active) return null;
  const L = parseFloat(rembt.cf.long), S = parseFloat(rembt.cf.section);
  if(!L || !S) return null;
  const a = rembtAutoCalibre(rembt.id);
  if(!a.Itri) return null;
  const vu = (0.037 * L * a.Itri) / S;   // tri : ΔU = ρ × L × I / S
  return { vu, pc: vu / 2.3, calibre: a.cal, sumP: a.sumP, Pfois: a.Pfois, k: a.k, Itri: a.Itri, nLgts: a.nLgts };
}
// Chute de tension sur le câble de liaison cascade : REMBT parent → ce REMBT.
// Le câble porte la charge foisonnée du sous-arbre aval de ce REMBT.
function linkChute(rembt){
  if(!rembt || rembt.parentId == null || !rembt.link) return null;
  const L = parseFloat(rembt.link.long), S = parseFloat(rembt.link.section);
  if(!L || !S) return null;
  const a = rembtAutoCalibre(rembt.id);
  if(!a.Itri) return null;
  const vu = (0.037 * L * a.Itri) / S;   // courant d'emploi foisonné (Itri)
  return { vu, pc: vu / 2.3, calibre: a.cal, sumP: a.sumP, Pfois: a.Pfois, k: a.k, Itri: a.Itri, nLgts: a.nLgts };
}
// Bloc visuel « chute de tension » d'un câble amont (CCPI ou liaison cascade) :
// jauge colorée vs limite + détail (P foisonnée, courant, longueur, section).
function chuteResult(c, lbl, long, section){
  if(!c) return '';
  const lim = CI.limT;
  const cls = c.pc > lim ? 'bad' : (c.pc > lim*0.8 ? 'warn' : 'ok');
  const col = cls === 'bad' ? '#FF6B6B' : cls === 'warn' ? '#FFB86C' : '#5FE09A';
  const pct = Math.max(3, Math.min((c.pc / lim) * 100, 100));
  return `<div class="cf-res cf-${cls}">
    <div class="cf-res-h"><span class="cf-res-lbl">Chute ${lbl}</span>
      <span class="cf-res-pc">${c.pc.toFixed(2)} %<small> / ${lim.toFixed(2)} % maxi</small></span></div>
    <div class="cf-res-bar"><i style="width:${pct.toFixed(0)}%;background:${col}"></i></div>
    <div class="cf-res-meta">
      <span>Puissance foisonnée<b>${c.Pfois.toFixed(1)} kVA</b></span>
      <span>Longueur câble<b>${long||'?'} m</b></span>
      <span>Section ALU<b>${section||'?'} mm²</b></span>
    </div>
  </div>`;
}
function defaultRembts(){ return [ newRembt('REMBT 1', []) ]; }

// Plages occupées par un REMBT (somme places × quantité)
function rembtPlages(r){
  if(!r || !r.dim) return 0;
  let p = 0;
  MODULES.forEach(m => { p += (r.dim[m.k] || 0) * m.p; });
  return p;
}
// Renvoie la taille standard de REMBT (6/9/12) qui accueille N plages,
// ou null si > 12.
function rembtSuggest(plages){
  for(const sz of REMBT_SIZES) if(plages <= sz) return sz;
  return null;
}
// Compte modules suggérés par les logements assignés à ce REMBT.
//  - 1× RAC 240 (arrivée réseau) si au moins 1 logement → 2 plages
//  - 1× BR60M par logement mono
//  - 1× BR60T par logement tri
// (l'utilisateur peut compléter avec RAC150 / RAC35 / RCP400 manuellement)
function autoModules(rembtId){
  const lgts = CI.lgts.filter(l => l.rembtId === rembtId);
  const mono = lgts.filter(l => lgtPhase(l) === 'M').length;
  const tri  = lgts.filter(l => lgtPhase(l) === 'T').length;
  // Départs réseau RCP 400 : un par REMBT enfant alimenté en cascade
  const children = CI.rembts.filter(r => r.parentId === rembtId).length;
  const dim = emptyDim();
  if(lgts.length > 0) dim.RAC240 = 1;
  dim.BR60M = mono;
  dim.BR60T = tri;
  if(children > 0) dim.RCP400 = children;
  return dim;
}

let CI = (function(){
  const r = defaultRembts();
  return {
    P: '',
    lgts: defaultLgts().map(l => ({...l, rembtId: r[0].id, kind:'lgt', kva:''})),
    rembts: r,
    limT: 1,    // limite par tronçon (%) — NF C 14-100 défaut 1 %, Excel d'origine 1,15 %
    limTot: 2,  // limite totale C1+C2 (%) — NF C 14-100
    scope: 'full', // 'full' = REMBT→CIBE→TA  ·  'c1only' = CIBE→TA seul
    setup: defaultSetup(),
    ts: 0
  };
})();

let active = 'dim';
// Regroupement des lignes dans les tableaux de chutes : 'niv' (niveau) ou 'rembt'
let grpBy = 'niv';
function setGrpBy(m){ grpBy = (m === 'rembt') ? 'rembt' : 'niv'; R(); }

// ═══════════════════════════════════════════════════════════════════════
// PERSISTENCE — localStorage (key = "algomes_calculs_individuels_v1")
// ═══════════════════════════════════════════════════════════════════════
const SKEY = 'algomes_calculs_individuels_v1';
let _saveTimer = null;
function save(){
  CI.ts = Date.now();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(SKEY, JSON.stringify(CI)); }catch(e){ console.warn('Save failed', e); }
  }, 300);
}
function load(){
  try{
    const raw = localStorage.getItem(SKEY);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(d && typeof d === 'object'){
      const m = migrate(d);
      CI.P = m.P;
      CI.lgts = m.lgts;
      CI.rembts = m.rembts;
      CI.limT = m.limT;
      CI.limTot = m.limTot;
      CI.scope = m.scope;
      CI.setup = m.setup;
      CI.ts = m.ts;
      return true;
    }
  }catch(e){ console.warn('Load failed', e); }
  return false;
}
function normLgt(x, defaultRembtId){
  const isCompt = x.kind === 'compt';
  // Section : mini 16 mm² (le 10 mm² n'est plus utilisé) ; logement plafonné
  // à 35 mm² sur les deux tronçons.
  const secP = (s, capTo) => { s = Math.max(Number(s) || 16, 16); return capTo ? Math.min(s, capTo) : s; };
  return {
    bat: x.bat || '',
    niv: x.niv || 'RDC',
    type: x.type || '',
    lett: x.lett || '',
    hall: x.hall === '' || x.hall == null ? '' : Number(x.hall),
    S:    x.S    === '' || x.S    == null ? '' : Number(x.S),
    K:    x.K === 'T' ? 'T' : 'M',
    kind: isCompt ? 'compt' : 'lgt',
    kva:  x.kva === '' || x.kva == null ? '' : Number(x.kva),
    rc:   { O: (x.rc && x.rc.O!=null) ? Number(x.rc.O) : 5,  P: secP((x.rc && x.rc.P) ? Number(x.rc.P) : 35, isCompt ? null : 35) },
    ct:   { O: (x.ct && x.ct.O!=null) ? Number(x.ct.O) : 5,  P: secP((x.ct && x.ct.P) ? Number(x.ct.P) : 35, 35) },
    mat:  x.mat === 'cu' ? 'cu' : 'alu',
    rembtId: x.rembtId || defaultRembtId || null,
    rembtPin: !!x.rembtPin
  };
}
function normRembt(x){
  // Migration : ancienne clé 'RA240' → 'RAC240' (renommage conforme catalogue)
  const dimSrc = Object.assign({}, x.dim || {});
  if(dimSrc.RA240 != null){ dimSrc.RAC240 = (dimSrc.RAC240 || 0) + dimSrc.RA240; delete dimSrc.RA240; }
  return {
    id: x.id || 'r1',
    name: x.name || 'REMBT',
    notes: x.notes || '',
    parentId: x.parentId || null,
    dim: Object.assign(emptyDim(), dimSrc),
    cf: Object.assign(defaultCF(), x.cf || {}),
    link: Object.assign(defaultLink(), x.link || {}),
    manual: !!x.manual
  };
}
// Migration : ancien format {P, lgts, dim, limT, limTot} → {P, lgts(+rembtId), rembts[], …}
function migrate(d){
  const out = {
    P: d.P || '',
    limT:   (typeof d.limT   === 'number' && d.limT   > 0) ? d.limT   : 1,
    limTot: (typeof d.limTot === 'number' && d.limTot > 0) ? d.limTot : 2,
    scope: (d.scope === 'c1only' || d.scope === 'noCibe') ? d.scope : 'full',
    // Projet existant sans config d'assistant → considéré déjà configuré
    // (on n'affiche pas l'assistant aux dossiers déjà saisis).
    setup: d.setup ? normSetup(d.setup) : Object.assign(defaultSetup(), { done:true }),
    ts: d.ts || 0
  };
  if(Array.isArray(d.rembts) && d.rembts.length){
    out.rembts = d.rembts.map(normRembt);
  } else {
    out.rembts = defaultRembts();
    if(d.dim) out.rembts[0].dim = Object.assign(emptyDim(), d.dim);
  }
  const validIds = new Set(out.rembts.map(r=>r.id));
  const fallbackId = out.rembts[0].id;
  const lgtsSrc = Array.isArray(d.lgts) && d.lgts.length ? d.lgts : defaultLgts();
  out.lgts = lgtsSrc.map(l => {
    const n = normLgt(l, fallbackId);
    if(!validIds.has(n.rembtId)) n.rembtId = fallbackId;
    return n;
  });
  // Garde-fou : si parent inconnu, on l'enlève
  out.rembts.forEach(r => {
    if(r.parentId && !validIds.has(r.parentId)) r.parentId = null;
  });
  return out;
}

// ═══════════════════════════════════════════════════════════════════════
// FORMULAS (extraites scrupuleusement du fichier ETUDE_ENEDIS_INDIV.xlsm)
// ═══════════════════════════════════════════════════════════════════════
// Puissance logement selon surface F (m²) — Excel: IF(F<35,6,IF(AND(F>=35,F<100),9,IF(F>=100,12,"")))
function pwLgt(s){
  s = parseFloat(s);
  if(isNaN(s) || s <= 0) return null;
  if(s < 35) return 6;
  if(s < 100) return 9;
  return 12;
}
// Disjoncteur EDF — Excel: IF(G=1,"10/30",IF(H=1,"15/45",IF(I=1,"30/60",IF(J=1,"60/90",""))))
// avec H=1 si G ∈ {6,9} et I=1 si G=12
function disjEDF(p){
  if(p === 6 || p === 9) return '15/45';
  if(p === 12) return '30/60';
  return '';
}
// Calibre disj. (A) — Excel: IF(G=1,30,IF(H=1,45,IF(I=1,60,IF(J=1,90,""))))
function calibreA(p){
  if(p === 6 || p === 9) return 45;
  if(p === 12) return 60;
  return null;
}
// Résistivités (Ω·mm²/m) : alu = 0,037 (valeur projet) ; cuivre = 0,0225 (NF C 15-100).
const RHO_ALU = 0.037, RHO_CU = 0.0225;
// Tronçon final vers le tableau abonné : rc (REMBT→TA) en mode sans CIBE,
// ct (CIBE→TA) en mode complet / C1 seul.
function finalSide(){ return CI.scope === 'noCibe' ? 'rc' : 'ct'; }
// Matériau du câble final d'un logement : 'cu' (cuivre) ou 'alu' (défaut).
function lgtMat(l){ return (l && l.mat === 'cu') ? 'cu' : 'alu'; }
// Résistivité d'un tronçon : seul le tronçon final suit le matériau choisi pour
// le logement ; les autres tronçons (C2, amont) restent en alu.
function rhoFor(l, side){
  return (side === finalSide() && lgtMat(l) === 'cu') ? RHO_CU : RHO_ALU;
}
// Chute de tension VU en volts. rho = résistivité du conducteur (défaut alu).
// Excel (alu): IF(K="M", (0.037*2*O*N)/P, (0.037*O*N)/P)
function chuteVU(K, O, N, P, rho){
  O = parseFloat(O); N = parseFloat(N); P = parseFloat(P);
  if(!O || !N || !P) return null;
  rho = rho || RHO_ALU;
  return K === 'M' ? (rho * 2 * O * N) / P : (rho * O * N) / P;
}
// % chute = VU / 2.3
function chutePc(vu){ return vu == null ? null : vu / 2.3; }

// Section recommandée — chute en ALU réel (0,037 / 2,3) ≤ limite par tronçon
// configurable (CI.limT, défaut 1 % NF C 14-100). Section mini = 16 mm² (le
// 10 mm² n'est pas utilisé).
function sectionMin(K, O, N, p, maxSect, rho){
  O = parseFloat(O); N = parseFloat(N);
  if(!O || !N) return null;
  rho = rho || RHO_ALU;
  let cands = [16,25,35,50];
  if(maxSect) cands = cands.filter(s => s <= maxSect);
  for(const s of cands){
    const vu = K === 'M' ? (rho * 2 * O * N) / s : (rho * O * N) / s;
    const pc = vu / 2.3;
    if(pc <= CI.limT) return s;
  }
  return null;
}

// Compute everything for one logement on one side
// ─── Tarif Bleu tri (comptages commerciaux jusqu'à 36 kVA) ────────
// Standard ENEDIS — disjoncteur de branchement par puissance souscrite tri.
const KVA_TB_TRI = [6, 9, 12, 15, 18, 24, 30, 36];
const CALIBRE_TB_TRI = { 6:10, 9:15, 12:20, 15:25, 18:30, 24:40, 30:50, 36:60 };
const DISJ_TB_TRI    = { 6:'10/30', 9:'15/45', 12:'30/60', 15:'30/60', 18:'30/60', 24:'30/60', 30:'30/60', 36:'30/60' };

// Helpers qui prennent en compte le type (logement ou comptage)
function lgtKva(l){
  if(l.kind === 'compt'){
    const k = parseFloat(l.kva);
    return isNaN(k) ? null : k;
  }
  return pwLgt(l.S);
}
function lgtCalibre(l){
  const p = lgtKva(l);
  if(l.kind === 'compt') return CALIBRE_TB_TRI[p] ?? null;
  return calibreA(p);
}
function lgtDisjEDF(l){
  const p = lgtKva(l);
  if(l.kind === 'compt') return DISJ_TB_TRI[p] || '';
  return disjEDF(p);
}
function lgtPhase(l){
  if(l.kind === 'compt') return 'T'; // comptage TB tri toujours tri 400V
  return l.K === 'T' ? 'T' : 'M';
}

function compute(l, side){
  const p = lgtKva(l);
  const M = lgtDisjEDF(l);
  const N = lgtCalibre(l);
  const sub = l[side] || {O:0,P:0};
  const K = lgtPhase(l);
  const rho = rhoFor(l, side);
  const VU = chuteVU(K, sub.O, N, sub.P, rho);
  const pc = chutePc(VU);
  // Section recommandée plafonnée selon le type d'entrée (logement = 35 mm² maxi)
  const rec = sectionMin(K, sub.O, N, p, maxSection(l, side), rho);
  return { p, M, N, VU, pc, rec };
}

// Format helpers
function fmt(v, d){
  if(v == null || v === '' || isNaN(v)) return '—';
  return Number(v).toFixed(d == null ? 2 : d);
}
function tdHl(pc){
  if(pc == null) return 'vu';
  if(pc > CI.limT) return 'bad';
  if(pc > CI.limT * 0.8) return 'warn';
  return 'ok';
}
function tdHlTotal(pc){
  if(pc == null) return 'vu';
  if(pc > CI.limTot) return 'bad';
  if(pc > CI.limTot * 0.85) return 'warn';
  return 'ok';
}

// ═══════════════════════════════════════════════════════════════════════
// SHEET RENDERERS

    : Object.keys(grp);

  // Agrégats pour la bannière d'état (bas de tableau)

    if(r.pc != null){
      if(r.pc > mainLim) nbBad++;

  let h = `
    <div class="limits-bar">
      <div class="limits-title">
        <span style="font-size:12px">🎯</span>
        <span>Limites normatives</span>
      </div>
      <label class="limits-field">
        <span>Limite par tronçon</span>
        <input type="number" class="ws ns" step="0.05" min="0.1" max="10" value="${CI.limT}"
               onchange="updLim('limT',this.value)">
        <span class="limits-unit">%</span>
      </label>
      <label class="limits-field">
        <span>Limite totale C1+C2</span>
        <input type="number" class="ws ns" step="0.1" min="0.5" max="20" value="${CI.limTot}"
               onchange="updLim('limTot',this.value)">
        <span class="limits-unit">%</span>
      </label>
      <div class="limits-presets">
        <button class="btn ${CI.limT===1?'ba':''}" style="padding:4px 10px;font-size:10px" onclick="setPreset(1,2)">NF C 14-100 (1 / 2 %)</button>
        <button class="btn ${CI.limT===1.15?'ba':''}" style="padding:4px 10px;font-size:10px" onclick="setPreset(1.15,2)">Excel d'origine (1,15 / 2 %)</button>
      </div>
    </div>`;

  const c1only = (CI.scope === 'c1only');
  const showREMBT = !c1only;
  const showTotal = !c1only && !noCibe;

  h += `
    <div class="card">
      <div class="card-h">
        <div class="ic">${isRc?'⚡':'🔌'}</div>
        <span>${label}</span>
        <span style="color:rgba(190,199,219,0.45);font-weight:500;text-transform:none;letter-spacing:0.4px;margin-left:8px;font-size:11px">— ${subL}</span>
        <div class="rt">
          ${showREMBT ? `<button class="btn${grpBy==='rembt'?' ba':''}" onclick="setGrpBy('${grpBy==='rembt'?'niv':'rembt'}')" title="Regrouper les lignes par REMBT, ou revenir au tri par niveau">⇅ ${grpBy==='rembt'?'Par niveau':'Reclasser par REMBT'}</button>` : ''}
          <button class="btn" onclick="addCompt()" title="Ajouter un comptage TB tri (commercial, jusqu'à 36 kVA)">＋ Comptage TB tri</button>
          <button class="btn ba" onclick="addLgt()">＋ Logement</button>
        </div>
      </div>
      <div class="card-b">
        <div class="ts">
        <table>
          <tr>
            <th style="width:24px"></th>
            ${showREMBT ? '<th class="col-h" title="REMBT auquel l\'entrée est raccordée (affectation automatique, max 6 logements/REMBT)">REMBT</th>' : ''}
            <th>Niveau</th>
            <th class="col-h" title="Type d'entrée : Logement (kVA selon surface) ou Comptage TB tri (kVA direct)">Type</th>
            <th>Type log.</th>
            <th>Lettrage</th>
            <th>HALL</th>
            <th class="col-h" title="Pour logement : surface en m². Pour comptage TB tri : kVA souscrits.">Surf. / kVA</th>
            <th>M/T</th>
            <th>Long. m</th>
            <th>Section mm²<br><span style="font-size:9px;color:rgba(190,199,219,0.40)">${(side===finalSide())?'Cu / Alu':(isRc?'HN33S33':'AR2V')}</span></th>
            <th class="col-h" title="Puissance kVA effective">Puiss. <br><span style="font-size:9px;color:rgba(190,199,219,0.40)">kVA</span></th>
            <th class="col-h" title="Disjoncteur EDF normalisé">Disj.</th>
            <th class="col-h" title="Calibre du disjoncteur (A)">N <br><span style="font-size:9px;color:rgba(190,199,219,0.40)">A</span></th>
            <th class="col-h" title="Chute de tension (V) — ΔU = ρ·L·I/S">VU<br><span style="font-size:9px;color:rgba(190,199,219,0.40)">V</span></th>
            <th class="col-h" title="% chute de tension (= VU / 2,3)">% ΔU ${isRc?(noCibe?'dériv.':'C2'):'C1'}</th>
            ${showTotal ? '<th class="col-h" title="Total C1+C2 — somme avec l\'autre tronçon">% C1+C2</th>' : ''}
            <th class="col-h" title="Section minimale recommandée (chute Al ≤ limite tronçon)">Reco</th>
          </tr>`;

  let prevRembtId = null, shownRows = 0;
  grpKeys.forEach(k=>{
    grp[k].forEach((entry, idx)=>{
      const l = entry.l, i = entry.i;
      const first = (idx === 0);
      // Couleur de fond propre à chaque REMBT + séparateur au changement de REMBT
      const ri = showREMBT ? CI.rembts.findIndex(r => r.id === l.rembtId) : -1;
      const colorCls = (ri >= 0) ? ` rb-c${ri % 8}` : '';
      const sepCls = (showREMBT && shownRows > 0 && l.rembtId !== prevRembtId) ? ' rb-start' : '';
      // Compute for both sides
      const rThis = compute(l, side);
      const rOther = compute(l, side === 'rc' ? 'ct' : 'rc');
      const pcTotal = (rThis.pc != null && rOther.pc != null) ? rThis.pc + rOther.pc : null;
      const reco = rThis.rec;
      const sub = l[side];
      // Préfixe conducteurs (cohérent avec le schéma) : mono = 2×, tri = 4×
      const cond = lgtPhase(l) === 'M' ? '2×' : '4×';
      // Sections proposées : logement plafonné à 35 mm² (les deux tronçons)
      const _mx = maxSection(l, side);
      const sectList = (side === 'ct' ? SECTIONS_CT : SECTIONS).filter(s => _mx == null || s <= _mx);
      const sectOptions = sectList.map(s => `<option value="${s}"${sub.P==s?' selected':''}>${cond}${s}</option>`).join('');
      const phaseOptions = PHASES.map(p => `<option value="${p}"${l.K==p?' selected':''}>${p==='M'?'Mono':'Tri'}</option>`).join('');

      const isCompt = l.kind === 'compt';
      const phaseOpts = isCompt
        ? '<option value="T" selected>Tri</option>'
        : PHASES.map(p => `<option value="${p}"${l.K==p?' selected':''}>${p==='M'?'Mono':'Tri'}</option>`).join('');
      h += `<tr class="${(!byRembt && first)?'fsep':''}${isCompt?' row-compt':''}${colorCls}${sepCls}">`;
      h += `<td><button class="rd" onclick="delLgt(${i})">✕</button></td>`;
      // REMBT (par logement) — caché en C1-only
      if(showREMBT){
        const pinned = !!l.rembtPin;
        const rOpts = CI.rembts.map(r => `<option value="${r.id}"${l.rembtId===r.id?' selected':''}>${escapeHtml(r.name)}</option>`).join('')
          + `<option value="__auto">↺ Auto</option>`;
        const pinTitle = pinned ? 'Affecté manuellement (épinglé) — « ↺ Auto » pour relâcher' : 'Affectation automatique — choisir un REMBT pour le forcer';
        h += `<td><select class="sel rembt-sel${pinned?' rembt-pinned':''}" title="${pinTitle}" onchange="updRembt(${i},this.value)">${rOpts}</select></td>`;
      }
      h += byRembt
        ? `<td class="fl">${l.niv||'—'}</td>`
        : (first ? `<td class="fl" rowspan="${grp[k].length}">${l.niv||'—'}</td>` : '');
      // KIND (Logement vs Comptage TB)
      h += `<td><select class="sel" style="min-width:88px" onchange="setKind(${i},this.value)">
        <option value="lgt"${l.kind!=='compt'?' selected':''}>Logement</option>
        <option value="compt"${l.kind==='compt'?' selected':''}>Comptage TB</option>
      </select></td>`;
      if(isCompt){
        // Cellule unique fusionnée : nom + kVA + Tri
        const kvaOpts = KVA_TB_TRI.map(k => `<option value="${k}"${l.kva==k?' selected':''}>${k} kVA</option>`).join('');
        h += `<td colspan="5">
          <div class="compt-cell">
            <input type="text" placeholder="Nom du comptage (ex : Boulangerie, Local commercial 1…)" value="${(l.lett||'').replace(/"/g,'&quot;')}" onchange="upd(${i},'lett',this.value)">
            <select class="sel" onchange="upd(${i},'kva',this.value)" title="Puissance souscrite tri tarif bleu">${kvaOpts}</select>
            <span class="ch cc compt-tri">Tri 400 V</span>
          </div>
        </td>`;
      } else {
        // Type de logement (libellé libre)
        h += `<td><input type="text" class="ws" value="${l.type||''}" onchange="upd(${i},'type',this.value)" placeholder="ST/2P/3P…"></td>`;
        // Lettrage
        h += `<td><input type="text" class="ws" value="${l.lett||''}" onchange="upd(${i},'lett',this.value)"></td>`;
        // HALL
        h += `<td><input type="number" class="ws ns" value="${l.hall===''?'':l.hall}" onchange="upd(${i},'hall',this.value)"></td>`;
        // Surface
        h += `<td><input type="number" class="ws ns" step="0.01" value="${l.S===''?'':l.S}" onchange="upd(${i},'S',this.value)" placeholder="m²"></td>`;
        // M/T
        h += `<td><select class="sel" onchange="upd(${i},'K',this.value)">${phaseOpts}</select></td>`;
      }
      // Long.
      h += `<td><input type="number" class="ws ns" value="${sub.O===''?'':sub.O}" onchange="updSub(${i},'${side}','O',this.value)"></td>`;
      // Section (+ choix matériau Cu/Alu sur le tronçon final vers le tableau abonné)
      const matSel = (side === finalSide())
        ? `<select class="sel mat-sel" style="min-width:62px;margin-right:4px" title="Matériau du câble vers le tableau abonné — alu : ρ=0,037 · cuivre : ρ=0,0225" onchange="upd(${i},'mat',this.value)"><option value="alu"${lgtMat(l)==='alu'?' selected':''}>Alu</option><option value="cu"${lgtMat(l)==='cu'?' selected':''}>Cuivre</option></select>`
        : '';
      h += `<td>${matSel}<select class="sel" onchange="updSub(${i},'${side}','P',this.value)">${sectOptions}</select></td>`;
      // Computed: puiss
      h += `<td class="fm">${rThis.p ?? '—'}</td>`;
      // Disj EDF
      h += `<td class="vu">${rThis.M || '—'}</td>`;
      // Calibre
      h += `<td class="fm">${rThis.N ?? '—'}</td>`;
      // VU
      h += `<td class="vu">${rThis.VU == null ? '—' : fmt(rThis.VU, 2)}</td>`;
      // % chute this side
      h += `<td class="${hlMain(rThis.pc)}">${rThis.pc == null ? '—' : fmt(rThis.pc, 3)+' %'}</td>`;
      // % chute total (caché en C1-only)
      if(showTotal){
        h += `<td class="${tdHlTotal(pcTotal)}">${pcTotal == null ? '—' : fmt(pcTotal, 3)+' %'}</td>`;
      }
      // Reco (section minimale, avec préfixe conducteurs)
      h += `<td class="sx">${reco == null ? '—' : cond+reco}</td>`;
      h += `</tr>`;
      prevRembtId = l.rembtId;
      shownRows++;
    });
  });

  h += `</table></div></div></div>`;

  // Status banner
  if(nbBad > 0){
    h += `<div class="ban ban-no">⚠️ ${nbBad} logement(s) au-dessus de la limite (${fmt(mainLim,2)} %) — section à augmenter</div>`;
  } else if(nbWarn > 0){
    h += `<div class="ban ban-w">⚠ ${nbWarn} logement(s) proche(s) de la limite — surveillez la section retenue</div>`;
  } else if(CI.lgts.length > 0){
    h += `<div class="ban ban-ok">✅ Toutes les chutes sont conformes (≤ ${fmt(mainLim,2)} %)</div>`;
  }

  document.getElementById(elId).innerHTML = h;
}

// ─── Assistant de configuration (Étape 1) ────────────────────────
function renderSetupWizard(){
  const s = CI.setup || defaultSetup();
  const sc = CI.scope;
  const root = CI.rembts.find(r => r.parentId == null) || CI.rembts[0];
  const ccu = !!(root && root.cf && root.cf.active);
  const opt = (name, val, checked, title, sub) =>
    `<label class="wz-opt"><input type="radio" name="${name}" value="${val}"${checked?' checked':''}>
       <span class="wz-opt-box"><b>${title}</b><small>${sub}</small></span></label>`;
  return `
  <div class="wz-card">
    <div class="wz-head">
      <div class="wz-head-ic">🧭</div>
      <div>
        <div class="wz-title">Assistant de configuration</div>
        <div class="wz-sub">Quelques réglages simples pour préparer votre projet. Les longueurs, surfaces et phases se saisissent ensuite logement par logement dans le tableau.</div>
      </div>
    </div>

    <div class="wz-q">
      <div class="wz-q-lbl">1 · Que voulez-vous calculer ?</div>
      <div class="wz-opts">
        ${opt('wz-perim','full',sc==='full','Installation complète','REMBT → CIBE → TA (avec coffret CIBE)')}
        ${opt('wz-perim','noCibe',sc==='noCibe','Sans coffret CIBE','Dérivation directe REMBT → tableau abonné')}
        ${opt('wz-perim','c1only',sc==='c1only','Tronçon final seulement','Du coffret CIBE au tableau d\'abonné (C1 seul)')}
      </div>
    </div>

    <div class="wz-q">
      <div class="wz-q-lbl">2 · Y a-t-il un coffret de façade (CCPI) ?</div>
      <div class="wz-opts">
        ${opt('wz-ccu','oui',ccu,'Oui','Un coffret entre le réseau ENEDIS et le 1ᵉʳ REMBT')}
        ${opt('wz-ccu','non',!ccu,'Non','Raccordement direct sur le REMBT')}
      </div>
    </div>

    <div class="wz-q">
      <div class="wz-q-lbl">3 · Vos logements sont majoritairement…</div>
      <div class="wz-opts">
        ${opt('wz-phase','M',s.defPhase!=='T','Monophasés','Phase pré-sélectionnée pour les nouveaux logements (modifiable par ligne)')}
        ${opt('wz-phase','T',s.defPhase==='T','Triphasés','Grands logements / forte puissance (modifiable par ligne)')}
      </div>
    </div>

    <div class="wz-q">
      <div class="wz-q-lbl">4 · Des locaux commerciaux (comptage tri) ?</div>
      <div class="wz-opts">
        ${opt('wz-com','oui',s.hasCommerce,'Oui','Boulangerie, local commercial… (bouton « + Comptage TB tri »)')}
        ${opt('wz-com','non',!s.hasCommerce,'Non','Uniquement des logements')}
      </div>
    </div>

    <div class="wz-actions">
      <button class="btn ba" onclick="applySetupWizard()">✓ Appliquer la configuration</button>
      <button class="btn" onclick="skipSetupWizard()">Passer l'assistant</button>
    </div>
  </div>`;
}

function applySetupWizard(){
  const radio = name => { const el = document.querySelector(`input[name="${name}"]:checked`); return el ? el.value : null; };
  CI.setup = {
    done: true,
    defPhase: radio('wz-phase') === 'T' ? 'T' : 'M',
    hasCommerce: radio('wz-com') === 'oui'
  };
  const perim = radio('wz-perim');
  CI.scope = (perim === 'c1only' || perim === 'noCibe') ? perim : 'full';
  const root = CI.rembts.find(r => r.parentId == null) || CI.rembts[0];
  if(root){ if(!root.cf) root.cf = defaultCF(); root.cf.active = radio('wz-ccu') === 'oui'; }
  save(); R();
}

function skipSetupWizard(){
  CI.setup = Object.assign(defaultSetup(), CI.setup || {}, { done:true });
  save(); R();
}

function reopenSetupWizard(){
  if(!CI.setup) CI.setup = defaultSetup();
  CI.setup.done = false;
  active = 'dim';
  save(); R();
}


function renderDim(){
  if(!CI.setup) CI.setup = defaultSetup();
  const totGlobal = CI.rembts.reduce((s,r)=>s+rembtPlages(r),0);
  let h = '';

  // Assistant de configuration (questionnaire) ou bandeau récapitulatif
  if(!CI.setup.done){
    document.getElementById('sh-dim').innerHTML = renderSetupWizard();
    return;
  }
  h += `
    <div class="dim-toolbar">
      <div class="dim-stats">
        <span class="dim-stat"><b>${CI.rembts.length}</b> REMBT${CI.rembts.length>1?'s':''}</span>
        <span class="dim-sep">·</span>
        <span class="dim-stat"><b>${CI.lgts.length}</b> logement${CI.lgts.length>1?'s':''}</span>
        <span class="dim-sep">·</span>
        <span class="dim-stat"><b>${totGlobal}</b> plage${totGlobal>1?'s':''}</span>
      </div>
      <button class="btn ba" onclick="addRembt()">＋ Ajouter un REMBT</button>
    </div>

    <div class="rembt-list">`;

  CI.rembts.forEach((r, idx) => {
    const lgtsR = CI.lgts.filter(l => l.rembtId === r.id);
    const plages = rembtPlages(r);
    const sugg = rembtSuggest(plages);
    const tooMany = lgtsR.length > REMBT_MAX_LGTS;
    const isProblem = (sugg == null || tooMany);
    const isWarn = !isProblem && plages > (sugg - 1);
    const stateCls = isProblem ? 'state-bad' : (isWarn ? 'state-warn' : 'state-ok');
    const sizeLbl = sugg == null
      ? '> 12 plages — diviser'
      : tooMany
        ? `${lgtsR.length} > ${REMBT_MAX_LGTS} lgts — diviser`
        : `${plages}/${sugg} plages`;

    // Pill CCPI (résumé compact)
    let cfPill = '';
    if(r.parentId == null && r.cf && r.cf.active){
      const c = cfChute(r);
      if(c){
        const cfCls = c.pc > CI.limT ? 'state-bad' : (c.pc > CI.limT*0.8 ? 'state-warn' : 'state-ok');
        cfPill = `<span class="rb-pill rb-cf ${cfCls}">🏠 CCPI · ${c.pc.toFixed(2)} %</span>`;
      } else {
        cfPill = `<span class="rb-pill rb-cf">🏠 CCPI configuré</span>`;
      }
    }
    // Pill liaison cascade (câble parent → ce REMBT)
    let linkPill = '';
    if(r.parentId != null){
      const c = linkChute(r);
      if(c){
        const lkCls = c.pc > CI.limT ? 'state-bad' : (c.pc > CI.limT*0.8 ? 'state-warn' : 'state-ok');
        linkPill = `<span class="rb-pill rb-cf ${lkCls}">🔗 ${c.pc.toFixed(2)} %</span>`;
      }
    }

    h += `
    <details class="rembt-card" ${idx===0?'open':''}>
      <summary class="rembt-sum">
        <span class="rembt-sum-caret">▶</span>
        <span class="rembt-sum-icon">📦</span>
        <span class="rembt-sum-name">${escapeHtml(r.name)}</span>
        <span class="rb-sub">${r.parentId ? '↑ '+escapeHtml((CI.rembts.find(x=>x.id===r.parentId)||{}).name || '—') : 'racine (ENEDIS)'}</span>
        <span class="rembt-sum-spacer"></span>
        <span class="rb-pill ${stateCls}">${isProblem ? sizeLbl : lgtsR.length+' lgt · '+plages+'/'+sugg+' pl.'}</span>
        ${cfPill}
        ${linkPill}
        <button class="btn-icon-del" onclick="event.preventDefault();event.stopPropagation();delRembt('${r.id}')" ${CI.rembts.length<=1?'disabled':''} title="${CI.rembts.length<=1?'Au moins un REMBT requis':'Supprimer ce REMBT (logements réaffectés automatiquement)'}">✕</button>
      </summary>

      <div class="rembt-body">

        <div class="rb-row">
          <label class="rb-field rb-field-grow">
            <span>Nom du REMBT</span>
            <input type="text" value="${(r.name||'').replace(/"/g,'&quot;')}" placeholder="REMBT 1" onchange="setRembtName('${r.id}',this.value)">
          </label>
          <label class="rb-field">
            <span>Alimenté par</span>
            <input type="text" class="rb-static" readonly value="${r.parentId ? '↑ '+((CI.rembts.find(x=>x.id===r.parentId)||{}).name||'—')+' (cascade auto)' : 'Racine (ENEDIS)'}" title="Chaînage en cascade automatique">
          </label>
        </div>

        ${r.parentId == null ? `
        <div class="rb-block ${r.cf && r.cf.active ? 'rb-block-on' : ''}">
          <label class="rb-block-h">
            <input type="checkbox" ${r.cf && r.cf.active ? 'checked':''} onchange="toggleCF('${r.id}',this.checked)">
            <span>⚡ Coffret de façade (CCPI) entre ENEDIS et ce REMBT</span>
            ${r.cf && r.cf.active ? (function(){
              const c = cfChute(r);
              if(!c) return '';
              const cls = c.pc > CI.limT ? 'bad' : (c.pc > CI.limT*0.8 ? 'warn' : 'ok');
              return `<span class="rb-chip ${cls}" style="margin-left:auto">${c.pc.toFixed(2)} %</span>`;
            })() : ''}
          </label>
          ${r.cf && r.cf.active ? `
          <div class="rb-row" style="margin-top:10px">
            <label class="rb-field">
              <span>Longueur câble (m)</span>
              <input type="number" class="ws ns" min="0" step="0.5" value="${r.cf.long===''?'':r.cf.long}" onchange="updCF('${r.id}','long',this.value)">
            </label>
            <label class="rb-field">
              <span>Section ALU (mm²)</span>
              <select class="sel" onchange="updCF('${r.id}','section',this.value)">
                ${[16,25,35,50,70,95,120,150,185,240].map(s => `<option value="${s}"${r.cf.section==s?' selected':''}>${s}</option>`).join('')}
              </select>
            </label>
          </div>
          ${chuteResult(cfChute(r), 'coffret façade → REMBT', r.cf.long, r.cf.section)}` : ''}
        </div>` : ''}

        ${r.parentId != null ? `
        <div class="rb-block rb-block-on">
          <label class="rb-block-h">
            <span>🔗 Liaison cascade — câble ${escapeHtml((CI.rembts.find(x=>x.id===r.parentId)||{}).name || 'parent')} → ${escapeHtml(r.name)}</span>
            ${(function(){
              const c = linkChute(r);
              if(!c) return '';
              const cls = c.pc > CI.limT ? 'bad' : (c.pc > CI.limT*0.8 ? 'warn' : 'ok');
              return `<span class="rb-chip ${cls}" style="margin-left:auto">${c.pc.toFixed(2)} %</span>`;
            })()}
          </label>
          <div class="rb-row" style="margin-top:10px">
            <label class="rb-field">
              <span>Longueur câble (m)</span>
              <input type="number" class="ws ns" min="0" step="0.5" value="${r.link.long===''?'':r.link.long}" onchange="updLink('${r.id}','long',this.value)">
            </label>
            <label class="rb-field">
              <span>Section ALU (mm²)</span>
              <select class="sel" onchange="updLink('${r.id}','section',this.value)">
                ${[16,25,35,50,70,95,120,150,185,240].map(s => `<option value="${s}"${r.link.section==s?' selected':''}>${s}</option>`).join('')}
              </select>
            </label>
          </div>
          ${chuteResult(linkChute(r), escapeHtml((CI.rembts.find(x=>x.id===r.parentId)||{}).name||'parent')+' → '+escapeHtml(r.name), r.link.long, r.link.section)}
        </div>` : ''}

        <div class="rb-block">
          <div class="rb-block-h">
            <span>📦 Modules — <b class="${stateCls==='state-bad'?'rb-h-bad':stateCls==='state-warn'?'rb-h-warn':'rb-h-ok'}">${sizeLbl}</b></span>
            <button class="btn" style="padding:3px 11px;font-size:10.5px;margin-left:auto" onclick="autoFillRembt('${r.id}')">⚡ Calcul auto</button>
          </div>
          <div class="rb-mod-sum">`;
    const usedMods = MODULES.filter(m => (r.dim[m.k]||0) > 0);
    if(usedMods.length){
      h += usedMods.map(m => `<span class="rb-modchip">${m.n} ×${r.dim[m.k]}</span>`).join('');
    } else {
      h += `<span class="rb-mod-empty">Aucun module — cliquez « ⚡ Calcul auto » ou ajustez ci-dessous</span>`;
    }

  const l = CI.lgts[i]; if(!l) return;

  l[k] = v;

}

// ─── REMBT CRUD ───────────────────────────────────────────────
// Le nombre de REMBT et la cascade sont calculés automatiquement
// (autoDistributeRembts), mais l'utilisateur peut : ajouter un REMBT,
// en supprimer un, et affecter manuellement un logement à un REMBT
// (épinglage respecté par l'auto).
function addRembt(){
  const r = newRembt(null, CI.rembts);
  r.manual = true;                       // créé à la main → conservé même vide
  CI.rembts.push(r);
  save(); R();
}
function delRembt(id){
  if(CI.rembts.length <= 1){ alert('Au moins un REMBT est nécessaire.'); return; }
  const r = CI.rembts.find(x => x.id === id); if(!r) return;
  const assigned = CI.lgts.filter(l => l.rembtId === id).length;
  if(assigned > 0 && !confirm(`Supprimer « ${r.name} » ? ${assigned} logement(s) seront réaffectés automatiquement.`)) return;
  // Les logements de ce REMBT sont relâchés (l'auto les replacera)
  CI.lgts.forEach(l => { if(l.rembtId === id){ l.rembtPin = false; } });
  CI.rembts = CI.rembts.filter(x => x.id !== id);
  save(); R();
}
// Affectation manuelle d'un logement à un REMBT ('' = retour en auto)
function updRembt(i, rid){
  const l = CI.lgts[i]; if(!l) return;
  if(rid === '' || rid === '__auto'){
    l.rembtPin = false;
  } else if(CI.rembts.some(r => r.id === rid)){
    l.rembtId = rid;
    l.rembtPin = true;
  }
  save(); R();
}
function setRembtName(id, v){
  const r = CI.rembts.find(x => x.id === id); if(!r) return;
  r.name = (v || '').trim() || r.id.toUpperCase();
  save(); R();
}
function setRembtNotes(id, v){
  const r = CI.rembts.find(x => x.id === id); if(!r) return;
  r.notes = v || '';
  save();
}
function updRembtDim(id, k, v){
  const r = CI.rembts.find(x => x.id === id); if(!r) return;
  r.dim[k] = Math.max(0, parseInt(v, 10) || 0);
  save(); R();
}
function autoFillRembt(id){
  const r = CI.rembts.find(x => x.id === id); if(!r) return;
  const suggested = autoModules(id);
  // Conserve RAC150/RAC35 manuels ; calcule RAC240, BR60M/T et RCP400
  // (RCP400 = 1 départ réseau par REMBT alimenté en cascade depuis celui-ci)
  r.dim.RAC240 = suggested.RAC240;
  r.dim.BR60M = suggested.BR60M;
  r.dim.BR60T = suggested.BR60T;
  r.dim.RCP400 = suggested.RCP400;
  save(); R();
}

// ─── Répartition automatique des REMBT ───────────────────────────
// Règle « petit collectif » NF C 14-100 §10 : max REMBT_MAX_LGTS logements
// par REMBT. Auto + affectation manuelle :
//   - un logement « épinglé » (l.rembtPin) reste sur le REMBT choisi par
//     l'utilisateur, l'auto n'y touche pas ;
//   - les logements non épinglés sont placés séquentiellement dans les
//     REMBT ayant de la place (max 6) ;
//   - le nb de REMBT et la cascade restent calculés automatiquement ; les
//     REMBT créés manuellement (r.manual) sont conservés même vides, les
//     REMBT auto vides en fin de liste sont retirés.
// Renvoie true si une modification a eu lieu.
function autoDistributeRembts(){
  let changed = false;
  const idSet = new Set(CI.rembts.map(r => r.id));
  // Épingles invalides (REMBT supprimé) → on relâche
  CI.lgts.forEach(l => { if(l.rembtPin && !idSet.has(l.rembtId)){ l.rembtPin = false; changed = true; } });

  // Nombre de REMBT nécessaire (au moins 1, au moins de quoi loger tout le monde)
  const need = Math.max(1, Math.ceil(CI.lgts.length / REMBT_MAX_LGTS));
  while(CI.rembts.length < need){ CI.rembts.push(newRembt(null, CI.rembts)); changed = true; }

  // Places déjà prises par les logements épinglés
  const fill = CI.rembts.map(() => 0);
  CI.lgts.forEach(l => {
    if(l.rembtPin){ const idx = CI.rembts.findIndex(r => r.id === l.rembtId); if(idx >= 0) fill[idx]++; }
  });
  // Placement séquentiel des logements non épinglés dans les REMBT ayant de la place
  let cur = 0;
  CI.lgts.forEach(l => {
    if(l.rembtPin) return;
    while(cur < CI.rembts.length && fill[cur] >= REMBT_MAX_LGTS) cur++;
    if(cur >= CI.rembts.length){ CI.rembts.push(newRembt(null, CI.rembts)); fill.push(0); changed = true; }
    const rid = CI.rembts[cur].id;
    fill[cur]++;
    if(l.rembtId !== rid){ l.rembtId = rid; changed = true; }
  });

  // Retire les REMBT auto vides en fin de liste (on garde les REMBT manuels et au moins 1)
  for(let i = CI.rembts.length - 1; i >= 1; i--){
    const r = CI.rembts[i];
    const empty = !CI.lgts.some(l => l.rembtId === r.id);
    if(empty && !r.manual){ CI.rembts.splice(i, 1); changed = true; }
    else break;
  }

  // Chaîne en cascade : REMBT n alimenté par REMBT n-1
  CI.rembts.forEach((r, i) => {
    const pid = (i === 0) ? null : CI.rembts[i-1].id;
    if(r.parentId !== pid){ r.parentId = pid; changed = true; }
  });
  return changed;
}

// Render all
function R(){
  if(autoDistributeRembts()) save();
  document.getElementById('bL').textContent = CI.lgts.length + ' lgts';
  document.getElementById('projName').value = CI.P || '';
  // Toggle de mode (3 boutons)
  const sf = document.getElementById('scope-full');
  const sc = document.getElementById('scope-c1');
  const sn = document.getElementById('scope-nocibe');
  if(sf) sf.classList.toggle('on', CI.scope === 'full');
  if(sc) sc.classList.toggle('on', CI.scope === 'c1only');
  if(sn) sn.classList.toggle('on', CI.scope === 'noCibe');
  // Visibilité des onglets selon le mode
  const c1only = (CI.scope === 'c1only');
  const noCibe = (CI.scope === 'noCibe');
  document.querySelectorAll('.tab').forEach(tab => {
    const sh = tab.dataset.sh;
    let hide = false;
    if(c1only) hide = (sh === 'rc' || sh === 'dim');
    else if(noCibe) hide = (sh === 'ct');
    tab.style.display = hide ? 'none' : '';
  });
  // S'assurer que l'onglet actif est visible
  if(c1only && (active === 'rc' || active === 'dim')) active = 'ct';
  if(noCibe && active === 'ct') active = 'rc';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.sh === active));
  document.querySelectorAll('.sheet').forEach(el => el.classList.toggle('active', el.id === 'sh-' + active));
  // Libellé de l'onglet rc selon le mode (REMBT → CIBE, ou REMBT → TA sans CIBE)
  const rcLbl = document.querySelector('.tab[data-sh="rc"] .tab-lbl');
  if(rcLbl) rcLbl.innerHTML = noCibe
    ? 'Chutes REMBT → TA<br><small>dérivation directe</small>'
    : 'Chutes REMBT → CIBE<br><small>%C2 par logement</small>';
  // Renumérotation dynamique
  const setNum = (sh,n) => { const e = document.querySelector('.tab[data-sh="'+sh+'"] .tab-num'); if(e) e.textContent = n; };
  if(c1only){
    setNum('ct','1'); setNum('sch','2');
  } else if(noCibe){
    setNum('dim','1'); setNum('rc','2'); setNum('sch','3');
  } else {
    setNum('dim','1'); setNum('rc','2'); setNum('ct','3'); setNum('sch','4');
  }

  renderRC();
  renderCT();
  renderDim();
  renderSchema();
}
