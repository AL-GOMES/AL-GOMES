// Pages à inclure dans l'export PDF (cases à cocher de l'onglet Synthèse).
let pdfPageOpts = { norm:true, chutes:true, dim:true, schema:true };
function setPdfPage(k, on){ pdfPageOpts[k] = !!on; }
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSchema(){
  const c1only = (CI.scope === 'c1only');
  const noCibe = (CI.scope === 'noCibe');
  // Chute "totale" retenue : C1 seul → C1 ; sans CIBE → câble unique (rc) ; sinon C1+C2.
  const totChute = (a,b) => c1only
    ? b.pc
    : (noCibe
        ? a.pc
        : ((a.pc != null && b.pc != null) ? a.pc + b.pc : (b.pc != null ? b.pc : null)));
  // Stats globales
  let totLgts = CI.lgts.length;
  let okLgts = 0, warnLgts = 0, badLgts = 0;
  let maxTotal = 0;
  CI.lgts.forEach(l => {
    const a = compute(l,'rc'), b = compute(l,'ct');
    const tot = totChute(a,b);
    if(tot != null){
      if(tot > maxTotal) maxTotal = tot;
      if(tot > CI.limTot) badLgts++;
      else if(tot > CI.limTot * 0.85) warnLgts++;
      else okLgts++;
    }
  });
  const totPlages = CI.rembts.reduce((s,r) => s + rembtPlages(r), 0);
  const nbOversized = CI.rembts.filter(r => rembtSuggest(rembtPlages(r)) == null).length;

  let h = `
    <div class="intro intro-compact">
      <div class="intro-num">${c1only?'2':'4'}</div>
      <div class="intro-txt">
        <b>Étape ${c1only?'2':'4'} — Synthèse.</b> ${c1only
          ? 'Schéma unifilaire : un coffret CIBE par client (un CIBE = un seul client), puis câble AR2V (C1) → tableau abonné. Aucune notion de REMBT en mode C1 seul.'
          : (noCibe
            ? 'Schéma unifilaire : Coffret de façade → REMBT → un câble unique par client (dérivation directe, sans coffret CIBE) → tableau abonné. Section, longueur et chute sur la dérivation.'
            : 'Schéma unifilaire : Coffret de façade → REMBT → un départ par client (câble C2 → son coffret CIBE → câble C1 → tableau abonné). Un CIBE = un seul client. Section, longueur et chute sur chaque tronçon.')}
      </div>
    </div>

    <div class="schema-stats" style="${c1only?'grid-template-columns:repeat(3,1fr)':''}">
      ${c1only ? '' : `<div class="schema-stat">
        <div class="schema-stat-lbl">REMBTs</div>
        <div class="schema-stat-val">${CI.rembts.length}</div>
        <div class="schema-stat-sub">${nbOversized > 0 ? `⚠ ${nbOversized} à diviser` : 'tailles ≤ 12 plages'}</div>
      </div>`}
      <div class="schema-stat">
        <div class="schema-stat-lbl">Logements</div>
        <div class="schema-stat-val">${totLgts}</div>
        <div class="schema-stat-sub">${okLgts} OK · ${warnLgts} limite · ${badLgts} hors-norme</div>
      </div>
      ${c1only ? '' : `<div class="schema-stat">
        <div class="schema-stat-lbl">Plages cumulées</div>
        <div class="schema-stat-val">${totPlages}</div>
        <div class="schema-stat-sub">sur ${CI.rembts.length} REMBT(s)</div>
      </div>`}
      <div class="schema-stat">
        <div class="schema-stat-lbl">Chute MAX${c1only?' C1':(noCibe?' dériv.':' C1+C2')}</div>
        <div class="schema-stat-val ${maxTotal>CI.limTot?'red':(maxTotal>CI.limTot*0.85?'orange':'green')}">${fmt(maxTotal,3)} %</div>
        <div class="schema-stat-sub">limite = ${fmt(CI.limTot,2)} %</div>
      </div>
      <div class="schema-stat">
        <div class="schema-stat-lbl">Limites</div>
        <div class="schema-stat-val" style="font-size:16px">${fmt(CI.limT,2)} / ${fmt(CI.limTot,2)}</div>
        <div class="schema-stat-sub">tronçon / total (%)</div>
      </div>
    </div>

    <div class="schema-actions" style="flex-direction:column;align-items:flex-start;gap:12px">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;font-size:13px;color:#2a2a2a;background:#fff;border:1px solid #d8dce6;border-radius:8px;padding:10px 14px">
        <span style="font-weight:700">📄 Pages à inclure dans le PDF :</span>
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${pdfPageOpts.norm?'checked':''} onchange="setPdfPage('norm', this.checked)"> Cadre normatif</label>
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${pdfPageOpts.chutes?'checked':''} onchange="setPdfPage('chutes', this.checked)"> Chutes de tension</label>
        ${c1only ? '' : '<label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" '+(pdfPageOpts.dim?'checked':'')+' onchange="setPdfPage(\'dim\', this.checked)"> Dimensionnement REMBT</label>'}
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${pdfPageOpts.schema?'checked':''} onchange="setPdfPage('schema', this.checked)"> Schéma récapitulatif</label>

      <button class="btn" onclick="exportPDF()">📄 Exporter PDF complet</button>

    <div class="plan-paper" data-title="PLAN — ${escapeHtml(CI.P||'Sans titre').toUpperCase()} · ${c1only?'DÉRIVATIONS INDIVIDUELLES CIBE → TA':'BRANCHEMENT COLLECTIF NF C 14-100'}">`;

  if(CI.lgts.length === 0 || CI.rembts.length === 0){
    h += `<div class="schema-empty" style="color:#1a1a1a">Aucun logement à représenter.<br>Renseignez d'abord vos logements dans l'onglet « ${noCibe ? 'Chutes REMBT → TA' : 'Chutes CIBE → TA'} ».</div>`;
  } else {
    const niveauxOrdre = ['SS','RDJ','RDC BAS','RDC','RDC HAUT','R+1','R+2','R+3','R+4','R+5','R+6','R+7','R+8','R+9','R+10','R+11','R+12'];
    function nivIdx(n){ const i = niveauxOrdre.indexOf(n); return i === -1 ? 999 : i; }
    function lgtsOf(rid){
      return CI.lgts
        .map((l,i) => ({l,i}))
        .filter(x => x.l.rembtId === rid)
        .sort((a,b) => {
          const an = nivIdx(a.l.niv), bn = nivIdx(b.l.niv);
          if(an !== bn) return an - bn;
          return (a.l.lett||'').localeCompare(b.l.lett||'');
        });
    }
    const byParent = new Map();
    CI.rembts.forEach(r => {
      const pid = r.parentId || '_root';
      if(!byParent.has(pid)) byParent.set(pid, []);
      byParent.get(pid).push(r);
    });

    // Pour chaque REMBT (en commençant par les racines)
    // Couleur selon chute %
    function pcColor(pc){
      if(pc == null) return '#666';
      if(pc > CI.limT) return '#a83232';
      if(pc > CI.limT*0.8) return '#b26d24';
      return '#2e6b3e';
    }
    function totColor(tot){
      if(tot == null) return '#1a1a1a';
      if(tot > CI.limTot) return '#a83232';
      if(tot > CI.limTot*0.85) return '#b26d24';
      return '#2e6b3e';
    }

    // ── Construit un schéma unifilaire SVG pour un REMBT ──
    // Amont vertical : Coffret façade → REMBT → CIBE, puis départs depuis le CIBE.
    // ── Schéma unifilaire SVG ──
    // Architecture : un coffret CIBE par client (un CIBE = un seul client).
    // Mode complet : Coffret façade → REMBT → (par client) C2 → CIBE → C1 → TA.
    // Mode C1 seul : (par client) CIBE → C1 → TA.
    function buildSvgPlan(r, lgts){
      const NAVY = '#1f3864', INK = '#1a1a1a';
      const n = Math.max(lgts.length, 1);
      const colW = 150;
      const leftPad = 40;
      const depStartX = leftPad + colW/2;
      const svgW = Math.max(leftPad*2 + n*colW, 520);
      const cx = i => depStartX + i*colW;
      const depX1 = cx(0), depX2 = cx(n-1);
      const midX = (depX1 + depX2)/2;

      let Y;
      if(noCibe){
        Y = { cf:16, cfH:28, rembt:74, rembtH:26, bus:120, cab:158, ta:208, taH:34, total:254 };
      } else if(!c1only){
        Y = { cf:16, cfH:28, rembt:74, rembtH:26, bus:120,
              c2:152, cibe:184, cibeH:22, c1:230, ta:264, taH:34, total:310 };
      } else {
        Y = { note:14, cibe:26, cibeH:22, c1:78, ta:112, taH:34, total:158 };
      }

      const esc = s => escapeHtml(String(s));
      const rect = (x,y,w,h,o={}) => `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${o.rx||0}" fill="${o.fill||'#fff'}" stroke="${o.stroke||NAVY}" stroke-width="${o.sw||1.5}"${o.dash?` stroke-dasharray="${o.dash}"`:''}/>`;
      const line = (x1,y1,x2,y2,o={}) => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${o.stroke||INK}" stroke-width="${o.sw||2}"${o.dash?` stroke-dasharray="${o.dash}"`:''}/>`;
      const txt = (x,y,t,o={}) => `<text x="${x}" y="${y}" font-family="Helvetica,Arial,sans-serif" font-size="${o.size||10}" font-weight="${o.weight||400}" fill="${o.fill||INK}" text-anchor="${o.anchor||'middle'}"${o.ls?` letter-spacing="${o.ls}"`:''}>${esc(t)}</text>`;
      const dot = (x,y,clr) => `<circle cx="${x}" cy="${y}" r="4.5" fill="${clr}" stroke="${INK}" stroke-width="1.2"/>`;
      const sect = (P, ph) => P ? `${ph==='M'?'2×':'4×'}${P} mm²` : '? mm²';

      let s = `<svg viewBox="0 0 ${svgW} ${Y.total}" width="${svgW}" height="${Y.total}" class="uni-svg" xmlns="http://www.w3.org/2000/svg">`;

      // ── Amont ──
      if(!c1only){
        if(r.cf && r.cf.active){
          s += rect(midX-50, Y.cf, 100, Y.cfH, {fill:'#fff'});
          s += txt(midX, Y.cf+12, 'COFFRET', {size:9, weight:700, fill:NAVY, ls:1});
          s += txt(midX, Y.cf+22, 'DE FAÇADE', {size:9, weight:700, fill:NAVY, ls:1});
          s += line(midX, Y.cf+Y.cfH, midX, Y.rembt, {stroke:NAVY});
          const cfMid = (Y.cf+Y.cfH+Y.rembt)/2;
          s += txt(midX+7, cfMid-3, `HN33S33 · L=${r.cf.long||'?'} m`, {size:8, anchor:'start', fill:'#555'});
          s += txt(midX+7, cfMid+7, sect(r.cf.section, 'T'), {size:8, weight:700, anchor:'start', fill:'#1a1a1a'});
        }
        const sugg = rembtSuggest(rembtPlages(r));
        s += rect(midX-78, Y.rembt, 156, Y.rembtH, {fill:NAVY, stroke:NAVY});
        s += txt(midX, Y.rembt+18, `${r.name} · ${sugg ? sugg+' plages' : '> 12 plages'}`, {size:10, weight:700, fill:'#fff', ls:0.5});
        // Répartition vers les départs
        s += line(midX, Y.rembt+Y.rembtH, midX, Y.bus, {stroke:NAVY});
        if(n > 1) s += line(depX1, Y.bus, depX2, Y.bus, {stroke:NAVY, sw:2.5});
      } else {
        s += txt(midX, Y.note, 'Colonne montante — un coffret CIBE par client', {size:8.5, fill:'#888', weight:700, ls:0.5});
      }

      // ── Départs : un CIBE par client ──
      lgts.forEach(({l}, i) => {
        const x = cx(i);
        const a = compute(l,'rc'), b = compute(l,'ct');
        const tot = totChute(a,b);
        const tClr = totColor(tot);
        const id = (l.lett||'?');
        const phase = lgtPhase(l), kva = lgtKva(l);

        if(noCibe){
          // Sans CIBE : un seul câble REMBT → TA (tronçon rc)
          s += line(x, Y.bus, x, Y.ta, {stroke:INK});
          s += txt(x+6, Y.cab-2, `${lgtMat(l)==='cu'?'Cuivre':'HN33S33'} · L=${l.rc.O||'?'}m · ${sect(l.rc.P, phase)}`, {size:7.5, anchor:'start', fill:'#888'});
          s += txt(x+6, Y.cab+8, `chute ${a.pc==null?'—':a.pc.toFixed(2)+'%'}`, {size:7.5, weight:700, anchor:'start', fill:tClr});
          s += dot(x, (Y.bus+Y.ta)/2, '#e08a1f');
          const tW = 88, tX = x-tW/2;
          s += rect(tX, Y.ta, tW, Y.taH, {fill:'#fff', stroke:tClr, sw:2, dash:'4 2'});
          s += txt(x, Y.ta+13, id, {size:9.5, weight:700, fill:tClr});
          s += txt(x, Y.ta+24, `${kva||'?'}kVA ${phase==='M'?'M':'T'} · ${tot==null?'—':tot.toFixed(2)+'%'}`, {size:8, weight:700, fill:tClr});
          return;
        }

        if(!c1only){
          // Répartition → câble C2 (REMBT → CIBE)
          s += line(x, Y.bus, x, Y.cibe, {stroke:INK});
          s += txt(x+6, Y.c2-2, `C2 · HN33S33 · L₁=${l.rc.O||'?'}m · ${sect(l.rc.P, phase)}`, {size:7.5, anchor:'start', fill:'#888'});
          s += txt(x+6, Y.c2+7, `chute C2 ${a.pc==null?'—':a.pc.toFixed(2)+'%'}`, {size:7.5, weight:700, anchor:'start', fill:pcColor(a.pc)});
        } else {
          // C1 seul : note d'arrivée colonne au-dessus du CIBE
          s += line(x, Y.note+6, x, Y.cibe, {stroke:NAVY, dash:'3 2'});
        }

        // Coffret CIBE individuel (un par client)
        const ciW = 80;
        s += rect(x-ciW/2, Y.cibe, ciW, Y.cibeH, {fill:'#fff'});
        s += txt(x, Y.cibe+14, 'CIBE', {size:9, weight:700, fill:NAVY, ls:1});

        // Câble C1 (CIBE → TA)
        s += line(x, Y.cibe+Y.cibeH, x, Y.ta, {stroke:INK});
        s += txt(x+6, Y.c1-2, `C1 · ${lgtMat(l)==='cu'?'Cuivre':'AR2V'} · L₂=${l.ct.O||'?'}m · ${sect(l.ct.P, phase)}`, {size:8, anchor:'start', fill:'#555'});
        s += txt(x+6, Y.c1+8, `chute C1 ${b.pc==null?'—':b.pc.toFixed(2)+'%'}`, {size:8, weight:700, anchor:'start', fill:pcColor(b.pc)});
        s += dot(x, (Y.cibe+Y.cibeH+Y.ta)/2, '#e08a1f');

        // Tableau abonné (limite utilisateur, cadre pointillé)
        const tW = 88, tX = x-tW/2;
        s += rect(tX, Y.ta, tW, Y.taH, {fill:'#fff', stroke:tClr, sw:2, dash:'4 2'});
        s += txt(x, Y.ta+13, id, {size:9.5, weight:700, fill:tClr});
        s += txt(x, Y.ta+24, c1only
          ? `${kva||'?'} kVA ${phase==='M'?'mono':'tri'}`
          : `${kva||'?'}kVA ${phase==='M'?'M':'T'} · Σ${tot==null?'—':tot.toFixed(2)+'%'}`,
          {size:8, weight:700, fill:tClr});
      });

      s += `</svg>`;
      return s;
    }

    // Pour chaque REMBT (en commençant par les racines)
    function renderRembtPlan(r, indent){
      const lgts = lgtsOf(r.id);
      const plages = rembtPlages(r);
      const sugg = rembtSuggest(plages);
      const titleTxt = c1only
        ? `${escapeHtml(r.name)} — Dérivations individuelles CIBE → Tableaux d'abonné`
        : `${escapeHtml(r.name)} — ${sugg ? plages+'/'+sugg+' plages' : '> 12 plages (à diviser)'}${r.parentId ? ' · cascade depuis ' + escapeHtml((CI.rembts.find(x=>x.id===r.parentId)||{}).name||'—') : ''}`;

      let block = '';
      // Câble de liaison cascade : raccordement REMBT parent → ce REMBT
      if(r.parentId != null){
        const par = (CI.rembts.find(x=>x.id===r.parentId)||{}).name || '—';
        const lc = linkChute(r);
        const lcc = lc ? (lc.pc > CI.limT ? 'bad' : (lc.pc > CI.limT*0.8 ? 'warn' : 'ok')) : '';
        const chuteTxt = lc ? ` · ${lc.calibre} A · chute <b class="${lcc}">${lc.pc.toFixed(2)} %</b>` : '';
        block += `<div class="plan-cascade" style="${indent?'margin-left:40px':''}">🔗 Câble cascade <b>${escapeHtml(par)} → ${escapeHtml(r.name)}</b> — ${(r.link&&r.link.section)||'?'} mm² ALU · L ${(r.link&&r.link.long)||'?'} m${chuteTxt}</div>`;
      }
      block += `<div class="plan-rembt-section" style="${indent?'margin-left:40px;border-left:2px dashed #1f3864;padding-left:24px':''}">
        <div class="plan-rembt-title">${titleTxt}</div>
        <div class="uni-wrap">${lgts.length ? buildSvgPlan(r, lgts) : '<div style="padding:20px;color:#888;font-size:11px">Aucun logement rattaché à ce REMBT.</div>'}</div>`;

      if(r.notes && r.notes.trim()){
        block += `<div class="plan-notes">📝 ${escapeHtml(r.notes)}</div>`;
      }

      block += `</div>`;

      const children = byParent.get(r.id) || [];
      children.forEach(c => { block += renderRembtPlan(c, true); });

      return block;
    }

    if(c1only){
      // Mode C1 seul : un seul schéma CIBE → tous les logements, sans notion de REMBT
      const niveauxOrdre2 = ['SS','RDJ','RDC BAS','RDC','RDC HAUT','R+1','R+2','R+3','R+4','R+5','R+6','R+7','R+8','R+9','R+10','R+11','R+12'];
      const nivIdx2 = n => { const i = niveauxOrdre2.indexOf(n); return i === -1 ? 999 : i; };
      const allLgts = CI.lgts.map((l,i)=>({l,i})).sort((a,b)=>{
        const an=nivIdx2(a.l.niv), bn=nivIdx2(b.l.niv); if(an!==bn) return an-bn;
        return (a.l.lett||'').localeCompare(b.l.lett||'');
      });
      h += `<div class="plan-rembt-section">
        <div class="plan-rembt-title">Dérivations individuelles CIBE → Tableaux d'abonné</div>
        <div class="uni-wrap">${allLgts.length ? buildSvgPlan(null, allLgts) : '<div style="padding:20px;color:#888;font-size:11px">Aucun logement.</div>'}</div>
      </div>`;
    } else {
      const roots = byParent.get('_root') || [];
      roots.forEach(r => { h += renderRembtPlan(r, false); });
    }

    // Cartouche pied de plan
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yy = today.getFullYear();
    h += `<div class="schema-cartouche">
      <div class="schema-cartouche-cell">
        <div class="schema-cart-lbl">Projet</div>
        <div class="schema-cart-val">${escapeHtml(CI.P || 'Sans titre').toUpperCase()}</div>
      </div>
      <div class="schema-cartouche-cell">
        <div class="schema-cart-lbl">Date</div>
        <div class="schema-cart-val">${dd}/${mm}/${yy}</div>
      </div>
      <div class="schema-cartouche-cell">
        <div class="schema-cart-lbl">Échelle</div>
        <div class="schema-cart-val">Schématique</div>
      </div>
      <div class="schema-cartouche-cell">
        <div class="schema-cart-lbl">Plan n°</div>
        <div class="schema-cart-val">PE-01</div>
      </div>
      <div class="schema-cartouche-foot">A.L.GOMES — Bureau d'Études Techniques · NF C 14-100</div>
    </div>`;
  }

  h += `</div>

    <div class="formula-box">
      <b>Comment lire ce plan</b> — ${noCibe
        ? 'Schéma unifilaire du branchement collectif : <b>Coffret de façade → REMBT (jeu de barres) → un câble unique par logement (dérivation individuelle directe, sans coffret CIBE) → tableau abonné</b>. La chute indiquée est celle de cette dérivation unique, comparée à la limite totale.'
        : (c1only
          ? 'Schéma unifilaire : <b>un coffret CIBE par client → câble C1 (AR2V) → tableau abonné</b> (mode C1 seul — seul le tronçon final est dimensionné).'
          : 'Schéma unifilaire du branchement collectif : <b>Coffret de façade → REMBT (jeu de barres) → départ individuel par logement (disjoncteur → câble C2 → CIBE → câble C1 → tableau abonné)</b>.')} Le cadre rouge pointillé matérialise la limite de l'installation utilisateur (NF C 15-100). Les annotations le long de chaque câble donnent la longueur, la section ALU et le pourcentage de chute.<br>
      <b>Cascade</b> — Les REMBT alimentés par un autre REMBT sont dessinés indentés sous leur parent.
    </div>`;

  document.getElementById('sh-sch').innerHTML = h;
}


// ═══════════════════════════════════════════════════════════════════════
// NEW / IMPORT / EXPORT
// ═══════════════════════════════════════════════════════════════════════
function newProject(){
  if(!confirm('Créer un nouveau projet ? Les données actuelles seront perdues (export possible avant).')) return;
  const r = defaultRembts();
  CI = {
    P:'', lgts: defaultLgts().map(l => ({...l, rembtId: r[0].id})),
    rembts: r, limT:1, limTot:2, scope:'full', setup: defaultSetup(), ts:0
  };
  save(); R();
}

async function exportXLS(){
  if(typeof ExcelJS === 'undefined'){
    const dl = Date.now() + 8000;
    while(typeof ExcelJS === 'undefined' && Date.now() < dl) await new Promise(r => setTimeout(r,200));
    if(typeof ExcelJS === 'undefined'){ alert('Bibliothèque Excel indisponible (réseau ?).'); return; }
  }
  const wb = new ExcelJS.Workbook();
  wb.creator = 'AL GOMES — Bureau d\'Études Techniques';
  wb.created = new Date();
  const pName = (CI.P || 'Sans titre').trim();

  const navy   = {argb:'FF1F3864'};
  const navyL  = {argb:'FF2E4A7A'};
  const white  = {argb:'FFFFFFFF'};
  const greyL  = {argb:'FFF2F2F2'};
  const greyB  = {argb:'FFB4B4B4'};
  const ok     = {argb:'FFC6EFCE'};
  const bad    = {argb:'FFFFC7CE'};
  const warn   = {argb:'FFFFEB9C'};
  const blueV  = {argb:'FFDBE5F1'};

  const bT = { style:'thin', color:greyB };
  const bM = { style:'medium', color:navy };
  const border = { top:bT, bottom:bT, left:bT, right:bT };
  const borderH = { top:bM, bottom:bM, left:bT, right:bT };
  const ca = { horizontal:'center', vertical:'middle' };
  const la = { horizontal:'left', vertical:'middle' };
  const hdrFont = { bold:true, color:white, size:10, name:'Calibri' };

  // ═══ SIDE SHEETS ═══
  function buildSheet(name, side, sideLabel){
    const isFinalX = (side === finalSide());
    const ws = wb.addWorksheet(name, { properties:{tabColor:{argb:'FF7B5DA8'}},
      pageSetup:{paperSize:9, orientation:'landscape', fitToPage:true, fitToWidth:1} });
    ws.columns = [
      {width:13},{width:10},{width:10},{width:14},{width:10},{width:11},{width:7},{width:11},{width:13},
      {width:9},{width:9},{width:9},{width:11},{width:12},{width:12},{width:10}
    ];
    // Titre
    ws.mergeCells('A1:P1');
    const c1 = ws.getCell('A1'); c1.value = pName + ' — ' + sideLabel;
    c1.font = { bold:true, color:white, size:16, name:'Calibri' };
    c1.fill = { type:'pattern', pattern:'solid', fgColor:navy };
    c1.alignment = ca; ws.getRow(1).height = 32;

    ws.mergeCells('A2:P2');
    const c2 = ws.getCell('A2'); c2.value = 'Calcul de la chute de tension — '+(isFinalX ? 'câble vers TA : cuivre (ρ=0,0225) ou alu (ρ=0,037) selon logement' : 'câble ALU (ρ = 0,037 Ω·mm²/m à 90°C)')+'  ·  limite tronçon = '+CI.limT.toFixed(2)+' %  ·  limite C1+C2 = '+CI.limTot.toFixed(2)+' %';
    c2.font = { bold:true, color:{argb:'FFB4C7E7'}, size:9.5, name:'Calibri' };
    c2.fill = { type:'pattern', pattern:'solid', fgColor:navyL };
    c2.alignment = ca; ws.getRow(2).height = 18;

    ws.getRow(3).height = 8;

    // En-têtes
    const headers = ['REMBT','Niveau','Type','Lettrage EDF','HALL','Surface / kVA','M/T','Long. m','Section mm² ('+(isFinalX?'Cu/Alu':(side==='rc'?'HN33S33':'AR2V'))+')',
                     'Puiss. kVA','Disj.','Calibre A','VU (V)','% ΔU '+(side==='rc'?'C2':'C1'), '% C1+C2', 'Reco'];
    headers.forEach((v,ci)=>{
      const cell = ws.getCell(4, ci+1);
      cell.value = v;
      cell.font = hdrFont;
      cell.fill = { type:'pattern', pattern:'solid', fgColor:navy };
      cell.alignment = { ...ca, wrapText:true };
      cell.border = borderH;
    });
    ws.getRow(4).height = 30;

    // Lignes
    const rembtById = Object.fromEntries(CI.rembts.map(r => [r.id, r]));
    CI.lgts.forEach((l, idx)=>{
      const r = 5 + idx;
      const rThis = compute(l, side);
      const rOther = compute(l, side === 'rc' ? 'ct' : 'rc');
      const pcTotal = (rThis.pc != null && rOther.pc != null) ? rThis.pc + rOther.pc : null;
      const reco = rThis.rec;
      const sub = l[side];
      const bg = idx % 2 === 0 ? white : greyL;
      const rembtName = (rembtById[l.rembtId] && rembtById[l.rembtId].name) || '—';
      const condX = lgtPhase(l) === 'M' ? '2×' : '4×';
      const row = [
        rembtName, l.niv||'', (l.kind==='compt'?'Comptage TB':l.type)||'', l.lett||'',
        l.hall===''?null:l.hall, l.kind==='compt'?(lgtKva(l)+' kVA'):(l.S===''?null:l.S), lgtPhase(l),
        sub.O===''?null:sub.O, sub.P===''?'':(condX+sub.P+(isFinalX?(lgtMat(l)==='cu'?' Cu':' Al'):'')),
        rThis.p ?? null, rThis.M || '', rThis.N ?? null,
        rThis.VU == null ? null : +rThis.VU.toFixed(3),
        rThis.pc == null ? null : +rThis.pc.toFixed(4),
        pcTotal == null ? null : +pcTotal.toFixed(4),
        reco ?? null
      ];
      row.forEach((v, ci)=>{
        const cell = ws.getCell(r, ci+1);
        cell.value = v;
        cell.font = { color:{argb:'FF000000'}, size:10, name:'Calibri' };
        cell.fill = { type:'pattern', pattern:'solid', fgColor:bg };
        cell.alignment = ca;
        cell.border = border;
      });
      // % chute formatting (col 14 = %ΔU, col 15 = %C1+C2 ; Bâtiment retiré)
      const cThis = ws.getCell(r, 14);
      cThis.value = rThis.pc == null ? null : +(rThis.pc/100).toFixed(6);
      cThis.numFmt = '0.000%';
      if(rThis.pc != null){
        if(rThis.pc > CI.limT) cThis.fill = { type:'pattern', pattern:'solid', fgColor:bad };
        else if(rThis.pc > CI.limT * 0.8) cThis.fill = { type:'pattern', pattern:'solid', fgColor:warn };
        else cThis.fill = { type:'pattern', pattern:'solid', fgColor:ok };
      }
      const cTot = ws.getCell(r, 15);
      cTot.numFmt = '0.000%';
      cTot.value = pcTotal == null ? null : +(pcTotal/100).toFixed(6);
      if(pcTotal != null){
        if(pcTotal > CI.limTot) cTot.fill = { type:'pattern', pattern:'solid', fgColor:bad };
        else if(pcTotal > CI.limTot * 0.85) cTot.fill = { type:'pattern', pattern:'solid', fgColor:warn };
        else cTot.fill = { type:'pattern', pattern:'solid', fgColor:ok };
      }
      const cVU = ws.getCell(r, 13); cVU.numFmt = '0.000';
      const cS  = ws.getCell(r, 6);  cS.numFmt  = '0.00';
      ws.getRow(r).height = 18;
    });
    // Légende
    const rEnd = 5 + CI.lgts.length;
    ws.getRow(rEnd).height = 8;
    const cl = ws.getCell(rEnd+1, 1);
    ws.mergeCells(rEnd+1, 1, rEnd+1, 16);
    cl.value = 'Formules — Mono : ΔU = (0,037 × 2 × L × I) / S  ·  Tri : ΔU = (0,037 × L × I) / S  ·  %ΔU = ΔU / 2,3  ·  Section recommandée : minimum permettant %ΔU ≤ limite tronçon';
    cl.font = { italic:true, color:{argb:'FF666666'}, size:9, name:'Calibri' };
    cl.alignment = la;
  }
  buildSheet('REMBT-CIBE', 'rc', 'REMBT → COFFRET CIBE');
  buildSheet('CIBE-TA',    'ct', 'COFFRET CIBE → TABLEAU ABONNÉ');

  // ═══ DIMENSIONNEMENT REMBT (un bloc par REMBT) ═══
  const wd = wb.addWorksheet('DIMENSIONNEMENT REMBT', { properties:{tabColor:{argb:'FF7B5DA8'}} });
  wd.columns = [{width:36},{width:18},{width:14},{width:16}];
  wd.mergeCells('A1:D1');
  const wdc1 = wd.getCell('A1'); wdc1.value = pName + ' — DIMENSIONNEMENT REMBT';
  wdc1.font = { bold:true, color:white, size:16, name:'Calibri' };
  wdc1.fill = { type:'pattern', pattern:'solid', fgColor:navy };
  wdc1.alignment = ca; wd.getRow(1).height = 32;

  let curRow = 3;
  const rembtById = Object.fromEntries(CI.rembts.map(r => [r.id, r]));
  CI.rembts.forEach((r, ri) => {
    const plages = rembtPlages(r);
    const sugg = rembtSuggest(plages);
    const parent = r.parentId ? (rembtById[r.parentId] && rembtById[r.parentId].name) || '—' : 'racine (ENEDIS)';
    const nLgts = CI.lgts.filter(l => l.rembtId === r.id).length;

    // Bandeau REMBT
    wd.mergeCells(curRow, 1, curRow, 4);
    const hdr = wd.getCell(curRow, 1);
    hdr.value = r.name + '   ·   ' + nLgts + ' logement(s)   ·   alimenté par : ' + parent;
    hdr.font = { bold:true, color:white, size:12, name:'Calibri' };
    hdr.fill = { type:'pattern', pattern:'solid', fgColor:navy };
    hdr.alignment = la;
    wd.getRow(curRow).height = 24;
    curRow++;

    // En-têtes table
    ['Module','Places / module','Quantité','Plages'].forEach((v,ci)=>{
      const cell = wd.getCell(curRow, ci+1);
      cell.value = v; cell.font = hdrFont;
      cell.fill = { type:'pattern', pattern:'solid', fgColor:navyL };
      cell.alignment = ca; cell.border = borderH;
    });
    wd.getRow(curRow).height = 22;
    curRow++;

    MODULES.forEach((m, idx) => {
      const q = r.dim[m.k] || 0, p = q * m.p;
      const bg = idx % 2 === 0 ? white : greyL;
      [m.l, m.p, q, p].forEach((v, ci) => {
        const cell = wd.getCell(curRow, ci+1);
        cell.value = v;
        cell.font = { color:{argb:'FF000000'}, size:10, name:'Calibri' };
        cell.fill = { type:'pattern', pattern:'solid', fgColor:bg };
        cell.alignment = ci === 0 ? la : ca; cell.border = border;
      });
      curRow++;
    });

    // Total + suggéré
    wd.mergeCells(curRow, 1, curRow, 3);
    const ct = wd.getCell(curRow, 1); ct.value = 'NOMBRE DE PLAGES TOTAL';
    ct.font = { bold:true, color:white, size:11, name:'Calibri' };
    ct.fill = { type:'pattern', pattern:'solid', fgColor:navy };
    ct.alignment = la; ct.border = borderH;
    const ctV = wd.getCell(curRow, 4); ctV.value = plages;
    ctV.font = { bold:true, color:white, size:14, name:'Calibri' };
    ctV.fill = { type:'pattern', pattern:'solid', fgColor:navy };
    ctV.alignment = ca; ctV.border = borderH;
    wd.getRow(curRow).height = 26;
    curRow++;

    // Taille suggérée Cahors G3
    const nLgtsXLS = CI.lgts.filter(l => l.rembtId === r.id).length;
    const tooManyXLS = nLgtsXLS > REMBT_MAX_LGTS;
    wd.mergeCells(curRow, 1, curRow, 3);
    const cs = wd.getCell(curRow, 1);
    cs.value = sugg == null
      ? 'TAILLE REMBT — au-delà de 12 plages, diviser'
      : tooManyXLS
        ? `TAILLE REMBT — ⚠ ${nLgtsXLS} logements > ${REMBT_MAX_LGTS} (petit collectif), diviser`
        : 'TAILLE REMBT SUGGÉRÉE (Cahors G3)';
    cs.font = { bold:true, color:black, size:10.5, name:'Calibri' };
    const fillSugg = (sugg == null || tooManyXLS) ? bad : (plages > sugg - 1 ? warn : ok);
    cs.fill = { type:'pattern', pattern:'solid', fgColor:fillSugg };
    cs.alignment = la; cs.border = border;
    const csV = wd.getCell(curRow, 4);
    csV.value = sugg == null
      ? '> 12 — diviser'
      : tooManyXLS
        ? '↗ diviser'
        : `${sugg} plages`;
    csV.font = { bold:true, color:black, size:12, name:'Calibri' };
    csV.fill = { type:'pattern', pattern:'solid', fgColor:fillSugg };
    csV.alignment = ca; csV.border = border;
    wd.getRow(curRow).height = 22;
    curRow++;

    // Notes
    if(r.notes && r.notes.trim()){
      wd.mergeCells(curRow, 1, curRow, 4);
      const cn = wd.getCell(curRow, 1);
      cn.value = '📝 Notes : ' + r.notes;
      cn.font = { italic:true, color:{argb:'FF333333'}, size:10, name:'Calibri' };
      cn.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFFF2CC'} };
      cn.alignment = { horizontal:'left', vertical:'top', wrapText:true };
      cn.border = border;
      // Hauteur en fonction du texte
      const nLines = Math.max(1, Math.ceil(r.notes.length / 110));
      wd.getRow(curRow).height = Math.min(120, 18 + 14 * (nLines - 1));
      curRow++;
    }

    curRow++; // ligne vide entre REMBTs
  });

  // Récap global en bas
  const totPlagesAll = CI.rembts.reduce((s,r)=>s+rembtPlages(r),0);
  wd.mergeCells(curRow, 1, curRow, 3);
  const rg = wd.getCell(curRow, 1); rg.value = `RÉCAPITULATIF — ${CI.rembts.length} REMBT(s) · ${CI.lgts.length} logement(s)`;
  rg.font = { bold:true, color:white, size:11, name:'Calibri' };
  rg.fill = { type:'pattern', pattern:'solid', fgColor:navy };
  rg.alignment = la; rg.border = borderH;
  const rgV = wd.getCell(curRow, 4); rgV.value = totPlagesAll + ' plages';
  rgV.font = { bold:true, color:white, size:12, name:'Calibri' };
  rgV.fill = { type:'pattern', pattern:'solid', fgColor:navy };
  rgV.alignment = ca; rgV.border = borderH;
  wd.getRow(curRow).height = 26;

  // ═══ HIDDEN DATA SHEET (for re-import) ═══
  const wsData = wb.addWorksheet('_DATA', { state:'hidden' });
  wsData.getCell('A1').value = JSON.stringify(CI);

  // Save
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const fn = (pName.replace(/[^a-zA-Z0-9éèêëàâùûôîïç _-]/g,'_'))+'_Calculs_Individuels.xlsx';
  if(window.showSaveFilePicker){
    try{
      const h = await window.showSaveFilePicker({suggestedName:fn,types:[{description:'Fichier Excel',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx']}}]});
      const w = await h.createWritable(); await w.write(blob); await w.close();
      return;
    }catch(e){ if(e.name === 'AbortError') return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fn; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

async function importXLS(input){
  const file = input.files[0]; if(!file) return;
  if(typeof ExcelJS === 'undefined'){
    const dl = Date.now() + 8000;
    while(typeof ExcelJS === 'undefined' && Date.now() < dl) await new Promise(r => setTimeout(r,200));
    if(typeof ExcelJS === 'undefined'){ alert('Bibliothèque Excel indisponible (réseau ?).'); input.value=''; return; }
  }
  try{
    const buf = await file.arrayBuffer();
    const wb = new ExcelJS.Workbook(); await wb.xlsx.load(buf);
    const ds = wb.getWorksheet('_DATA');
    if(ds){
      const v = ds.getCell('A1').value;
      if(v){
        const d = JSON.parse(v);
        if(d && typeof d === 'object'){
          const m = migrate(d);
          CI.P = m.P; CI.lgts = m.lgts; CI.rembts = m.rembts;
          CI.limT = m.limT; CI.limTot = m.limTot; CI.scope = m.scope;
          CI.setup = m.setup; CI.ts = m.ts;
          save(); R(); input.value=''; return;
        }
      }
    }
    alert('Ce fichier Excel ne contient pas de données reconnaissables.\nUtilisez un fichier exporté depuis cette application.');
  }catch(e){ alert('Erreur d\'import : '+e.message); }
  input.value = '';
}

async function exportPDF(){
  if(typeof jspdf === 'undefined' || typeof jspdf.jsPDF === 'undefined'){
    const dl = Date.now() + 8000;
    while((typeof jspdf === 'undefined' || typeof jspdf.jsPDF === 'undefined') && Date.now() < dl) await new Promise(r => setTimeout(r,200));
    if(typeof jspdf === 'undefined' || typeof jspdf.jsPDF === 'undefined'){
      alert('Bibliothèque PDF indisponible (réseau ?).'); return;
    }
  }
  const { jsPDF } = jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const pName = (CI.P || 'Sans titre').trim();
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const navy=[31,56,100], white=[255,255,255], greyL=[242,242,242], blueA=[68,114,196];
  const okC=[198,239,206], warnC=[255,235,156], badC=[255,199,206];

  // La police PDF par défaut (Helvetica/WinAnsi) ne gère pas les symboles
  // → ≤ Ω ρ √ ni les emojis : on remplace/retire pour éviter les caractères
  // parasites. On intercepte tous les doc.text (y compris ceux d'autoTable).
  function pdfSafe(s){
    return String(s)
      .replace(/→|↗/g,'->').replace(/←/g,'<-').replace(/↑/g,'^').replace(/↓/g,'v')
      .replace(/≤/g,'<=').replace(/≥/g,'>=').replace(/≈/g,'~')
      .replace(/Ω/g,'Ohm').replace(/ρ/g,'rho').replace(/√/g,'V').replace(/Δ/g,'D').replace(/Σ/g,'Somme').replace(/Φ/g,'Ph')
      .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, c => '₀₁₂₃₄₅₆₇₈₉'.indexOf(c).toString())
      .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2300}-\u{23FF}\u{2500}-\u{257F}\u{2B00}-\u{2BFF}\u{FE00}-\u{FE0F}]/gu,'')
      .replace(/[ \t]{3,}/g,'  ');
  }
  const _docText = doc.text.bind(doc);
  doc.text = function(txt, ...rest){
    if(typeof txt === 'string') txt = pdfSafe(txt);
    else if(Array.isArray(txt)) txt = txt.map(t => typeof t === 'string' ? pdfSafe(t) : t);
    return _docText(txt, ...rest);
  };
  // autoTable : nettoie le texte de chaque cellule à l'analyse (largeur + rendu)
  if(typeof doc.autoTable === 'function'){
    const _autoTable = doc.autoTable.bind(doc);
    doc.autoTable = function(opts){
      const userParse = opts && opts.didParseCell;
      const o = Object.assign({}, opts, { didParseCell: data => {
        if(data.cell && Array.isArray(data.cell.text)) data.cell.text = data.cell.text.map(pdfSafe);
        if(typeof userParse === 'function') userParse(data);
      }});
      return _autoTable(o);
    };
  }

  // Logo AL GOMES → dataURL (échoue silencieusement si indisponible)
  let logo = null;
  try{
    logo = await new Promise(res => {
      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = () => { try{ const cv = document.createElement('canvas'); cv.width = img.naturalWidth; cv.height = img.naturalHeight; cv.getContext('2d').drawImage(img,0,0); res({ data: cv.toDataURL('image/png'), ratio: img.naturalWidth / img.naturalHeight }); }catch(e){ res(null); } };
      img.onerror = () => res(null);
      img.src = 'assets/img/algomes-logo.png';
    });
  }catch(e){ logo = null; }

  // En-tête unifié (bandeau marine + logo + titre + sous-titre)
  function header(title, subtitle){
    doc.setFillColor(...navy); doc.rect(0,0,pageW,18,'F');
    if(logo){
      const hh = 12, ww = hh * logo.ratio;
      doc.setFillColor(255,255,255); doc.roundedRect(5, 2.6, ww + 4, hh + 2.2, 1.6, 1.6, 'F');
      try{ doc.addImage(logo.data, 'PNG', 7, 3.7, ww, hh); }catch(e){}
    }
    doc.setFont('helvetica','bold'); doc.setTextColor(...white);
    doc.setFontSize(14); doc.text(title, pageW/2, subtitle ? 9 : 11, {align:'center'});
    if(subtitle){
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(180,199,231);
      doc.text(subtitle, pageW/2, 14.5, {align:'center'});
    }
  }

  function footer(){
    doc.setFontSize(7); doc.setTextColor(160,160,160);
    doc.text('AL GOMES — Bureau d\'Études Techniques Électricité',14,pageH-6);
    doc.text('Calculs individuels ENEDIS', pageW-14, pageH-6, {align:'right'});
    doc.text('Page '+doc.internal.getNumberOfPages(), pageW/2, pageH-6, {align:'center'});
  }

  const rembtByIdPDF = Object.fromEntries(CI.rembts.map(r => [r.id, r]));

  function addSidePage(title, side){
    const isFinal = (side === finalSide());
    header(pName + ' — ' + title,
      (isFinal ? 'Câble vers TA : cuivre (ρ=0,0225) ou alu (ρ=0,037) selon logement' : 'Câble ALU  ρ = 0,037 Ω·mm²/m')+'   ·   limite tronçon = '+CI.limT.toFixed(2)+' %   ·   limite C1+C2 = '+CI.limTot.toFixed(2)+' %');

    const head = [['REMBT','Niv','Type','Lettr.','HALL','S/kVA','M/T','L (m)','S mm²','kVA','Disj.','I (A)','VU (V)','%ΔU '+(side==='rc'?'C2':'C1'),'% C1+C2']];
    const body = CI.lgts.map(l=>{
      const r = compute(l, side);
      const o = compute(l, side==='rc'?'ct':'rc');
      const tot = (r.pc!=null && o.pc!=null) ? r.pc + o.pc : null;
      const sub = l[side];
      const rembtName = (rembtByIdPDF[l.rembtId] && rembtByIdPDF[l.rembtId].name) || '—';
      const pcCell = (v, lim) => {
        if(v == null) return '';
        const bg = v > lim ? badC : (v > lim*0.85 ? warnC : okC);
        return { content: v.toFixed(3)+' %', styles: { fillColor: bg, fontStyle:'bold' } };
      };
      const condP = lgtPhase(l) === 'M' ? '2×' : '4×';
      return [
        rembtName, l.niv||'', (l.kind==='compt'?'Compt.':l.type)||'', l.lett||'',
        l.hall===''?'':l.hall, l.kind==='compt'?(lgtKva(l)+'kVA'):(l.S===''?'':l.S), lgtPhase(l),
        sub.O===''?'':sub.O, sub.P===''?'':(condP+sub.P+(isFinal?(lgtMat(l)==='cu'?' Cu':' Al'):'')),
        r.p ?? '', r.M || '', r.N ?? '',
        r.VU == null ? '' : r.VU.toFixed(2),
        pcCell(r.pc, CI.limT),
        pcCell(tot, CI.limTot)
      ];
    });
    doc.autoTable({
      head, body, startY: 22, theme:'grid',
      headStyles:{fillColor:navy, textColor:white, fontStyle:'bold', fontSize:7.5, halign:'center'},
      bodyStyles:{fontSize:7.5, halign:'center'},
      alternateRowStyles:{fillColor:greyL},
      styles:{cellPadding:1.2, lineColor:[180,180,180], lineWidth:0.2},
      margin:{left:6, right:6}
    });
    footer();
  }

  // ── Page « Cadre normatif » : chutes max, max logements/REMBT, longueurs max
  function addNormPage(){
    header('CADRE NORMATIF & LIMITES', pName);
    const limT = CI.limT, limTot = CI.limTot;
    const tbl = (startY, head, body, col0w) => { doc.autoTable({
      startY, head:[head], body, theme:'grid', margin:{left:14, right:14},
      headStyles:{fillColor:navy, textColor:white, fontStyle:'bold', fontSize:9, halign:'center'},
      bodyStyles:{fontSize:9, halign:'center'},
      columnStyles:{0:{halign:'left', cellWidth:col0w, fontStyle:'bold'}},
      styles:{cellPadding:2.2, lineColor:[180,180,180], lineWidth:0.2}
    }); return doc.lastAutoTable.finalY; };
    const note = (y, t) => { doc.setFont('helvetica','italic'); doc.setFontSize(7.5); doc.setTextColor(110,110,110);
      doc.text(t, 14, y, {maxWidth: pageW-28}); };
    const h2 = (y, t) => { doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...navy); doc.text(t, 14, y); };

    let y = 25;
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(90,90,90);
    doc.text('Synthèse des règles appliquées dans ce dossier. Les textes officiels (NF C 14-100, NF C 15-100) étant protégés, les exigences sont reformulées avec la clause de référence.', 14, y, {maxWidth: pageW-28});
    y += 11;

    h2(y, '1.  Chutes de tension maximales admissibles'); y += 3;
    const _rulesRows = CI.scope === 'noCibe'
      ? [
          ['Coffret de façade (CCPI) → REMBT (liaison amont)', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Liaison cascade REMBT → REMBT', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Dérivation individuelle REMBT → tableau abonné (sans CIBE)', '≤ '+limTot.toFixed(2)+' %', 'NF C 14-100'],
        ]
      : CI.scope === 'c1only'
      ? [
          ['CIBE → tableau abonné (tronçon C1)', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
        ]
      : [
          ['Coffret de façade (CCPI) → REMBT (liaison amont)', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Liaison cascade REMBT → REMBT', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Étape 2 — REMBT → CIBE (tronçon C2)', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Étape 3 — CIBE → tableau abonné (tronçon C1)', '≤ '+limT.toFixed(2)+' %', 'NF C 14-100'],
          ['Total branchement (C1 + C2)', '≤ '+limTot.toFixed(2)+' %', 'NF C 14-100'],
        ];
    y = tbl(y, ['Tronçon','Chute max','Référence'], _rulesRows, 150) + 4;
    note(y, CI.scope === 'noCibe'
      ? 'Valeurs configurées dans le dossier. En mode « sans CIBE », chaque logement est alimenté par un câble unique REMBT → tableau abonné, comparé à la limite totale (par défaut 2 %). La liaison coffret de façade → REMBT ne s\'applique que si un CCPI est présent.'
      : 'Valeurs configurées dans le dossier. NF C 14-100 (branchement collectif) : par défaut 1 % par tronçon et 2 % au total. La liaison coffret de façade → REMBT ne s\'applique que si un CCPI est présent.'); y += 9;

    h2(y, '2.  Nombre maximal de logements par REMBT'); y += 3;
    y = tbl(y, ['Règle','Valeur','Référence'], [
      ['Dérivations individuelles par REMBT (petit collectif)', REMBT_MAX_LGTS+' maxi', 'NF C 14-100 §10'],
    ], 150) + 4;
    note(y, 'Au-delà de '+REMBT_MAX_LGTS+' logements : grand collectif → cascade de plusieurs REMBT ou répartiteur RCP400.'); y += 9;

    h2(y, '3.  Longueurs maximales admissibles du conducteur (limite de '+limT.toFixed(2)+' %)'); y += 3;
    const lmax = (S,I,k) => (limT * 2.3 * S) / (0.037 * k * I);
    const secs = [16,25,35];
    y = tbl(y, ['Section ALU (mm²)','Mono 45 A (m)','Mono 60 A (m)','Tri 60 A (m)'],
      secs.map(S => [String(S), lmax(S,45,2).toFixed(1), lmax(S,60,2).toFixed(1), lmax(S,60,1).toFixed(1)]), 50) + 4;
    note(y, 'Longueur maxi pour rester sous la limite. Formule : L = %lim × 2,3 × S / (k × ρ × I), avec ρ = 0,037 Ω·mm²/m, k = 2 (mono) ou 1 (tri), I = calibre disjoncteur. Logement : section limitée à 35 mm² (HN33S33 / AR2V) sur les deux tronçons.');
    footer();
  }

  const okPDF = [198,239,206], warnPDF = [255,235,156], badPDF = [255,199,206];
  const c1onlyExport = (CI.scope === 'c1only');
  const noCibeExport = (CI.scope === 'noCibe');

  // Pages à inclure (cases à cocher de l'onglet Synthèse). Par défaut tout est
  // coché → PDF identique à avant.
  const _pp = pdfPageOpts;
  const _dimOn = _pp.dim && !c1onlyExport;
  if(!_pp.norm && !_pp.chutes && !_dimOn && !_pp.schema){
    alert('Sélectionnez au moins une page à inclure dans le PDF.'); return;
  }
  // Saut de page entre sections : on n'ajoute une page que si une section a
  // déjà été rendue (évite une page blanche en tête quand on en masque).
  let _emitted = false;
  const startSection = () => { if(_emitted) doc.addPage(); _emitted = true; };

  // Cadre normatif
  if(_pp.norm){ startSection(); addNormPage(); }

  // Pages de chutes selon le mode
  if(_pp.chutes){
    startSection();
    if(noCibeExport){
      addSidePage('REMBT → TABLEAU ABONNÉ (sans CIBE)', 'rc');
    } else if(c1onlyExport){
      addSidePage('COFFRET CIBE → TABLEAU ABONNÉ', 'ct');
    } else {
      addSidePage('REMBT → COFFRET CIBE', 'rc');
      doc.addPage();
      addSidePage('COFFRET CIBE → TABLEAU ABONNÉ', 'ct');
    }
  }

  // ── Dimensionnement REMBT (un bloc par REMBT) — masqué en C1 seul ──
  if(_dimOn){
  startSection();
  header(pName + ' — DIMENSIONNEMENT REMBT',
    `${CI.rembts.length} REMBT(s)  ·  ${CI.lgts.length} logement(s)  ·  ${CI.rembts.reduce((s,r)=>s+rembtPlages(r),0)} plages au total`);

  let yPos = 24;

  CI.rembts.forEach((r, ri) => {
    const plages = rembtPlages(r);
    const sugg = rembtSuggest(plages);
    const parent = r.parentId ? (rembtByIdPDF[r.parentId] && rembtByIdPDF[r.parentId].name) || '—' : 'racine (ENEDIS)';
    const nLgts = CI.lgts.filter(l => l.rembtId === r.id).length;

    // Saut de page si plus de place
    if(yPos > pageH - 70){
      footer();
      doc.addPage();
      header(pName + ' — DIMENSIONNEMENT REMBT (suite)', '');
      yPos = 24;
    }

    // Bandeau REMBT
    doc.setFillColor(...navy); doc.rect(8, yPos, pageW - 16, 8, 'F');
    doc.setFontSize(10); doc.setTextColor(...white); doc.setFont('helvetica','bold');
    doc.text(`${r.name}  ·  ${nLgts} logement(s)  ·  alimenté par : ${parent}`, 12, yPos + 5.5);
    yPos += 9;

    // Câble d'alimentation amont : CCPI (racine) ou liaison cascade (non racine)
    const up = (r.parentId == null) ? cfChute(r) : linkChute(r);
    if(up){
      const upCfg = (r.parentId == null) ? r.cf : r.link;
      const upLbl = (r.parentId == null) ? 'CCPI → REMBT' : (parent + ' → ' + r.name);
      const upCls = up.pc > CI.limT ? badPDF : (up.pc > CI.limT*0.8 ? warnPDF : okPDF);
      doc.setFillColor(...upCls); doc.rect(8, yPos, pageW - 16, 6, 'F');
      doc.setFontSize(8); doc.setTextColor(40,30,60); doc.setFont('helvetica','bold');
      doc.text(`Câble d'alimentation (${upLbl}) : L = ${upCfg.long||'?'} m  ·  ${upCfg.section||'?'} mm² ALU  ·  I = ${Math.round(up.Itri)} A (foisonné, tri)  ·  chute ${up.pc.toFixed(2)} %`, 12, yPos + 4.2);
      yPos += 8;
    }

    const dHead = [['Module','Places','Qté','Plages']];
    const dBody = MODULES.map(m => {
      const q = r.dim[m.k] || 0, p = q*m.p;
      return [m.l, m.p, q, p];
    });
    const tooManyPDF = nLgts > REMBT_MAX_LGTS;
    const sizeBg = (sugg == null || tooManyPDF) ? badPDF : (plages > sugg - 1 ? warnPDF : okPDF);
    dBody.push([{content:'NOMBRE DE PLAGES', colSpan:3, styles:{fillColor:navy, textColor:white, fontStyle:'bold'}},
                {content:plages, styles:{fillColor:navy, textColor:white, fontStyle:'bold'}}]);
    dBody.push([{
      content: tooManyPDF
        ? `TAILLE REMBT — ⚠ ${nLgts}>${REMBT_MAX_LGTS} lgts, diviser`
        : 'TAILLE REMBT SUGGÉRÉE (Cahors G3)',
      colSpan:3,
      styles:{fillColor:sizeBg, fontStyle:'bold'}
    }, {
      content: sugg == null
        ? '> 12 — diviser'
        : tooManyPDF
          ? '↗ diviser'
          : `${sugg} plages`,
      styles:{fillColor:sizeBg, fontStyle:'bold'}
    }]);
    if(r.notes && r.notes.trim()){
      dBody.push([{content:'📝 Notes : '+r.notes, colSpan:4, styles:{fontStyle:'italic', fillColor:[255,242,204], halign:'left'}}]);
    }

    doc.autoTable({
      head:dHead, body:dBody, startY: yPos, theme:'grid',
      headStyles:{fillColor:[91,63,140], textColor:white, fontStyle:'bold', fontSize:9, halign:'center'},
      bodyStyles:{fontSize:9, halign:'center'},
      columnStyles:{0:{halign:'left', cellWidth:120}},
      styles:{cellPadding:2, lineColor:[180,180,180], lineWidth:0.2},
      margin:{left:8, right:8}
    });
    yPos = doc.lastAutoTable.finalY + 6;
  });
  footer();
  } // fin if(_dimOn) — dimensionnement REMBT

  // ─────────────────────────────────────────────────────────────
  // ── SCHÉMA RÉCAPITULATIF (topologie + tableau complet) ──────
  // ─────────────────────────────────────────────────────────────
  if(_pp.schema){
  startSection();
  const c1onlyPDF = c1onlyExport;
  header(pName + ' — SCHÉMA RÉCAPITULATIF', c1onlyPDF
    ? `Mode C1 seul — dérivations CIBE → Tableau abonné  ·  ${CI.lgts.length} logement(s)`
    : `Arborescence Coffret de façade → REMBT → logements  ·  ${CI.rembts.length} REMBT(s)  ·  ${CI.lgts.length} logement(s)`);

  // ── 1. Topologie graphique (REMBT boxes + lignes) ──────────
  // Démarre directement aux REMBT racines (pas de bloc Réseau ENEDIS en amont)
  let sy = 28;

  // Préparer arbre REMBT
  const byParentPDF = new Map();
  CI.rembts.forEach(r => { const pid = r.parentId || '_root'; if(!byParentPDF.has(pid)) byParentPDF.set(pid, []); byParentPDF.get(pid).push(r); });
  const rootsPDF = byParentPDF.get('_root') || [];

  // Mise en page horizontale par profondeur
  const boxW = 60, boxH = 26, hGap = 8, vGap = 16;
  function drawRembtBox(r, x, y){
    const plages = rembtPlages(r);
    const sugg = rembtSuggest(plages);
    const nLgts = CI.lgts.filter(l => l.rembtId === r.id).length;
    const tooMany = nLgts > REMBT_MAX_LGTS;
    const sizeBg = (sugg == null || tooMany) ? badPDF : (plages > sugg - 1 ? warnPDF : okPDF);
    // Boîte
    doc.setFillColor(...sizeBg);
    doc.setDrawColor(120, 100, 160);
    doc.setLineWidth(0.3);
    doc.roundedRect(x, y, boxW, boxH, 1.5, 1.5, 'FD');
    // Nom
    doc.setFontSize(9); doc.setTextColor(40, 30, 60); doc.setFont('helvetica','bold');
    doc.text(r.name.substring(0,28), x + boxW/2, y + 5, {align:'center'});
    // Taille
    doc.setFontSize(7); doc.setFont('helvetica','normal');
    const sizeLine = sugg == null
      ? '> 12 plages — diviser'
      : tooMany
        ? `${nLgts}>${REMBT_MAX_LGTS} lgts — diviser`
        : `${plages}/${sugg} plages`;
    doc.text(sizeLine, x + boxW/2, y + 10, {align:'center'});
    // Stats
    doc.text(`${nLgts} logement(s)`, x + boxW/2, y + 14.5, {align:'center'});
    // Modules
    const mods = MODULES.filter(m => (r.dim[m.k]||0) > 0).map(m => `${m.n}×${r.dim[m.k]}`).join('  ');
    doc.setFontSize(6); doc.setTextColor(60, 50, 80);
    doc.text(mods || '(aucun module)', x + boxW/2, y + 19, {align:'center'});
    // Notes si présentes
    if(r.notes && r.notes.trim()){
      doc.setFontSize(5.5); doc.setFont('helvetica','italic'); doc.setTextColor(120, 80, 30);
      const notes = r.notes.length > 70 ? r.notes.substring(0, 67) + '...' : r.notes;
      doc.text('📝 ' + notes, x + boxW/2, y + 23, {align:'center', maxWidth:boxW-4});
    }
  }

  // Calcule la "largeur" requise par sous-arbre (en nombre de feuilles)
  function subtreeWidth(r){
    const children = byParentPDF.get(r.id) || [];
    if(children.length === 0) return 1;
    return children.reduce((s,c) => s + subtreeWidth(c), 0);
  }
  // Largeur globale en mm
  const totalLeaves = rootsPDF.reduce((s,r)=>s+subtreeWidth(r),0) || 1;
  const totalW = totalLeaves * (boxW + hGap) - hGap;
  const startX = (pageW - totalW)/2;

  // Renderer récursif
  function drawTree(r, x, y){
    const w = subtreeWidth(r) * (boxW + hGap) - hGap;
    const centerX = x + w/2 - boxW/2;
    drawRembtBox(r, centerX, y);
    // Ligne du parent au box (en haut)
    doc.setDrawColor(120, 100, 160); doc.setLineWidth(0.4);
    doc.line(centerX + boxW/2, y - vGap/2, centerX + boxW/2, y);
    const children = byParentPDF.get(r.id) || [];
    if(children.length === 0) return;
    // Ligne descendante du REMBT vers ses enfants
    doc.line(centerX + boxW/2, y + boxH, centerX + boxW/2, y + boxH + vGap/2);
    let cx = x;
    const cy = y + boxH + vGap;
    if(children.length > 1){
      // Barre horizontale au-dessus de la rangée des enfants
      const firstCx = cx + subtreeWidth(children[0])*(boxW+hGap)/2 - boxW/2 + boxW/2;
      let lastCx = cx;
      let runX = cx;
      children.forEach(c => {
        const sw = subtreeWidth(c) * (boxW+hGap) - hGap;
        lastCx = runX + sw/2;
        runX += sw + hGap;
      });
      // recalculate first center
      let rx = x;
      const firstC = rx + subtreeWidth(children[0])*(boxW+hGap)/2 - boxW/2 + boxW/2;
      let lx = rx;
      children.forEach(c => {
        const sw = subtreeWidth(c) * (boxW+hGap) - hGap;
        lx = rx + sw/2;
        rx += sw + hGap;
      });
      doc.line(firstC, cy - vGap/2, lx, cy - vGap/2);
    }
    children.forEach(c => {
      const cw = subtreeWidth(c) * (boxW + hGap) - hGap;
      drawTree(c, cx, cy);
      cx += cw + hGap;
    });
  }

  // Si au moins un root a un coffret de façade actif, on insère une ligne
  // de CF entre ENEDIS et les REMBT racines.
  const hasAnyCF = rootsPDF.some(r => r.cf && r.cf.active);
  const cfH = 14, cfGapBelow = 6;
  const sy0 = sy;                              // y de la ligne ENEDIS (barre horizontale)
  if(hasAnyCF) sy = sy + cfH + cfGapBelow + 6; // décale les REMBTs vers le bas

  let cx = startX;
  // Plus de bloc Réseau ENEDIS — on démarre directement aux Coffrets de façade ou REMBT.

  // Dessine éventuellement les coffrets de façade et les liaisons CF→REMBT
  if(hasAnyCF && !c1onlyPDF){
    let rx = startX;
    rootsPDF.forEach(r => {
      const sw = subtreeWidth(r) * (boxW + hGap) - hGap;
      const centerX = rx + sw/2;
      if(r.cf && r.cf.active){
        const cfW = 50;
        const cfX = centerX - cfW/2;
        const cfY = sy0;
        // Boîte CF — libellé simple "Coffret de façade", pas de calibre
        doc.setFillColor(255, 255, 255);
        doc.setDrawColor(0, 0, 0);
        doc.setLineWidth(0.5);
        doc.roundedRect(cfX, cfY, cfW, cfH, 1, 1, 'FD');
        doc.setFontSize(8); doc.setTextColor(31, 56, 100); doc.setFont('helvetica','bold');
        doc.text('Coffret de', centerX, cfY + 5.5, {align:'center'});
        doc.text('façade', centerX, cfY + 10, {align:'center'});
        // Liaison CF → REMBT (avec étiquette câble L/S)
        doc.setDrawColor(31, 56, 100); doc.setLineWidth(0.5);
        doc.line(centerX, cfY + cfH, centerX, sy - vGap/2);
        doc.setFontSize(6); doc.setTextColor(60, 60, 60); doc.setFont('helvetica','italic');
        doc.text(`HN33S33 · L=${r.cf.long||'?'} m · 4×${r.cf.section||'?'} mm²`, centerX + 1, cfY + cfH + (sy - vGap/2 - cfY - cfH)/2, {baseline:'middle'});
      }
      rx += sw + hGap;
    });
  }

  // Dessine chaque racine (topologie REMBT — uniquement en mode complet)
  if(!c1onlyPDF){
    rootsPDF.forEach(r => {
      const sw = subtreeWidth(r) * (boxW + hGap) - hGap;
      drawTree(r, cx, sy);
      cx += sw + hGap;
    });
  }

  // Calcule la profondeur max pour savoir où placer le tableau
  function depth(r){
    const c = byParentPDF.get(r.id) || [];
    return 1 + (c.length ? Math.max(...c.map(depth)) : 0);
  }
  const maxDepth = rootsPDF.length ? Math.max(...rootsPDF.map(depth)) : 1;
  const treeBottom = sy + maxDepth * (boxH + vGap) - vGap + 4;
  let ty = c1onlyPDF ? 26 : Math.max(treeBottom + 8, 90);

  // ── 2. Tableau récapitulatif complet ───────────────────────
  // Saut de page si manque de place
  if(ty > pageH - 40){
    footer();
    doc.addPage();
    header(pName + ' — SCHÉMA RÉCAPITULATIF (suite)', '');
    ty = 24;
  }

  // En-tête bandeau
  doc.setFillColor(...navy); doc.rect(8, ty, pageW - 16, 7, 'F');
  doc.setFontSize(9.5); doc.setTextColor(...white); doc.setFont('helvetica','bold');
  doc.text('TABLEAU RÉCAPITULATIF — tous les logements', 12, ty + 5);
  ty += 9;

  // Tri logements par REMBT puis bât + niv + lettrage
  const sortedLgts = CI.lgts.slice().map((l, idx) => ({l, idx})).sort((a, b) => {
    const ra = (rembtByIdPDF[a.l.rembtId] && rembtByIdPDF[a.l.rembtId].name) || '';
    const rb = (rembtByIdPDF[b.l.rembtId] && rembtByIdPDF[b.l.rembtId].name) || '';
    if(ra !== rb) return ra.localeCompare(rb);
    if((a.l.niv||'') !== (b.l.niv||'')) return (a.l.niv||'').localeCompare(b.l.niv||'');
    return (a.l.lett||'').localeCompare(b.l.lett||'');
  });

  const recapHead = noCibeExport
    ? [['REMBT','Niv','Lett.','Type','S / kVA','kVA','M/T','L (m)','Section','% dériv.','État']]
    : [['REMBT','Niv','Lett.','Type','S / kVA','kVA','M/T','L₁','S₁','%C2','L₂','S₂','%C1','Σ C1+C2','État']];
  const recapBody = sortedLgts.map(({l, idx}) => {
    const a = compute(l, 'rc'), b = compute(l, 'ct');
    const tot = (a.pc != null && b.pc != null) ? a.pc + b.pc : null;
    const rname = (rembtByIdPDF[l.rembtId] && rembtByIdPDF[l.rembtId].name) || '—';
    const pcCell = (v, lim) => {
      if(v == null) return '';
      const bg = v > lim ? badPDF : (v > lim*0.85 ? warnPDF : okPDF);
      return { content: v.toFixed(3)+' %', styles: { fillColor: bg, fontStyle:'bold' } };
    };
    const condR = lgtPhase(l) === 'M' ? '2×' : '4×';
    const sCell = l.kind==='compt'?(lgtKva(l)+'kVA'):(l.S===''?'—':l.S);
    const typeCell = (l.kind==='compt'?'Compt.':l.type)||'—';
    const stBuild = (val) => val == null ? '' : {
      content: val > CI.limTot ? '✗ HORS' : (val > CI.limTot*0.85 ? '⚠ LIMITE' : '✓ OK'),
      styles: { fillColor: val > CI.limTot ? badPDF : (val > CI.limTot*0.85 ? warnPDF : okPDF), fontStyle:'bold' }
    };
    if(noCibeExport){
      // Sans CIBE : un câble unique REMBT → TA (tronçon rc), comparé à la limite totale
      return [
        rname, l.niv||'—', l.lett||'—', typeCell,
        sCell, a.p ?? '—', lgtPhase(l),
        l.rc.O||'—', l.rc.P==''?'—':(condR+l.rc.P+(lgtMat(l)==='cu'?' Cu':' Al')), pcCell(a.pc, CI.limTot), stBuild(a.pc)
      ];
    }
    const tot2 = c1onlyPDF ? b.pc : tot;
    return [
      rname, l.niv||'—', l.lett||'—', typeCell,
      sCell, a.p ?? '—', lgtPhase(l),
      l.rc.O||'—', l.rc.P==''?'—':(condR+l.rc.P), pcCell(a.pc, CI.limT),
      l.ct.O||'—', l.ct.P==''?'—':(condR+l.ct.P+(lgtMat(l)==='cu'?' Cu':' Al')), pcCell(b.pc, CI.limT),
      pcCell(tot2, CI.limTot), stBuild(tot2)
    ];
  });

  doc.autoTable({
    head:recapHead, body:recapBody, startY: ty, theme:'grid',
    headStyles:{fillColor:navy, textColor:white, fontStyle:'bold', fontSize:7, halign:'center'},
    bodyStyles:{fontSize:6.8, halign:'center'},
    columnStyles: noCibeExport ? {
      0:{halign:'left', fontStyle:'bold', cellWidth:28},
      1:{cellWidth:16}, 2:{cellWidth:16}, 3:{cellWidth:14},
      4:{cellWidth:16}, 5:{cellWidth:12}, 6:{cellWidth:11},
      7:{cellWidth:16}, 8:{cellWidth:18}, 9:{cellWidth:22}, 10:{cellWidth:'auto'}
    } : {
      0:{halign:'left', fontStyle:'bold', cellWidth:24},
      1:{cellWidth:12}, 2:{cellWidth:13}, 3:{cellWidth:10},
      4:{cellWidth:12}, 5:{cellWidth:10}, 6:{cellWidth:9},
      7:{cellWidth:10}, 8:{cellWidth:12}, 9:{cellWidth:18},
      10:{cellWidth:10}, 11:{cellWidth:12}, 12:{cellWidth:18},
      13:{cellWidth:20}, 14:{cellWidth:'auto'}
    },
    alternateRowStyles:{fillColor:[248,247,252]},
    styles:{cellPadding:1.2, lineColor:[180,180,180], lineWidth:0.15},
    margin:{left:6, right:6}
  });
  footer();
  } // fin if(_pp.schema) — schéma récapitulatif

  const fn = (pName.replace(/[^a-zA-Z0-9éèêëàâùûôîïç _-]/g,'_'))+'_Calculs_Individuels.pdf';
  if(window.showSaveFilePicker){
    try{
      const buf = doc.output('arraybuffer');
      const blob = new Blob([buf], {type:'application/pdf'});
      const h = await window.showSaveFilePicker({suggestedName:fn,types:[{description:'Fichier PDF',accept:{'application/pdf':['.pdf']}}]});
      const w = await h.createWritable(); await w.write(blob); await w.close();
      return;
    }catch(e){ if(e.name === 'AbortError') return; }
  }
  doc.save(fn);
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
load();
R();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</body>
