<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.L.GOMES — Dossier matériel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth-guard.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #13161f;
  --surface2: #1a1e2a;
  --border: #2a2f42;
  --text: #e2e4ea;
  --text2: #8b90a5;
  --accent: #F59E0B;
  --accent-soft: rgba(245, 158, 11, 0.10);
  --accent-border: rgba(245, 158, 11, 0.40);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Rajdhani', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.empty-card {
  max-width: 520px;
  width: 100%;
  background: linear-gradient(145deg, var(--surface), var(--surface2));
  border: 1px solid var(--accent-border);
  border-radius: 16px;
  padding: 48px 36px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.empty-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
}
.empty-icon svg { width: 36px; height: 36px; }
h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 12px;
  color: var(--accent);
}
p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
}
.tag {
  display: inline-block;
  margin-top: 22px;
  padding: 6px 14px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-border);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}
</style>
</head>
<body>
<main class="empty-card">
  <div class="empty-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
  </div>
  <h1>DOSSIER MATÉRIEL</h1>
  <p>Cette page est prête à recevoir le contenu du module Dossier matériel.<br>Dis-moi ce que tu veux y mettre et je l'implémente.</p>
  <span class="tag">À venir</span>
</main>
</body>
</html>
