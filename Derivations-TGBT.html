<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:13px}
body{min-height:100vh;background:#14161e;color:rgba(236,239,246,0.90);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px),
  repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px);background-size:4px 4px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 70% at 50% 30%,transparent 0%,rgba(10,12,20,0.55) 100%)}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:linear-gradient(180deg,rgba(20,22,30,0.92) 0%,rgba(20,22,30,0.75) 100%);border-bottom:1px solid rgba(104,118,156,0.10);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-center{display:flex;align-items:center;gap:16px}
.btn-top{display:flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(104,118,156,0.25);border-radius:6px;
  background:rgba(62,76,112,0.08);color:rgba(208,217,233,0.85);font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease;text-decoration:none}
.btn-top:hover{background:rgba(62,76,112,0.20);border-color:rgba(104,118,156,0.45);color:#EDF0F7}
.btn-top svg{width:14px;height:14px;opacity:0.7}
.topbar-sep{width:1px;height:18px;background:rgba(104,118,156,0.15)}
.topbar-title{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:600;color:rgba(236,239,246,0.9);letter-spacing:1px}
.topbar-clock{display:flex;align-items:center;gap:20px;font-family:'Segoe UI',system-ui,sans-serif;color:rgba(208,217,233,0.6);font-size:13px;letter-spacing:0.8px}
.topbar-time{font-size:15px;font-weight:500;color:rgba(236,239,246,0.85);font-variant-numeric:tabular-nums;letter-spacing:1.5px}
.topbar-date{font-size:12.5px;color:rgba(190,199,219,0.50);letter-spacing:1px;text-transform:uppercase}
.topbar-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.badge-purple{background:rgba(62,76,112,0.15);color:rgba(150,165,200,0.85);border:1px solid rgba(104,118,156,0.20)}
.badge-count{background:rgba(62,76,112,0.25);color:rgba(208,217,233,0.90);border:1px solid rgba(104,118,156,0.30)}

.tabs{position:fixed;top:48px;left:0;right:0;z-index:99;display:flex;gap:2px;padding:0 24px;height:42px;align-items:stretch;
  background:linear-gradient(180deg,rgba(20,22,30,0.90),rgba(20,22,30,0.85));border-bottom:1px solid rgba(104,118,156,0.10);
  backdrop-filter:blur(10px)}
.tab{padding:0 20px;display:flex;align-items:center;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(190,199,219,0.45);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s}
.tab:hover{color:rgba(208,217,233,0.75);background:rgba(62,76,112,0.06)}
.tab.active{color:rgba(150,165,200,0.95);border-bottom-color:#7E7BCE}
.tab-add{color:rgba(104,118,156,0.50);font-size:16px;padding:0 14px;cursor:pointer;display:flex;align-items:center;transition:color 0.3s}
.tab-add:hover{color:#9BA6DB}

.content{position:relative;z-index:1;margin-top:90px;padding:20px 24px 60px}
.sheet{display:none;animation:shIn .3s ease}.sheet.active{display:block}
@keyframes shIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.card{position:relative;border-radius:10px;border:1px solid rgba(104,118,156,0.12);
  background:linear-gradient(165deg,rgba(29,33,48,0.85) 0%,rgba(20,22,30,0.92) 100%);margin-bottom:18px;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.010) 1px,rgba(255,255,255,0.010) 2px),
  repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.010) 1px,rgba(255,255,255,0.010) 2px);background-size:4px 4px}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(104,118,156,0.18),transparent);pointer-events:none}
.card-h{position:relative;padding:14px 20px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(104,118,156,0.08);font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(208,217,233,0.75)}
.card-h .ic{width:30px;height:30px;border-radius:7px;background:rgba(62,76,112,0.15);border:1px solid rgba(104,118,156,0.15);
  display:flex;align-items:center;justify-content:center;font-size:14px}
.card-h .rt{margin-left:auto}
.card-b{position:relative;padding:16px 20px}

table{width:100%;border-collapse:collapse}
th{padding:8px 10px;font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(150,165,200,0.70);text-align:center;border-bottom:1px solid rgba(104,118,156,0.12);background:rgba(62,76,112,0.06)}
td{padding:7px 10px;text-align:center;border-bottom:1px solid rgba(104,118,156,0.06);font-size:12.5px;
  color:rgba(236,239,246,0.80);font-variant-numeric:tabular-nums}
tr:hover td{background:rgba(62,76,112,0.04)}
td.L{text-align:left}td.fl{font-weight:700;color:#9BA6DB;letter-spacing:1px}
td.fm{color:rgba(150,165,200,0.95);font-weight:600}td.sx{color:#C2BAF6;font-weight:700}
tr.tot td{background:rgba(62,76,112,0.10);border-top:1px solid rgba(104,118,156,0.20);font-weight:700;color:rgba(240,243,250,0.95)}
tr.fsep td{border-top:2px solid rgba(104,118,156,0.35);padding-top:10px}
tr.fsep td.fl{position:relative}
tr.fsep td.fl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#7E7BCE;border-radius:0 2px 2px 0}
tr.rw6 td.hl{background:rgba(255,159,67,0.08)}
tr.rw6:hover td.hl{background:rgba(255,159,67,0.14)}
tr.rw12 td.hl{background:rgba(255,85,85,0.08)}
tr.rw12:hover td.hl{background:rgba(255,85,85,0.14)}

input[type="number"],input[type="text"]{background:rgba(29,33,48,0.80);border:1px solid rgba(104,118,156,0.18);color:rgba(236,239,246,0.90);
  font-family:inherit;font-size:12px;padding:5px 8px;border-radius:5px;text-align:center;transition:all .25s;font-variant-numeric:tabular-nums}
input:focus{outline:none;border-color:rgba(104,118,156,0.50);background:rgba(40,46,66,0.90);box-shadow:0 0 0 3px rgba(62,76,112,0.12)}
input.ns{-moz-appearance:textfield}
input.ns::-webkit-outer-spin-button,input.ns::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.ws{width:55px}input.wm{width:85px}input.wl{width:125px;text-align:left}input.wlc{width:125px;text-align:center}
select.sel{background:rgba(29,33,48,0.80);border:1px solid rgba(104,118,156,0.18);color:rgba(236,239,246,0.90);
  font-family:inherit;font-size:12px;padding:5px 6px;border-radius:5px;text-align:center;cursor:pointer;transition:all .25s;
  -webkit-appearance:none;appearance:none;min-width:52px}
select.sel:focus{outline:none;border-color:rgba(104,118,156,0.50);background:rgba(40,46,66,0.90);box-shadow:0 0 0 3px rgba(62,76,112,0.12)}
select.sel option{background:#1a1228;color:rgba(236,239,246,0.90)}
select.sel-forced{border-color:rgba(255,159,67,0.50);background:rgba(255,159,67,0.08);color:#FFB86C}

.ch{display:inline-block;padding:3px 10px;border-radius:5px;font-weight:700;font-size:12px;letter-spacing:.5px}
.cp{background:rgba(62,76,112,0.20);color:#B7C0E8;border:1px solid rgba(104,118,156,0.20)}
.cg{background:rgba(46,213,115,0.10);color:#5FE09A;border:1px solid rgba(46,213,115,0.15)}
.co{background:rgba(255,159,67,0.10);color:#FFB86C;border:1px solid rgba(255,159,67,0.15)}
.cr{background:rgba(255,85,85,0.12);color:#FF6B6B;border:1px solid rgba(255,85,85,0.15)}
.cc{background:rgba(100,200,255,0.10);color:#7BC8FF;border:1px solid rgba(100,200,255,0.12)}

.ban{padding:14px 20px;border-radius:8px;margin:14px 0;font-weight:700;font-size:13px;text-align:center;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;gap:10px}
.ban-ok{background:rgba(46,213,115,0.08);color:#5FE09A;border:1px solid rgba(46,213,115,0.15)}
.ban-no{background:rgba(255,85,85,0.08);color:#FF6B6B;border:1px solid rgba(255,85,85,0.15)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.gB{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:1200px){.gB{grid-template-columns:1fr}}
.tr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(104,118,156,0.06)}
.tr:last-child{border-bottom:none}
.tl{flex:1;font-size:12.5px;color:rgba(208,217,233,0.70)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:11.5px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;border:1px solid rgba(104,118,156,0.20);background:rgba(62,76,112,0.10);color:rgba(208,217,233,0.80);
  font-family:inherit;transition:all .3s}
.btn:hover{background:rgba(62,76,112,0.22);border-color:rgba(104,118,156,0.40);color:#EDF0F7}
.ba{border-color:rgba(46,213,115,0.25);background:rgba(46,213,115,0.08);color:rgba(95,224,154,0.85)}
.ba:hover{background:rgba(46,213,115,0.16);color:#5FE09A}
.bd{border-color:rgba(255,85,85,0.20);color:rgba(255,107,107,0.70);background:transparent}
.bd:hover{background:rgba(255,85,85,0.08);color:#FF6B6B}
.bg_{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}

.rd{opacity:0;cursor:pointer;color:rgba(255,85,85,0.50);font-size:11px;background:none;border:none;padding:2px 5px;transition:opacity .2s}
tr:hover .rd{opacity:1}.rd:hover{color:#FF6B6B}

.cb{display:flex;gap:0;margin-top:10px;border-radius:6px;overflow:hidden;border:1px solid rgba(104,118,156,0.10)}
.cb div{flex:1;text-align:center;padding:5px 4px;font-size:10px;font-weight:600;font-variant-numeric:tabular-nums}
.cb .ck{background:rgba(62,76,112,0.12);color:rgba(150,165,200,0.60)}.cb .cv{color:#B7C0E8}

.mo{display:none;position:fixed;inset:0;background:rgba(10,12,20,0.70);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.mo.open{display:flex}
.ml{background:linear-gradient(165deg,rgba(28,22,42,0.97),rgba(20,22,30,0.98));border:1px solid rgba(104,118,156,0.20);
  border-radius:12px;padding:28px;width:380px;max-width:90vw}
.ml h3{color:rgba(240,243,250,0.95);font-size:15px;letter-spacing:1px;margin-bottom:16px}
.ml label{display:block;margin:10px 0 4px;font-size:11px;color:rgba(190,199,219,0.55);letter-spacing:1px;text-transform:uppercase}
.ml input{width:100%}

.ts{overflow-x:auto}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:rgba(20,22,30,0.5)}
::-webkit-scrollbar-thumb{background:rgba(104,118,156,0.25);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(104,118,156,0.40)}

.qfl{cursor:pointer;padding:2px 8px;border-radius:4px;background:rgba(104,118,156,0.15);border:1px solid rgba(104,118,156,0.25);color:rgba(190,199,219,0.70);font-size:10px;transition:all .15s;display:inline-block;margin:2px}.qfl:hover{background:rgba(104,118,156,0.30);color:rgba(236,239,246,0.95)}
</style>
