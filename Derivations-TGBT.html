  h+=`</div></div></div>`;

// ═══ EXPORT SAUVEGARDE PARTAGE TABLEAU ABONNÉ ═══
// Génère un fichier .ALG à envoyer à un autre B.E. qui ne pourra
// l'importer QUE dans le module Tableau Abonné (et non dans Dérivations
// TGBT). Contient les mêmes données utiles que l'export Excel mais dans
// un format opaque (JSON) — pas modifiable dans Excel.
// Nom du fichier : <NOM AFFAIRE> - DERIVATIONS.ALG
async function exportShareTA(){
  const pName=document.getElementById('projName').value.trim()||'Sans titre';
  const payload={
    _format:'algomes-tgbt-share',
    _version:1,
    _exportedAt:new Date().toISOString(),
    _note:'Fichier de partage pour le module Tableau Abonné — A.L. GOMES',
    P:pName,
    T:T,
    TG:TG,
    B:B
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/octet-stream'});
  // Format demandé : "<NOM AFFAIRE> - DERIVATIONS.ALG"
  const safeName=(pName.replace(/[^a-zA-Z0-9éèêëàâùûôîïçÉÈÊËÀÂÙÛÔÎÏÇ _-]/g,'_').trim())+' - DERIVATIONS.ALG';
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:safeName,
        types:[{description:'Sauvegarde de partage A.L.GOMES',accept:{'application/octet-stream':['.ALG','.alg']}}]
      });
      const wr=await handle.createWritable();await wr.write(blob);await wr.close();
    }catch(e){if(e.name!=='AbortError')alert('Erreur : '+e.message)}
  }else{
    const url=URL.createObjectURL(blob);const link=document.createElement('a');
    link.href=url;link.download=safeName;
    document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  }
}

async function importXLS(input){
  const file=input.files[0];if(!file)return;
  // Attente courte si la lib n'est pas encore arrivée du CDN
  if(typeof ExcelJS==='undefined'){
    const deadline = Date.now() + 8000;
    while(typeof ExcelJS==='undefined' && Date.now() < deadline){
      await new Promise(r => setTimeout(r, 200));
    }
    if(typeof ExcelJS==='undefined'){
      alert('Bibliothèque Excel indisponible (réseau ?). Réessayez dans un instant.');
      input.value=''; return;
    }
  }
  try{
    const buf=await file.arrayBuffer();
    const wb=new ExcelJS.Workbook();
    await wb.xlsx.load(buf);
    const ds=wb.getWorksheet('_DATA');
    if(!ds){alert('Ce fichier Excel ne contient pas de données de projet.\nUtilisez un fichier exporté depuis cette application.');input.value='';return}
    const json=ds.getCell('A1').value;
    if(!json){alert('Données de projet vides.');input.value='';return}
    const data=JSON.parse(json);
    if(data.T)T=data.T;if(data.TG)TG=data.TG;
    if(data.B)B=data.B;
    if(data.P)document.getElementById('projName').value=data.P;
    R();S('tgbt');
    input.value='';
  }catch(e){alert('Erreur lors de l\'import : '+e.message);input.value=''}
}

  }

  // Recalc TGBT
  const ib=parseFloat(T.i[0].B)||0;T.i[0].E=cI(ib);
  const lb=parseFloat(T.i[1].B)||0,lc=parseFloat(T.i[1].C)||0,lm=cL(lb,lc);T.i[1].D=lm.d;T.i[1].E=lm.e;
  let totB=0;T.i.forEach(x=>{const v=parseFloat(x.E);if(!isNaN(v))totB+=v});totB=Math.ceil(totB);
  const rgB=gR(totB),tfB=gT(rgB);

  // ═══ PAGE 1: TGBT ═══
  // Title band
  doc.setFillColor(...navy);doc.rect(0,0,pageW,22,"F");
  doc.setFontSize(18);doc.setTextColor(...white);doc.setFont('helvetica','bold');
  doc.text(pName+' — TGBT',pageW/2,12,{align:'center'});
  doc.setFontSize(10);doc.setTextColor(180,199,231);
  doc.text('Bilan de Puissance — NF C 14-100',pageW/2,19,{align:'center'});

  // TGBT table
  const tHead=[['Désignation','Nb places park.','Nb locaux','Quantité','Puissance (kVA)']];
  const tBody=T.i.map(x=>[x.n,x.B==='-'?'':x.B,x.C==='-'?'':x.C,x.D===''?'':x.D,x.E===''?'':x.E]);
  tBody.push([{content:'PUISSANCE TOTALE BRUT',colSpan:4,styles:{fontStyle:'bold',fillColor:navy,textColor:white}},{content:totB+' kVA',styles:{fontStyle:'bold',fillColor:navy,textColor:white}}]);
  tBody.push([{content:'TOTAL RÉGLEMENTAIRE',colSpan:3,styles:{fontStyle:'bold',fillColor:blueA,textColor:white}},{content:tfB||'—',styles:{fontStyle:'bold',fillColor:blueA,textColor:white}},{content:rgB+' kVA',styles:{fontStyle:'bold',fillColor:blueA,textColor:white}}]);

  doc.autoTable({head:tHead,body:tBody,startY:28,
    theme:'grid',
    headStyles:{fillColor:navy,textColor:white,fontStyle:'bold',fontSize:9,halign:'center'},
    bodyStyles:{fontSize:9,halign:'center'},
    columnStyles:{0:{halign:'left',cellWidth:80}},
    alternateRowStyles:{fillColor:greyL},
    styles:{cellPadding:3,lineColor:[180,180,180],lineWidth:0.2},
    margin:{left:14,right:14}
  });
  footer(doc);

  // ═══ BUILDING PAGES ═══
  B.forEach((b,bi)=>{
    const a=[...b.a];if(!b.fl)b.fl=gFL(b.niv||9);
    const bFL=b.fl;
    a.forEach(x=>{if(x.p===undefined)x.p=pw(x.u);x.c=cl(x.p)});
    a.sort((aa,bb)=>bFL.indexOf(aa.f)-bFL.indexOf(bb.f));
    const fg={};a.forEach(x=>{if(!fg[x.f])fg[x.f]=[];fg[x.f].push(x)});
    const fc={};Object.entries(fg).forEach(([f,ar])=>{fc[f]={n3:ar.filter(x=>x.p===3).length,n6:ar.filter(x=>x.p===6).length,n9:ar.filter(x=>x.p===9).length,n12:ar.filter(x=>x.p===12).length,t:ar.length}});
    const af=[...bFL].reverse(),cr=[];let cH=0,cK=0;
    for(const f of af){const d=fc[f]||{n3:0,n6:0,n9:0,n12:0,t:0};cH+=d.t;const kn=d.n3*3+d.n6*6+d.n9*9+d.n12*12;cK+=kn;const co=vl(cH);const sx=(f===bFL[0])?sT(b):0;const pt=cK*co+sx;cr.push({f,d,cH,kn,cK,co,sx,pt,I:pt/.692})}
    const rd=cr[cr.length-1],fI=rd?rd.I:0,ok=fI<200;

    doc.setFillColor(...navy);doc.rect(0,0,pageW,16,"F");

    doc.text(pName+' — '+b.n+' — DÉRIVATIONS',pageW/2,11,{align:'center'});

    doc.setFillColor(...(ok?greenF:redF));doc.rect(0,16,pageW,10,"F");
    doc.setFontSize(11);doc.setTextColor(...white);
    doc.text(colTxt,pageW/2,23,{align:'center'});

    // Info
    doc.setFontSize(9);doc.setTextColor(60,60,60);doc.setFont('helvetica','normal');
