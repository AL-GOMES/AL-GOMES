<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique des attestations — A.L.GOMES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#0e0e10;--surface:#14141c;--surface2:#1a1a24;
    --border:rgba(120,50,255,.15);--border2:rgba(120,50,255,.3);
    --text:#e0d8ff;--text2:rgba(200,180,230,.65);--text3:rgba(180,165,200,.4);
    --accent:#7832ff;--accent2:#5a1ecc;--accent-soft:rgba(120,50,255,.10);
    --success:#22c55e;--warn:#f59e0b;--err:#ef4444
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:auto}
  body::-webkit-scrollbar{width:10px}
  body::-webkit-scrollbar-track{background:#0a0a0f}
  body::-webkit-scrollbar-thumb{background:rgba(120,50,255,.25);border-radius:5px}

  .app{max-width:1200px;margin:0 auto;padding:28px 24px 50px}

  /* Header */
  .page-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .page-header .title-group{display:flex;align-items:center;gap:16px}
  .page-header .icon-box{width:46px;height:46px;border-radius:10px;background:rgba(120,50,255,.12);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px}
  .page-header h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#fff,#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
  .page-header .subtitle{font-size:12px;color:var(--text2);letter-spacing:1px}
  .page-header .count-badge{background:rgba(120,50,255,.12);border:1px solid var(--border2);color:#b388ff;padding:5px 12px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px}

  /* Filters */
  .filters{display:grid;grid-template-columns:1fr 180px 180px 120px;gap:10px;margin-bottom:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .filters input,.filters select{background:rgba(10,10,18,.6);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;width:100%}
  .filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}
  .filters label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
  .btn-reset{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:7px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;height:38px}
  .btn-reset:hover{background:rgba(239,68,68,.2)}

  @media(max-width:800px){
    .filters{grid-template-columns:1fr}
  }

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:rgba(120,50,255,.05)}
  thead th{text-align:left;padding:11px 14px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid rgba(120,50,255,.06);transition:background .15s}
  tbody tr:hover{background:rgba(120,50,255,.04)}
  tbody tr:last-child{border-bottom:none}
  td{padding:12px 14px;color:var(--text)}
  td .affaire{font-weight:600}
  td .objet{font-size:11px;color:var(--text2);margin-top:2px}
  td .auteur-role{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  td.actions{text-align:right;white-space:nowrap}
  .action-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-left:4px;transition:all .2s;text-transform:uppercase}
  .action-btn:hover{border-color:var(--accent);color:#b388ff;background:var(--accent-soft)}
  .action-btn.danger:hover{border-color:var(--err);color:#f87171;background:rgba(239,68,68,.08)}

  .empty{text-align:center;padding:60px 20px;color:var(--text2);font-style:italic}
  .empty-icon{font-size:42px;margin-bottom:10px;opacity:.5}

  .loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;letter-spacing:1px}

  .format-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px}
  .format-pdf{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
  .format-docx{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}

  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
  .toast.on{opacity:1}
  .toast.success{border-color:var(--success);color:#86efac}
  .toast.error{border-color:var(--err);color:#fca5a5}
</style>
</head>
<body>

<div class="app">
  <div class="page-header">
    <div class="title-group">
      <div class="icon-box">📜</div>
      <div>
        <h1>HISTORIQUE</h1>
        <div class="subtitle">Attestations émises par l'équipe</div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">—</div>
  </div>

  <div class="filters">
    <div>
      <label>Recherche (affaire, objet, signataire)</label>
      <input type="text" id="fSearch" placeholder="Taper pour filtrer…">
    </div>
    <div>
      <label>Auteur</label>
      <select id="fAuthor"><option value="">Tous</option></select>
    </div>
    <div>
      <label>Année</label>
      <select id="fYear"><option value="">Toutes</option></select>
    </div>
    <div style="display:flex;align-items:flex-end">
      <button class="btn-reset" onclick="resetFilters()">↺ Réinitialiser</button>
    </div>
  </div>

  <div class="table-wrap">
    <div id="tableHost">
      <div class="loading">Chargement…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// HISTORIQUE DES ATTESTATIONS
// Lecture de la collection Firestore 'attestationsHistory', filtres en JS,
// actions : regénérer le PDF (via redirection ATTESTATIONS.html?replay=...)
// et supprimer (admin + auteur uniquement).
// ═══════════════════════════════════════════════════════════════════════
function getFirestore(){
  try {
    const fb = window.parent && window.parent.firebase;
    if(fb && fb.firestore) return fb.firestore();
  } catch(e){}
  return null;
}
function getUser(){
  try { return window.parent && window.parent._algomesUser; } catch(e){ return null; }
}
function navigate(page){
  try {
    if(window.parent && window.parent.navigateTo){
      window.parent.navigateTo(page);
      return;
    }
  } catch(e){}
  location.href = page;
}

function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on ' + (type || '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast ' + (type || ''); }, 2800);
}

function escHtml(s){
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let allEntries = [];
let currentFilter = { search: '', author: '', year: '' };

async function load(){
  const db = getFirestore();
  if(!db){
    document.getElementById('tableHost').innerHTML = '<div class="empty"><div class="empty-icon">🔌</div>Firestore indisponible</div>';
    return;
  }
  try {
    const snap = await db.collection('attestationsHistory').get();
    allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => {
        const ta = a.createdAt && a.createdAt.seconds ? a.createdAt.seconds : 0;
        const tb = b.createdAt && b.createdAt.seconds ? b.createdAt.seconds : 0;
        return tb - ta;
      });
    buildFilterOptions();
    render();
  } catch(err){
    console.error(err);
    document.getElementById('tableHost').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Erreur : ${escHtml(err.message || err)}</div>`;
  }
}

function buildFilterOptions(){
  // Auteurs
  const authors = [...new Set(allEntries.map(e => e.createdByName).filter(Boolean))].sort();
  const selA = document.getElementById('fAuthor');
  selA.innerHTML = '<option value="">Tous</option>' +
    authors.map(a => `<option value="${escHtml(a)}">${escHtml(a)}</option>`).join('');
  // Années
  const years = [...new Set(allEntries.map(e => {
    if(!e.createdAt || !e.createdAt.seconds) return '';
    return new Date(e.createdAt.seconds * 1000).getFullYear();
  }).filter(Boolean))].sort((a,b) => b - a);
  const selY = document.getElementById('fYear');
  selY.innerHTML = '<option value="">Toutes</option>' +
    years.map(y => `<option value="${y}">${y}</option>`).join('');
}

function resetFilters(){
  document.getElementById('fSearch').value = '';
  document.getElementById('fAuthor').value = '';
  document.getElementById('fYear').value = '';
  currentFilter = { search: '', author: '', year: '' };
  render();
}

function render(){
  const host = document.getElementById('tableHost');
  // Filtrer
  const filtered = allEntries.filter(e => {
    if(currentFilter.author && e.createdByName !== currentFilter.author) return false;
    if(currentFilter.year){
      const y = e.createdAt && e.createdAt.seconds ? new Date(e.createdAt.seconds * 1000).getFullYear() : '';
      if(String(y) !== currentFilter.year) return false;
    }
    if(currentFilter.search){
      const s = currentFilter.search.toLowerCase();
      const hay = [e.affaire, e.objet, e.nom, e.destinataire, e.createdByName].filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' ATTESTATION' + (filtered.length > 1 ? 'S' : '');

  if(!filtered.length){
    host.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Aucune attestation ne correspond aux filtres.</div>';
    return;
  }

  const user = getUser();
  const isAdmin = user && user.role === 'admin';

  const rows = filtered.map(e => {
    const dateFR = e.createdAt && e.createdAt.seconds
      ? new Date(e.createdAt.seconds * 1000).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
      : '—';
    const formatBadge = e.generatedAs === 'docx'
      ? '<span class="format-badge format-docx">WORD</span>'
      : '<span class="format-badge format-pdf">PDF</span>';
    // Suppression : uniquement admin ou auteur
    const canDelete = isAdmin || (user && e.createdBy === user.uid);
    return `<tr>
      <td>
        <div class="affaire">${escHtml(e.affaire || '(sans affaire)')}</div>
        <div class="objet">${escHtml(e.objet || '—')}</div>
      </td>
      <td>
        <div>${escHtml(e.nom || '—')}</div>
        <div class="auteur-role">par ${escHtml(e.createdByName || '?')}</div>
      </td>
      <td>${dateFR} ${formatBadge}</td>
      <td class="actions">
        <button class="action-btn" onclick="replayAs('${e.id}', 'pdf')" title="Régénérer le PDF">PDF</button>
        ${canDelete ? `<button class="action-btn danger" onclick="deleteEntry('${e.id}')" title="Supprimer">🗑</button>` : ''}
      </td>
    </tr>`;
  }).join('');

  host.innerHTML = `<table>
    <thead>
      <tr>
        <th>Affaire / Objet</th>
        <th>Signataire</th>
        <th>Date d'émission</th>
        <th style="text-align:right">Actions</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// Regénération : redirige vers ATTESTATIONS.html?replay=<id>&auto=<fmt>
function replayAs(id, fmt){
  navigate('ATTESTATIONS.html?replay=' + encodeURIComponent(id) + '&auto=' + fmt);
}

async function deleteEntry(id){
  const e = allEntries.find(x => x.id === id);
  if(!e) return;
  if(!confirm(`Supprimer cette attestation de l'historique ?\n\n"${e.affaire || '(sans affaire)'}" — ${e.createdByName || '?'}`)) return;
  const db = getFirestore();
  if(!db) return;
  try {
    await db.collection('attestationsHistory').doc(id).delete();
    toast('Entrée supprimée', 'success');
    await load();
  } catch(err){
    console.error(err);
    toast('Erreur : ' + (err.message || ''), 'error');
  }
}

// Écouter les filtres
document.getElementById('fSearch').addEventListener('input', e => {
  currentFilter.search = e.target.value.trim();
  render();
});
document.getElementById('fAuthor').addEventListener('change', e => {
  currentFilter.author = e.target.value;
  render();
});
document.getElementById('fYear').addEventListener('change', e => {
  currentFilter.year = e.target.value;
  render();
});

// Wait for user ready + load
(async function init(){
  const start = Date.now();
  while(Date.now() - start < 5000){
    try {
      if(window.parent && window.parent.firebase && window.parent._algomesUser){ break; }
    } catch(e){}
    await new Promise(r => setTimeout(r, 100));
  }
  load();
})();
</script>

</body>
</html>
