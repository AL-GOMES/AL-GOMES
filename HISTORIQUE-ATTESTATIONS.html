<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  :root{
    --bg:#14161e;--surface:#1d2130;--surface2:#1a1a24;
    --border:rgba(135,120,215,.15);--border2:rgba(135,120,215,.3);
    --text:#EAEDF6;--text2:rgba(200,180,230,.65);--text3:rgba(190,199,219,.4);
    --accent:#8378d0;--accent2:#5a1ecc;--accent-soft:rgba(135,120,215,.10);
    --success:#22c55e;--warn:#f59e0b;--err:#ef4444
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:auto}
  body::-webkit-scrollbar{width:10px}
  body::-webkit-scrollbar-track{background:#14161e}
  body::-webkit-scrollbar-thumb{background:rgba(135,120,215,.25);border-radius:5px}

  .app{max-width:1200px;margin:0 auto;padding:28px 24px 50px}

  /* Header */
  .page-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .page-header .title-group{display:flex;align-items:center;gap:16px}
  .page-header .icon-box{width:46px;height:46px;border-radius:10px;background:rgba(135,120,215,.12);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px}
  .page-header h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#fff,#B0A8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px}
  .page-header .subtitle{font-size:12px;color:var(--text2);letter-spacing:1px}
  .page-header .count-badge{background:rgba(135,120,215,.12);border:1px solid var(--border2);color:#B0A8E8;padding:5px 12px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px}

  /* Filters */
  .filters{display:grid;grid-template-columns:1fr 180px 180px 120px;gap:10px;margin-bottom:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
  .filters input,.filters select{background:rgba(20,22,30,.6);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;width:100%}
  .filters input:focus,.filters select:focus{outline:none;border-color:var(--accent)}
  .filters label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
  .btn-reset{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:7px;padding:9px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;height:38px}
  .btn-reset:hover{background:rgba(239,68,68,.2)}

  @media(max-width:800px){
    .filters{grid-template-columns:1fr}
  }

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:rgba(135,120,215,.05)}
  thead th{text-align:left;padding:11px 14px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid rgba(135,120,215,.06);transition:background .15s}
  tbody tr:hover{background:rgba(135,120,215,.04)}
  tbody tr:last-child{border-bottom:none}
  td{padding:12px 14px;color:var(--text)}
  td .affaire{font-weight:600}
  td .objet{font-size:11px;color:var(--text2);margin-top:2px}
  td .auteur-role{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
  td.actions{text-align:right;white-space:nowrap}
  .action-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-left:4px;transition:all .2s;text-transform:uppercase}
  .action-btn:hover{border-color:var(--accent);color:#B0A8E8;background:var(--accent-soft)}
  .action-btn.danger:hover{border-color:var(--err);color:#f87171;background:rgba(239,68,68,.08)}

  .empty{text-align:center;padding:60px 20px;color:var(--text2);font-style:italic}
  .empty-icon{font-size:42px;margin-bottom:10px;opacity:.5}

  .loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;letter-spacing:1px}

  .format-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px}
  .format-pdf{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
  .format-docx{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}

  /* Toast */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s}
  .toast.on{opacity:1}
  .toast.success{border-color:var(--success);color:#86efac}
  .toast.error{border-color:var(--err);color:#fca5a5}
</style>
</head>
<body oncontextmenu="return false">

<div class="app">
  <div class="page-header">
    <div class="title-group">
      <div class="icon-box">📜</div>
      <div>
        <h1>HISTORIQUE</h1>
        <div class="subtitle">Attestations émises par l'équipe</div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">—</div>
  </div>

  <div class="filters">
    <div>
      <label>Recherche (affaire, objet, signataire)</label>
      <input type="text" id="fSearch" placeholder="Taper pour filtrer…">
    </div>
    <div>
      <label>Auteur</label>
      <select id="fAuthor"><option value="">Tous</option></select>
    </div>
    <div>
      <label>Année</label>
      <select id="fYear"><option value="">Toutes</option></select>
    </div>
    <div style="display:flex;align-items:flex-end">
      <button class="btn-reset" onclick="resetFilters()">↺ Réinitialiser</button>
    </div>
  </div>

  <div class="table-wrap">
    <div id="tableHost">
      <div class="loading">Chargement…</div>
    </div>
  </div>
</div>
