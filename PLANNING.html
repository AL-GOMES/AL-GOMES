<title>Planning BET 2026 — S1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--surface:#13161f;--surface2:#1a1e2a;--surface3:#222738;--border:#2a2f42;--text:#e2e4ea;--text2:#8b90a5;--text3:#5a5f75;--accent:#4f8cff;--accent2:#3a6fd8;--report:#4ade80;--report-bg:rgba(74,222,128,.13);--todo:#94a3b8;--todo-bg:rgba(148,163,184,.12);--done:#60a5fa;--done-bg:rgba(96,165,250,.13);--warn:#fbbf24;--warn-bg:rgba(251,191,36,.1);--danger:#ef4444;--danger-bg:rgba(239,68,68,.1)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}::selection{background:var(--accent);color:#fff}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#fff}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}.header h1 span{color:var(--text3);font-weight:400;margin-left:6px;font-size:14px}
.stats-bar{display:flex;gap:4px;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text2)}
.stat .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--text)}.stat.report .val{color:var(--report)}.stat.todo .val{color:var(--todo)}.stat.done .val{color:var(--done)}.stat.warn .val{color:var(--warn)}
.controls{display:flex;align-items:center;gap:12px;padding:14px 28px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:2px;flex-wrap:wrap}
.week-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:pointer;transition:all .15s}
.week-btn:hover{background:var(--surface3);color:var(--text)}
.week-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.week-btn.all{border-radius:6px;margin-right:6px}
.week-btn.add-week{border-style:dashed;color:var(--accent);border-color:var(--accent);border-radius:6px;margin-left:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700}
.week-btn.add-week:hover{background:rgba(79,140,255,.1)}
.filter-group{display:flex;align-items:center;gap:8px;margin-left:auto}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}.filter-btn:hover{border-color:var(--text3);color:var(--text)}.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,140,255,.08)}
.search-box{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;width:200px;outline:none;transition:border-color .15s}.search-box::placeholder{color:var(--text3)}.search-box:focus{border-color:var(--accent)}
.view-toggle{display:flex;gap:2px;margin-left:8px}.view-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text3);padding:5px 10px;cursor:pointer;font-size:12px;transition:all .15s}.view-btn:first-child{border-radius:6px 0 0 6px}.view-btn:last-child{border-radius:0 6px 6px 0}.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sync-indicator{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-left:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all .25s;cursor:default;user-select:none}
.sync-indicator .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .25s}
.sync-indicator.init .sync-dot{background:var(--text3);animation:syncpulse 1.5s ease-in-out infinite}
.sync-indicator.syncing .sync-dot{background:var(--warn);animation:syncpulse .9s ease-in-out infinite}
.sync-indicator.synced{color:var(--done);border-color:rgba(96,165,250,.3)}.sync-indicator.synced .sync-dot{background:var(--done)}
.sync-indicator.offline{color:var(--text3);border-color:var(--border)}.sync-indicator.offline .sync-dot{background:var(--text3)}
.sync-indicator.error{color:var(--danger);border-color:rgba(239,68,68,.4);background:var(--danger-bg)}.sync-indicator.error .sync-dot{background:var(--danger);animation:syncpulse 1s ease-in-out infinite}

function handleXlsxFile(ev){
  const f=ev.target.files[0]; if(!f) return;
  if(!window.XLSX){alert('Bibliothèque XLSX non chargée. Vérifiez votre connexion internet.');return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      const parsed=parseXlsxWorkbook(wb);
      if(!parsed.length){alert('Aucune tâche trouvée dans le fichier.\nVérifiez que les feuilles sont nommées par numéro de semaine (ex: "02", "03"...) avec les colonnes CHANTIER / TACHES / DATE DE SORTIE.');return}
      modal={mode:'importPreview',tasks:parsed,fileName:f.name};
      render();
    }catch(err){alert('Erreur lecture du fichier : '+err.message)}
  };
  r.readAsArrayBuffer(f);
  ev.target.value='';
}

function parseXlsxWorkbook(wb){
  const result=[];
  wb.SheetNames.forEach(sn=>{
    // Numéro de semaine — depuis le nom de feuille, puis cellule A1 en fallback
    let wk=parseInt(sn.replace(/\D/g,''));
    const ws=wb.Sheets[sn];
    if(!ws) return;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    if(isNaN(wk)){
      for(const row of rows){
        if(row[0]&&typeof row[0]==='string'){
          const m=row[0].match(/SEMAINE\s*(\d+)/i);
          if(m){wk=parseInt(m[1]);break}
        }
      }
    }
    if(isNaN(wk)||wk<1||wk>53) return;

    // Repérer la ligne d'en-têtes (CHANTIER / TACHES / DATE)
    let headerIdx=-1;
    for(let i=0;i<Math.min(rows.length,10);i++){
      const r=(rows[i]||[]).map(x=>String(x||'').toUpperCase().trim());
      if(r.includes('CHANTIER')&&r.some(x=>x.startsWith('TACHE'))){headerIdx=i;break}
    }
    const startRow=headerIdx>=0?headerIdx+1:3;

    for(let i=startRow;i<rows.length;i++){
      const row=rows[i]; if(!row||!row[0]) continue;
      const chantier=String(row[0]).trim().toUpperCase();
      const tacheRaw=String(row[1]||'').trim();
      const dateRaw=row[2];
      if(!chantier||!tacheRaw) continue;

      // Extraire l'éventuelle alerte "ATTENTION : ..." du libellé de tâche
      let tache=tacheRaw,hasAttention=false,attentionMsg='';
      const attMatch=tacheRaw.match(/ATTENTION\s*[:\-][^\n]*/i);
      if(attMatch){
        hasAttention=true;
        attentionMsg=attMatch[0].trim();
        tache=tacheRaw.replace(attMatch[0],'').trim();
      }
      tache=tache.replace(/\s+/g,' ').trim();

      // Parser la date ou le report
      let isReport=false,reportTo='',date='';
      if(dateRaw instanceof Date&&!isNaN(dateRaw)){
        const d=dateRaw;
        date=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }else{
        const ds=String(dateRaw||'').trim();
        if(/REPORT/i.test(ds)){
          isReport=true;
          const m=ds.match(/SEMAINE\s*(\d+)/i);
          reportTo=m?'SEMAINE '+String(parseInt(m[1])).padStart(2,'0'):'SEMAINE '+String(wk+1).padStart(2,'0');
        }else if(/^\d{4}-\d{2}-\d{2}/.test(ds)){
          date=ds.substring(0,10);
        }else if(/^\d{1,2}[\/.\-]\d{1,2}[\/.\-]\d{2,4}$/.test(ds)){
          const p=ds.split(/[\/.\-]/); let y=p[2]; if(y.length===2) y='20'+y;
          date=y+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
        }else{
          // Cellule vide ou format inconnu → on traite comme report vers la semaine suivante
          isReport=true;
          reportTo='SEMAINE '+String(wk+1).padStart(2,'0');
        }
      }
      result.push({week:wk,chantier,tache,status:isReport?'report':(date?'progress':'todo'),isReport,reportTo,date,hasAttention,attentionMsg});
    }
  });
  return result;
}

function applyImport(mode){
  const imp=modal.tasks;
  if(mode==='replace'){
    TASKS=imp.map(t=>({...t}));
    nextId=0;
    TASKS.forEach(t=>t.id=nextId++);
  }else{
    // Fusion : on remplace seulement les semaines présentes dans le fichier
    const importedWeeks=new Set(imp.map(t=>t.week));
    TASKS=TASKS.filter(t=>!importedWeeks.has(t.week));
    imp.forEach(t=>{const nt={...t,id:nextId++}; TASKS.push(nt)});
  }
  const firstWeek=imp[0]?.week;
  modal=null;
  if(firstWeek!==undefined) S.selectedWeek=firstWeek;
  persist();
  render();
}

async function exportExcel(){
  if(!window.ExcelJS){alert('Bibliothèque ExcelJS non chargée. Vérifiez votre connexion internet.');return}
  // Convention de couleurs (identique au fichier source) :
  //   Reporté → fond vert FF92D050 + date rouge gras
  //   À faire → pas de remplissage
  //   Fini    → fond bleu FF9DC3E6 + date rouge gras
  //   En-têtes (titre + CHANTIER/TACHES/DATE) → fond cyan FF00B0F0 + texte blanc gras
  const CYAN='FF00B0F0', GREEN='FF92D050', BLUE='FF9DC3E6', RED='FFFF0000', WHITE='FFFFFFFF';
  const wb=new ExcelJS.Workbook();
  wb.creator='AL-GOMES BET'; wb.created=new Date();
  const weeks=GW();
  weeks.forEach(w=>{
    const wt=TASKS.filter(t=>t.week===w);
    const ws=wb.addWorksheet(pad(w),{views:[{state:'normal'}]});
    ws.columns=[{width:28},{width:60},{width:18}];
    // Ligne 1 : titre fusionné SEMAINE XX
    ws.mergeCells('A1:C1');
    const title=ws.getCell('A1');
    title.value='SEMAINE '+pad(w);
    title.font={name:'Calibri',bold:true,size:14,color:{argb:WHITE}};
    title.fill={type:'pattern',pattern:'solid',fgColor:{argb:CYAN}};
    title.alignment={horizontal:'center',vertical:'middle'};
    ws.getRow(1).height=28;
    // Ligne 3 : en-têtes
    const headerRow=ws.getRow(3);
    headerRow.values=['CHANTIER','TACHES','DATE DE SORTIE'];
    ['A3','B3','C3'].forEach(addr=>{
      const c=ws.getCell(addr);
      c.font={name:'Calibri',bold:true,size:11,color:{argb:WHITE}};
      c.fill={type:'pattern',pattern:'solid',fgColor:{argb:CYAN}};
      c.alignment={horizontal:'center',vertical:'middle'};
      c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
    });
    headerRow.height=22;
    // Lignes de données
    let r=4;
    wt.forEach(t=>{
      const tacheCell=t.hasAttention?(t.tache+'\n'+t.attentionMsg):t.tache;
      let dateCellVal=null;
      if(t.status==='report') dateCellVal='REPORT \n'+t.reportTo;
      else if(t.status==='progress'&&t.date){const p=t.date.split('-'); dateCellVal=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]))}
      const row=ws.getRow(r);
      row.values=[t.chantier,tacheCell,dateCellVal];
      // Choix du fill selon le statut
      let fillColor=null;
      if(t.status==='report') fillColor=GREEN;
      else if(t.status==='progress') fillColor=BLUE;
      // status==='todo' → pas de fill (cellule blanche)
      ['A','B','C'].forEach(col=>{
        const c=ws.getCell(`${col}${r}`);
        c.alignment={wrapText:true,vertical:'middle',horizontal:col==='A'?'center':(col==='C'?'center':'left')};
        c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};
        c.font={name:'Calibri',size:11};
        if(fillColor) c.fill={type:'pattern',pattern:'solid',fgColor:{argb:fillColor}};
      });
      // Texte rouge gras pour la cellule date (report ou fini)
      if(t.status==='report'||t.status==='progress'){
        const dc=ws.getCell(`C${r}`);
        dc.font={name:'Calibri',size:11,bold:true,color:{argb:RED}};
        if(t.status==='progress'&&dateCellVal instanceof Date){
          dc.numFmt='dd/mm/yyyy';
        }
      }
      // Surligner "ATTENTION :" en rouge dans la cellule tâche via rich text
      if(t.hasAttention){
        const tc=ws.getCell(`B${r}`);
        tc.value={richText:[
          {text:t.tache+'\n'},
          {font:{bold:true,color:{argb:RED}},text:t.attentionMsg}
        ]};
      }
      // Hauteur de ligne adaptée si plusieurs lignes
      const lineCount=Math.max(
        (t.tache.match(/\n/g)||[]).length+1,
        t.hasAttention?2:1,
        t.status==='report'?2:1
      );
      row.height=Math.max(22,lineCount*16);
      r++;
    });
  });
  // Génération et téléchargement
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='PLANNING_2026_export.xlsx';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
// ====== Fin du bloc IMPORT/EXPORT EXCEL ======================

// ====== SYNCHRONISATION CLOUD FIRESTORE =====================
// Stocke le planning dans Firestore (doc unique : planning/main).
// Sync temps réel entre tous les postes connectés. localStorage reste
// utilisé comme cache local (mode hors-ligne).
const CLOUD={user:null,docRef:null,unsub:null,status:'init',lastLocalWriteTs:0,pendingWrite:null,initialized:false};

function setSyncStatus(s,msg){
  CLOUD.status=s;
  const el=document.getElementById('syncIndicator'),lbl=document.getElementById('syncLabel');
  if(!el||!lbl)return;
  el.className='sync-indicator '+s;
  const labels={init:'…',syncing:'Sync…',synced:'Sync ✓',offline:'Local',error:'Erreur'};
  lbl.textContent=labels[s]||s;
  el.title=msg||{init:'Initialisation de la synchronisation cloud...',syncing:'Synchronisation en cours',synced:'Synchronisé avec le cloud ✓',offline:'Mode local — pas de connexion cloud',error:'Erreur de synchronisation (les modifs sont sauvées en local)'}[s];
}

function getCurrentUser(){
  // 1. Si on est dans une iframe (PLANNING.html chargé depuis accueil.html), récupérer depuis le parent
  try{
    if(window.parent&&window.parent!==window&&window.parent._algomesUser){
      return Promise.resolve(window.parent._algomesUser);
    }
  }catch(e){}
  // 2. Sinon, attendre l'auth Firebase
  return new Promise(resolve=>{
    if(!window.auth){resolve(null);return}
    let resolved=false;
    const to=setTimeout(()=>{if(!resolved){resolved=true;resolve(null)}},3000);
    window.auth.onAuthStateChanged(async u=>{
      if(resolved||!u)return;
      resolved=true;clearTimeout(to);
      try{
        const doc=await window.db.collection('users').doc(u.uid).get();
        resolve(doc.exists?{uid:u.uid,...doc.data()}:{uid:u.uid,name:u.email||'',login:u.email||''});
      }catch(e){resolve({uid:u.uid})}
    });
  });
}

async function initCloudSync(){
  if(CLOUD.initialized)return;
  CLOUD.initialized=true;
  if(!window.db||!window.firebase){setSyncStatus('offline','Firebase non chargé');return}
  const user=await getCurrentUser();
  if(!user||!user.uid){setSyncStatus('offline','Pas d\'utilisateur authentifié — mode local seul');return}
  CLOUD.user=user;
  CLOUD.docRef=window.db.collection('planning').doc('main');
  setSyncStatus('syncing');
  try{
    const snap=await CLOUD.docRef.get();
    if(snap.exists){
      const data=snap.data();
      if(Array.isArray(data.tasks)&&data.tasks.length>0){
        TASKS=data.tasks;
        if(typeof data.nextId==='number')nextId=data.nextId;
        else nextId=Math.max(0,...TASKS.map(t=>t.id||0))+1;
        migrateStatus();
        try{localStorage.setItem('algomes_planning_v1',JSON.stringify({TASKS,nextId}))}catch(e){}
        render();
        console.log('[Cloud] Planning chargé:',TASKS.length,'tâches');
      }else{
        // Doc vide → pousser le local vers le cloud
        await cloudPush();
      }
    }else{
      // Première fois → initialiser le doc avec le local
      await cloudPush();
    }
    setSyncStatus('synced');
  }catch(err){
    console.error('[Cloud] Lecture échouée:',err);
    setSyncStatus('error','Lecture cloud échouée : '+err.message);
    return;
  }
  // Écouter les changements en temps réel
  CLOUD.unsub=CLOUD.docRef.onSnapshot(snap=>{
    if(!snap.exists)return;
    const data=snap.data();
    // Ignorer nos propres écritures (basé sur le timestamp local)
    if(data._localWriteTs&&data._localWriteTs===CLOUD.lastLocalWriteTs)return;
    if(Array.isArray(data.tasks)){
      const sameLength=data.tasks.length===TASKS.length;
      const fromOther=data.updatedBy&&data.updatedBy!==CLOUD.user.uid;
      TASKS=data.tasks;
      if(typeof data.nextId==='number')nextId=data.nextId;
      migrateStatus();
      try{localStorage.setItem('algomes_planning_v1',JSON.stringify({TASKS,nextId}))}catch(e){}
      render();
      if(fromOther)console.log('[Cloud] Mise à jour reçue de',data.updatedByName||data.updatedBy);
      setSyncStatus('synced');
    }
  },err=>{
    console.error('[Cloud] Snapshot error:',err);
    setSyncStatus('error','Connexion temps réel perdue : '+err.message);
  });
}

async function cloudPush(){
  if(!CLOUD.docRef||!CLOUD.user)return;
  // Anti-rafale : si une écriture est déjà programmée, on la garde
  if(CLOUD.pendingWrite)clearTimeout(CLOUD.pendingWrite);
  CLOUD.pendingWrite=setTimeout(async()=>{
    CLOUD.pendingWrite=null;
    setSyncStatus('syncing');
    const ts=Date.now();
    CLOUD.lastLocalWriteTs=ts;
    try{
      await CLOUD.docRef.set({
        tasks:TASKS,
        nextId:nextId,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy:CLOUD.user.uid,
        updatedByName:CLOUD.user.name||CLOUD.user.login||'',
        _localWriteTs:ts
      });
      setSyncStatus('synced');
    }catch(err){
      console.error('[Cloud] Écriture échouée:',err);
      setSyncStatus('error','Écriture cloud échouée : '+err.message+' (les données restent en local)');
    }
  },300);
}

// Wrapper persist() pour qu'il pousse aussi vers le cloud
const _originalPersist=persist;
persist=function(){_originalPersist();cloudPush()};

// Démarrer la sync après le premier rendu
window.addEventListener('load',()=>setTimeout(initCloudSync,600));
// Si on est déjà chargé (DOM ready avant l'event load)
if(document.readyState==='complete')setTimeout(initCloudSync,600);
// ====== Fin SYNCHRONISATION CLOUD FIRESTORE =================

render();
</script>
