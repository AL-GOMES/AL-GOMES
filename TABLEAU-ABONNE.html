<script>
// âââ CIRCUITS âââ
// Ordre d'affichage : Type A d'abord (plaque, LL), puis Type AC, puis Type F/HPI
const CIR=[
  // ââ Type A (courants de dÃĐfaut Ã  composante continue) ââ
  {k:'plaq',n:'PLAQUE',a:'32A'},{k:'ll',n:'LL',a:'20A'},
  // ââ Type AC (circuits classiques) ââ
  {k:'pcgtl',n:'PC GTL',a:'16A'},{k:'ecl',n:'ECL',a:'10A'},{k:'pc',n:'PC',a:'16A'},
  {k:'tele',n:'TELE.',a:'Disj Ecl'},{k:'sonn',n:'SON.',a:'Disj Ecl'},
  {k:'four',n:'Four',a:'20A'},{k:'lv',n:'LV',a:'20A'},
  {k:'sl',n:'SL',a:'20A'},{k:'ss',n:'SS',a:'20A'},{k:'bec',n:'BEC',a:'20A'},
  {k:'chauf',n:'CHAUFF.',a:'20A'},{k:'chaud',n:'CHAUD.',a:'10A'},{k:'vr',n:'VR',a:'10A'},{k:'th',n:'TH',a:'2A'},{k:'rt',n:'RT2012',a:'2A'},{k:'mo',n:'M.ONDE',a:'20A'},
  // ââ Type F / HPI (immunitÃĐ renforcÃĐe) ââ
  {k:'pac',n:'PAC',a:'20A'},{k:'clim',n:'CLIM',a:'16A'},{k:'pisc',n:'PISC.',a:'16A'},{k:'varm',n:'VAR.M',a:'16A'},{k:'irve_ac',n:'IRVE AC',a:'32A'}
];
// Mapping circuit â type de diffÃĐrentiel
// 'AC' par dÃĐfaut pour tous les circuits non listÃĐs
const TYPE_BY_KEY={
  plaq:'A',ll:'A',
  pac:'F',clim:'F',pisc:'F',varm:'F',irve_ac:'F'
};
// Snapshots IMMUABLES des calibres + types par dÃĐfaut â utilisÃĐs par le
// bouton "ð Reset calibres" pour restaurer les valeurs d'origine aprÃĻs
// modification manuelle par l'utilisateur. CapturÃĐ une fois au chargement.
const CIR_DEFAULT = JSON.parse(JSON.stringify(CIR));
const TYPE_BY_KEY_DEFAULT = JSON.parse(JSON.stringify(TYPE_BY_KEY));
function defCir(kva){
  if(kva>=12) return{pcgtl:1,ecl:3,pc:4,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
  if(kva>=9)  return{pcgtl:1,ecl:3,pc:4,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
  return{pcgtl:1,ecl:2,pc:2,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
}
function pw(s){return s<35?6:s<100?9:12}
function cl(p){return p===3?15:p===6?45:p===9?45:p===12?60:45}
function gFL(niv){const f=['RDC'];for(let i=1;i<=niv;i++)f.push('R+'+i);return f}
function getRecap(x){return ''+x.c+CIR.map(c=>x[c.k]).join('')}
const TYPE_COLORS=[
  {bg:'rgba(0,176,240,0.15)',  border:'rgba(0,176,240,0.35)',  color:'#00B0F0'},
  {bg:'rgba(237,125,49,0.15)', border:'rgba(237,125,49,0.35)', color:'#ED7D31'},
  {bg:'rgba(84,130,53,0.15)',  border:'rgba(84,130,53,0.35)',  color:'#70AD47'},
  {bg:'rgba(192,0,0,0.15)',    border:'rgba(192,0,0,0.35)',    color:'#FF4444'},
  {bg:'rgba(155,89,182,0.18)', border:'rgba(155,89,182,0.40)', color:'#BB6BD9'},
  {bg:'rgba(241,196,15,0.15)', border:'rgba(241,196,15,0.35)', color:'#F1C40F'},
  {bg:'rgba(26,188,156,0.15)', border:'rgba(26,188,156,0.35)', color:'#1ABC9C'},
  {bg:'rgba(231,76,60,0.15)',  border:'rgba(231,76,60,0.35)',  color:'#E74C3C'},
  {bg:'rgba(52,152,219,0.15)', border:'rgba(52,152,219,0.35)', color:'#3498DB'},
  {bg:'rgba(230,126,34,0.15)', border:'rgba(230,126,34,0.35)', color:'#E67E22'},
  {bg:'rgba(142,68,173,0.15)', border:'rgba(142,68,173,0.35)', color:'#8E44AD'},
  {bg:'rgba(39,174,96,0.15)',  border:'rgba(39,174,96,0.35)',  color:'#27AE60'},
  {bg:'rgba(44,62,80,0.20)',   border:'rgba(44,62,80,0.40)',   color:'#95A5A6'},
  {bg:'rgba(211,84,0,0.15)',   border:'rgba(211,84,0,0.35)',   color:'#D35400'}
];
function typeBadge(t){const i=t.charCodeAt(0)-65;const c=TYPE_COLORS[i%TYPE_COLORS.length];return '<span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;background:'+c.bg+';color:'+c.color+';border:1px solid '+c.border+'">'+t+'</span>'}

// Code couleur par calibre de disjoncteur â utilisÃĐ dans le PDF des
// schÃĐmas pour distinguer visuellement les 10A, 16A, 20A, 32A... et
// dans l'encadrÃĐ rÃĐcapitulatif quantitatif.
const CALIBRE_COLORS={
  2:  {bg:'#F3E5F5', color:'#6A1B9A', border:'#9C27B0'}, // violet â TH, RT2012
  10: {bg:'#FFF9C4', color:'#F57F17', border:'#FBC02D'}, // jaune  â ECL, CHAUD, VR
  16: {bg:'#E3F2FD', color:'#0D47A1', border:'#1E88E5'}, // bleu   â PC, PCGTL, CLIM, PISC, VARM
  20: {bg:'#E8F5E9', color:'#1B5E20', border:'#43A047'}, // vert   â LL, FOUR, LV, SL, SS, BEC, CHAUF, MO, PAC
  32: {bg:'#FFE0B2', color:'#E65100', border:'#FB8C00'}, // orange â PLAQUE, IRVE AC
  40: {bg:'#FFCCBC', color:'#BF360C', border:'#FF5722'}, // orange foncÃĐ â borne haute
  63: {bg:'#FFCDD2', color:'#B71C1C', border:'#E53935'}  // rouge  â gros calibre
};
function _ampOf(a){const n=parseInt(String(a).replace(/[^0-9]/g,''));return isNaN(n)?10:n}
function colByCalibre(a){
  const n=_ampOf(a);
  if(CALIBRE_COLORS[n]) return CALIBRE_COLORS[n];
  // Fallback : on prend la borne supÃĐrieure normalisÃĐe la plus proche.
  if(n<=2) return CALIBRE_COLORS[2];
  if(n<=10) return CALIBRE_COLORS[10];
  if(n<=16) return CALIBRE_COLORS[16];
  if(n<=20) return CALIBRE_COLORS[20];
  if(n<=32) return CALIBRE_COLORS[32];
  if(n<=40) return CALIBRE_COLORS[40];
  return CALIBRE_COLORS[63];
}

let B=[],curTab=null;

// âââ CLOCK âââ
function tk(){
  const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  // Garde-fou : si la topbar n'existe plus dans le DOM (auth-guard a remplacÃĐ
  // body, page chargÃĐe hors-shell, etc.), on ÃĐvite de spam les erreurs.
  const elT = document.getElementById('tT');
  if (!elT) return;
  elT.textContent=h+':'+m+':'+s;
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','FÃĐvrier','Mars','Avril','Mai','Juin','Juillet','AoÃŧt','Septembre','Octobre','Novembre','DÃĐcembre'];
  const elD = document.getElementById('topDate');
  if (elD) elD.textContent=days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}
tk();setInterval(tk,1000);

// âââ RENDER âââ
function R(){
  let total=0;B.forEach(b=>total+=b.a.length);
  document.getElementById('bL').textContent=total+' lgts';
  let th='';B.forEach((b,i)=>{th+=`<div class="tab${curTab==='b'+i?' on':''}" onclick="S('b${i}')">${b.n}</div>`});
  document.getElementById('tabs').innerHTML=th;
  if(!B.length){document.getElementById('sh').innerHTML=`<div class="empty"><div class="ic-big">ð</div><div class="msg">Aucun bÃĒtiment chargÃĐ<br><br>Importez un fichier Excel provenant de<br><strong>DÃĐrivations & TGBT</strong> pour commencer</div></div>`;return}
  if(curTab===null)curTab='b0';
  const bi=parseInt(curTab.replace('b',''));
  if(bi>=B.length){curTab='b0';return R()}
  document.getElementById('sh').innerHTML=rB(bi);
}
function S(t){curTab=t;R()}

function figerTypes(bi){
  B[bi].a.forEach(x=>{x.tb=x.type});
  R();
}
function clearTypes(bi){
  B[bi].a.forEach(x=>{delete x.tb});
  R();
}

// âââ RENDER BUILDING âââ
function rB(bi){
  const b=B[bi],a=b.a;
  if(!b.fl)b.fl=gFL(b.niv||9);
  a.sort((x,y)=>b.fl.indexOf(x.f)-b.fl.indexOf(y.f));

  // ââ TABLE PRINCIPALE ââ
  // Build type summary first
  const types={};let tIdx=0;
  a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p);const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  const typeCounts={},typeRef={},typeRecap={};
  a.forEach(x=>{typeCounts[x.type]=(typeCounts[x.type]||0)+1;if(!typeRef[x.type])typeRef[x.type]=x;typeRecap[x.type]=getRecap(x)});
  const sortedTypes=Object.entries(typeCounts).sort((a,b)=>a[0].localeCompare(b[0]));
  const hasBefore=a.some(x=>x.tb!==undefined);

  let h=`<div class="card"><div class="card-h">ð Tableau AbonnÃĐ â ${b.n}
    <div class="rt">
      <button class="btn-top" style="padding:4px 14px;font-size:10px" onclick="figerTypes(${bi})">ðļ Figer types avant correction</button>
      ${hasBefore?`<button class="btn-top" style="padding:4px 14px;font-size:10px" onclick="clearTypes(${bi})">â Effacer</button>`:''}
      <span class="badge-count">${a.length} logements</span>
    </div></div><div class="card-b">`;

  // ââ BLOC RECAP / QTE / TYPE (placÃĐ AU-DESSUS en format horizontal compact) ââ
  h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:10px 12px;background:rgba(123,95,172,0.04);border:1px solid rgba(123,95,172,0.12);border-radius:8px;align-items:center">
    <span style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(155,125,197,0.65);text-transform:uppercase;margin-right:4px">RÃĐcap types :</span>`;
  sortedTypes.forEach(([t,cnt])=>{
    const rc=typeRecap[t];

  const b=B[bi];
  if(!b.typeAuto)b.typeAuto={};

    b.typeAuto[type]=false;

}

function computeAutoDepsType(bi,type,refAp){
  const b=B[bi];
  // Apply to all apartments of this type
  b.a.forEach(ap=>{
    if(ap.type!==type)return;
    ap.p=pw(ap.u);ap.c=cl(ap.p);

    // Regrouper les circuits selon leur type de diffÃĐrentiel
    // AC par dÃĐfaut, sauf ceux listÃĐs dans TYPE_BY_KEY
    const byDiff={AC:[],A:[],F:[],B:[]};
    CIR.forEach(c=>{
      if(c.k==='tele'||c.k==='sonn')return;
      const q=ap[c.k]||0;
      const diff=TYPE_BY_KEY[c.k]||'AC';
      for(let i=0;i<q;i++) byDiff[diff].push(c.k);
    });

    const typeACirs=byDiff.AC;
    const typeAcirs=byDiff.A;
    const typeFcirs=byDiff.F;
    const typeBcirs=byDiff.B;

    // Nombre de dÃĐparts AC (limite de 8 circuits par ID)
    const nbAC=Math.max(1,Math.ceil(typeACirs.length/8));

    // Construction : AC d'abord, puis A si besoin, puis F si besoin, puis B si besoin
    const deps=[]; // array of { cirs: [], diffType: 'AC'|'A'|'F'|'B' }
    for(let i=0;i<nbAC;i++) deps.push({cirs:[],diffType:'AC'});
    const idxA = typeAcirs.length ? deps.length : -1;
    if(typeAcirs.length) deps.push({cirs:[],diffType:'A'});
    const idxF = typeFcirs.length ? deps.length : -1;
    if(typeFcirs.length) deps.push({cirs:[],diffType:'F'});
    const idxB = typeBcirs.length ? deps.length : -1;
    if(typeBcirs.length) deps.push({cirs:[],diffType:'B'});

    // RÃĐpartition Type AC : PC GTL sur le 1er, puis ECL / PC / autres ÃĐquilibrÃĐs
    const eclK=typeACirs.filter(k=>k==='ecl');
    const pcK=typeACirs.filter(k=>k==='pc');
    const pcgtlK=typeACirs.filter(k=>k==='pcgtl');
    const otherK=typeACirs.filter(k=>k!=='ecl'&&k!=='pc'&&k!=='pcgtl');

    pcgtlK.forEach(k=>deps[0].cirs.push(k));
    eclK.forEach((k,i)=>deps[i%nbAC].cirs.push(k));
    pcK.forEach((k,i)=>deps[i%nbAC].cirs.push(k));
    otherK.forEach(k=>{let best=0,br=0;for(let i=0;i<nbAC;i++){const r=8-deps[i].cirs.length;if(r>br){br=r;best=i}}deps[best].cirs.push(k)});

    // Type A : plaque + LL
    typeAcirs.forEach(k=>{ if(idxA>=0) deps[idxA].cirs.push(k); });
    // Type F : PAC / CLIM / PISC / VARM / IRVE_AC
    typeFcirs.forEach(k=>{ if(idxF>=0) deps[idxF].cirs.push(k); });
    // Type B : IRVE_DC / VAR.T / CHRG.I
    typeBcirs.forEach(k=>{ if(idxB>=0) deps[idxB].cirs.push(k); });

    // ââ OPTIMISATION : remplir Type A pour dÃĐlester les AC 63A â 40A ââ
    if(typeAcirs.length && idxA>=0){
      const depA=deps[idxA].cirs;
      function depCalc(dep){let f=0,h2=0;dep.forEach(k=>{const a=CIR_AMP[k]||0;if(NON_DIV.includes(k))f+=a;else h2+=a});return f+h2/2}
      const pivotOrder=['ecl','pc','vr','th'];
      for(let di=0;di<nbAC;di++){
        const acDep=deps[di].cirs;
        let acMin=depCalc(acDep);
        if(acMin<=40)continue;
        for(const pk of pivotOrder){
          const idx=acDep.indexOf(pk);
          if(idx===-1)continue;
          const newACal=depCalc([...depA,pk]);
          if(newACal>40)continue;
          if(depA.length>=8)continue;
          acDep.splice(idx,1);
          depA.push(pk);
          acMin=depCalc(acDep);
          if(acMin<=40)break;
        }
      }
    }

    // Format de sortie : on conserve la compatibilitÃĐ avec l'ancienne API
    // (deps = tableau de tableaux de clÃĐs), mais on ajoute ap._depTypes
    // pour tracer le type de diffÃĐrentiel de chaque dÃĐpart.
    ap._deps = deps.map(d => d.cirs);
    ap._depTypes = deps.map(d => d.diffType);
  });
}

// Amperage par circuit
const CIR_AMP={pcgtl:16,ecl:10,pc:16,plaq:32,four:20,ll:20,lv:20,sl:20,ss:20,bec:20,chauf:20,chaud:10,vr:10,th:2,rt:2,mo:20,pac:20,clim:16,pisc:16,varm:16,irve_ac:32};
const CIR_AMP_DEFAULT = Object.assign({}, CIR_AMP);
// Circuits non divisÃĐs (chauffage + ECS comptÃĐs Ã  100%)
const NON_DIV=['chauf','chaud'];

// L'utilisateur peut cliquer sur un calibre dans la ligne d'en-tÃŠte pour
// le modifier. On extrait le nombre pour mettre Ã  jour CIR_AMP utilisÃĐ par
// les calculs (calcIDCal, recap modulesâĶ) ; le libellÃĐ brut "32A" / "10A"
// reste dans CIR[*].a pour l'affichage.
function setCirCal(k, val){
  const c = CIR.find(x => x.k === k);
  if (!c) return;
  c.a = String(val || '').trim();
  const num = parseInt(c.a, 10);
  if (!isNaN(num) && num > 0) CIR_AMP[k] = num;
  R();
}
function resetCalibres(){
  if(!confirm('Remettre tous les calibres et types d\'interrupteur Ã  leurs valeurs par dÃĐfaut ?\n\n(Les colonnes personnalisÃĐes que vous avez ajoutÃĐes sont conservÃĐes.)')) return;
  // Restaurer CIR[*].a pour les clÃĐs "standard" (pas _a*) Ã  partir du snapshot
  CIR.forEach(c => {
    const d = CIR_DEFAULT.find(x => x.k === c.k);
    if (d) c.a = d.a;
  });
  // Restaurer CIR_AMP pour les clÃĐs standard
  Object.keys(CIR_AMP_DEFAULT).forEach(k => { CIR_AMP[k] = CIR_AMP_DEFAULT[k]; });
  // Restaurer TYPE_BY_KEY â supprime les types ajoutÃĐs manuellement sur des
  // clÃĐs standard et remet les valeurs d'origine
  Object.keys(TYPE_BY_KEY).forEach(k => {
    if (!(k in TYPE_BY_KEY_DEFAULT) && !k.startsWith('_a')) delete TYPE_BY_KEY[k];
  });
  Object.keys(TYPE_BY_KEY_DEFAULT).forEach(k => { TYPE_BY_KEY[k] = TYPE_BY_KEY_DEFAULT[k]; });
  R();
}

function calcIDCal(depCirs, diffType){
  let full=0,half=0;
  // Pour Type F et Type B : tous les courants sont comptÃĐs Ã  100%
  // (charges continues / inverses, pas de foisonnement domestique standard)
  const fullAll = (diffType==='F' || diffType==='B');
  depCirs.forEach(c=>{
    const amp=CIR_AMP[c.k]||0;
    if(fullAll || NON_DIV.includes(c.k))full+=amp;
    else half+=amp;
  });
  const minCal=full+half/2;
  if(minCal<=25)return 25;
  if(minCal<=40)return 40;
  // 63A est le calibre maximum autorisÃĐ pour les interrupteurs diffÃĐrentiels
  // dans ce projet â au-delÃ , on reste Ã  63A (l'utilisateur doit alors
  // rÃĐpartir manuellement les circuits sur plusieurs interrupteurs).
  return 63;
}

function dropCir(ev,apRef,targetDepIdx){
  ev.preventDefault();
  if(!_dragData||_dragData.apRef!==apRef)return;
  const{depIdx:srcDep,cirKey}=_dragData;
  if(srcDep===targetDepIdx)return;
  _dragData=null;
  
  // Find the apartment
  const[bi,type]=apRef.split('_');
  const b=B[parseInt(bi)];
  const types={};let tIdx=0;
  b.a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p);const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  
  // Find all apartments of this type
  const aps=b.a.filter(x=>x.type===type);
  if(!aps.length)return;
  
  // Move circuit by key in _deps
  aps.forEach(ap=>{
    if(!ap._deps)return;
    if(srcDep>=ap._deps.length||targetDepIdx>=ap._deps.length)return;
    const idx=ap._deps[srcDep].indexOf(cirKey);
    if(idx===-1)return;
    ap._deps[srcDep].splice(idx,1);
    ap._deps[targetDepIdx].push(cirKey);
  });
  
  R();
}

// La dÃĐtection se fait sur les MAGIC BYTES du fichier (PK = zip = xlsx,
// sinon JSON .ALG) plutÃīt que sur l'extension, pour gÃĐrer correctement

async function importDeriv(input){

    const head=new Uint8Array(await file.slice(0,4).arrayBuffer());

      const raw=ds.getCell('A1').value;
      if(!raw){alert('DonnÃĐes vides.');input.value='';return}
      data=JSON.parse(raw);
    } else {
      // Format .ALG â JSON brut texte
      const txt=await file.text();
      try{ data=JSON.parse(txt); }
      catch{
        alert('Fichier non reconnu.\n\nFormats acceptÃĐs : .xlsx exportÃĐ par DÃĐrivations TGBT, ou .ALG (Partage TA).');
        input.value='';return;
      }

        alert('Ce fichier .ALG n\'est pas un partage valide A.L.GOMES.\n\nAttendu : un fichier gÃĐnÃĐrÃĐ par le bouton ÂŦ ð Partage TA Âŧ de DÃĐrivations TGBT.');
        input.value='';return;
      }
    }
    if(data._cir)data._cir.forEach(c=>{if(!CIR.find(x=>x.k===c.k)){CIR.push(c);CIR_AMP[c.k]=parseInt(c.a)||20}});
    if(data.P)document.getElementById('projName').value=data.P;
    if(data.B&&data.B.length>0){
      B=data.B.map(b=>({
        n:b.n,niv:b.niv||9,fl:b.fl||gFL(b.niv||9),

          const p=pw(ap.u||0);
          return{f:ap.f||'RDC',r:ap.r||'',e:ap.e||'',u:ap.u||0,p,c:cl(p),...defCir(p)};
        })
      }));
      curTab='b0';R();
    }else{alert('Aucun bÃĒtiment trouvÃĐ.')}
  }catch(e){alert('Erreur : '+e.message)}
  input.value='';
}

        svg+=`<rect x="${xC}" y="${yC}" width="${_chipInnerW}" height="36" rx="6" fill="${cc.bg}" stroke="${cc.border}" stroke-width="1.2"/>`;

        svg+=`<text x="${xC+50}" y="${yC+22}" font-size="8" fill="${cc.color}" font-family="Segoe UI" opacity="0.9">${_disp}</text>`;
      });

      svg+=`</svg>`;

      pw2.document.write(`<div class="pb"></div><div class="pg" style="page-break-inside:avoid">
        <div class="hdr" style="margin-bottom:4px"><img src='${_LOGO_B64}' style='height:28px;border-radius:4px'><h1>${pNameH} â ${_e(b.n)} â SchÃĐma Type ${_e(t)}</h1><span>NF C 15-100 Â· AL GOMES</span></div>
        ${svg}
        <div class="ft" style="margin-top:4px;font-size:8px">AL GOMES â Bureau d'Ãtudes Techniques ÃlectricitÃĐ â NF C 15-100</div>
      </div>`);
    });
  });

// âââ EXPORT DXF (AutoCAD) â Layout exact du modÃĻle AL GOMES âââ
function exportDXF(){
  if(!B.length){alert('Aucun bÃĒtiment');return}
  const pName=document.getElementById('projName').value.trim()||'Sans titre';
  const bi=parseInt((curTab||'b0').replace('b',''));
  const b=B[bi];if(!b){alert('BÃĒtiment introuvable');return}
  const a=[...b.a];if(!b.fl)b.fl=gFL(b.niv||9);
  a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p)});
  a.sort((x,y)=>b.fl.indexOf(x.f)-b.fl.indexOf(y.f));
  const types={};let tIdx=0;
  a.forEach(x=>{const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  const typeCounts={},typeRef={};
  a.forEach(x=>{typeCounts[x.type]=(typeCounts[x.type]||0)+1;if(!typeRef[x.type])typeRef[x.type]=x});
  const sortedT=Object.entries(typeCounts).sort((a2,b2)=>a2[0].localeCompare(b2[0]));

  let ents='';
  const _CS=16,_DG=22;
  const _CL=8,_CR=337,_CB=-15.7,_CT=227,_CW=329,_CH=242.7;
  const _CN={pcgtl:'PC-GTL',ecl:'ECL',pc:'PC',plaq:'PLAQ',four:'FOUR',ll:'LL',lv:'LV',sl:'SL',ss:'SS',bec:'BEC',chauf:'CHAUF',chaud:'CHAUD',vr:'VR',th:'TH',rt:'RT2012',mo:'M.ONDE',pac:'PAC',clim:'CLIM',pisc:'PISC',varm:'VAR.M',irve_ac:'IRVE-AC'};

  function dL(x1,y1,x2,y2,ly){ents+='0\nLINE\n8\n'+(ly||'SCHEMA')+'\n10\n'+x1.toFixed(3)+'\n20\n'+y1.toFixed(3)+'\n30\n0\n11\n'+x2.toFixed(3)+'\n21\n'+y2.toFixed(3)+'\n31\n0\n'}
  function dT(x,y,h,txt,ly,rot){ents+='0\nTEXT\n8\n'+(ly||'TEXTE')+'\n10\n'+x.toFixed(3)+'\n20\n'+y.toFixed(3)+'\n30\n0\n40\n'+h.toFixed(2)+'\n1\n'+txt+'\n';if(rot)ents+='50\n'+rot.toFixed(1)+'\n'}
  function dTc(cx,y,h,txt,ly){dT(cx-(''+txt).length*h*0.55/2,y,h,''+txt,ly)}
  function dR(x,y,w,h,ly){dL(x,y,x+w,y,ly);dL(x+w,y,x+w,y+h,ly);dL(x+w,y+h,x,y+h,ly);dL(x,y+h,x,y,ly)}
  function dDJ(cx,by,bw){dR(cx-bw/2,by,bw,16);dL(cx-bw/2+1.5,by+13,cx+bw/2-1.5,by+13);dL(cx,by+13,cx,by+10);dR(cx-2.5,by+1.5,5,5)}
  function dAR(x,y){dL(x,y-6,x,y+6);dL(x,y+6,x+10,y);dL(x+10,y,x,y-6)}
  function dAL(x,y){dL(x,y-6,x,y+6);dL(x,y+6,x-10,y);dL(x-10,y,x,y-6)}

  function dLogo(ox,oy){
    const cx=ox+153.7,cy=oy-12,ro=13.2,ri=7.2,n=40,ly='LOGO';
    for(let i=0;i<n;i++){const a1=Math.PI*i/n,a2=Math.PI*(i+1)/n;
      dL(cx+ro*Math.cos(a1),cy+ro*Math.sin(a1),cx+ro*Math.cos(a2),cy+ro*Math.sin(a2),ly);
      dL(cx+ri*Math.cos(a1),cy+ri*Math.sin(a1),cx+ri*Math.cos(a2),cy+ri*Math.sin(a2),ly)}
    dL(cx+ri,cy,cx+ro,cy,ly);dL(cx-ri,cy,cx-ro,cy,ly);dL(cx,cy+ri,cx,cy+ro,ly);
    [['A',144.1,-8.5,70],['.',145.6,-5.8,52.5],['L',147.8,-3.6,35],['.',150.6,-2.3,17.5],
     ['G',153.7,-1.8,0],['O',156.7,-2.3,342.5],['M',159.5,-3.6,325],['E',161.7,-5.8,307.5],['S',163.2,-8.5,290]
    ].forEach(([ch,x,y,r])=>dT(ox+x,oy+y,1.65,ch,'LOGO',r));
  }

  function buildDeps(ref){
    const allCir=[];
    CIR.forEach(c=>{if(c.k==='tele'||c.k==='sonn')return;const q=ref[c.k]||0;
      for(let i=0;i<q;i++)allCir.push({k:c.k,n:_CN[c.k]||c.k,a:CIR_AMP[c.k]||10,mod:c.k==='plaq'?2:c.k==='rt'?6:1,subs:[],uid:c.k+'_'+i});
      if(!_CN[c.k])_CN[c.k]=c.n});
    const ecls=allCir.filter(c=>c.k==='ecl');
    for(let i=0;i<(ref.tele||0);i++)if(ecls.length)ecls[i%ecls.length].subs.push('TEL');
    for(let i=0;i<(ref.sonn||0);i++){const idx=(ref.tele||0)+i;if(ecls.length)ecls[idx%ecls.length].subs.push('SON')}
    const deps=ref._deps||[];const bD=[];const used={};
    deps.forEach((dk,di)=>{const dc=[];
      dk.forEach(k=>{if(k==='tele'||k==='sonn')return;const c=allCir.find(cc=>cc.k===k&&!used[cc.uid]);if(c){used[c.uid]=true;dc.push(c)}});
      dc.sort((x,y)=>y.a-x.a);
      const isA=di===deps.length-1&&allCir.some(c=>c.k==='plaq'||c.k==='ll');
      let fA=0,hA=0;dc.forEach(c=>{if(NON_DIV.includes(c.k))fA+=c.a;else hA+=c.a});
      const mA=fA+hA/2;const cal=mA<=40?40:63;
      const mc=2+dc.reduce((s,c)=>s+c.mod+c.subs.length,0);
      bD.push({type:isA?'A':'AC',cal,cir:dc,mc,fA,hA,mA})});
    if(!bD.length){const ac=allCir.filter(c=>c.k!=='plaq'&&c.k!=='ll');const ta=allCir.filter(c=>c.k==='plaq'||c.k==='ll');
      let f1=0,h1=0;ac.forEach(c=>{if(NON_DIV.includes(c.k))f1+=c.a;else h1+=c.a});
      bD.push({type:'AC',cal:f1+h1/2<=40?40:63,cir:ac,mc:2+ac.reduce((s,c)=>s+c.mod+c.subs.length,0),fA:f1,hA:h1,mA:f1+h1/2});
      if(ta.length){let f2=0,h2=0;ta.forEach(c=>{if(NON_DIV.includes(c.k))f2+=c.a;else h2+=c.a});
        bD.push({type:'A',cal:f2+h2/2<=40?40:63,cir:ta,mc:2+ta.reduce((s,c)=>s+c.mod+c.subs.length,0),fA:f2,hA:h2,mA:f2+h2/2})}}
    return bD;
  }

  function compPos(bD,dI,sX){
    const dp=[];let cx=sX;
    dI.forEach(di=>{const dep=bD[di];const cx2=[];
      dep.cir.forEach(c=>{cx2.push({c,x:cx});cx+=_CS;if(c.subs.length)cx+=9});
      const bs=cx2[0].x,be=cx2[cx2.length-1].x;
      dp.push({dep,di,cx:(bs+be)/2,bs,be,cirs:cx2});cx+=_DG-_CS});
    return{dp,w:cx-_DG+_CS}
  }

  function splitDeps(bD){
    const mw=_CW-26;const all=[];for(let i=0;i<bD.length;i++)all.push(i);
    const{w}=compPos(bD,all,0);if(w<=mw)return[all];
    const groups=[];let cur=[];
    for(let di=0;di<bD.length;di++){const test=[...cur,di];const{w:tw}=compPos(bD,test,0);
      if(tw>mw&&cur.length){groups.push(cur);cur=[di]}else cur=test}
    if(cur.length)groups.push(cur);return groups;
  }

  function drawFolio(ox,oy,tt,tm,rg,bD,dI,tpn,tpt,iF,iL){
    const cL=ox+_CL,cR=ox+_CR,pcx=(cL+cR)/2,bY=oy+140;
    dR(cL,oy+_CB,_CW,_CH,'CADRE');
    dL(cL,oy+213,cR,oy+213,'CADRE');dL(cL,oy+16.1,cR,oy+16.1,'CADRE');dL(cL,oy+4.1,cR,oy+4.1,'CADRE');
    dTc(pcx,oy+218,4.5,pName+' - '+b.n,'TITRE');
    dT(cL+7,oy+205,4.5,'TYPE '+tt,'TITRE');
    dR(cR-48,oy+205,38,7,'CADRE');dTc(cR-29,oy+207,2.2,tm+' mod - '+rg+' r.','TEXTE');
    if(iF){dR(pcx-9,oy+155,18,20);dL(pcx-4,oy+171,pcx+4,oy+171);dL(pcx,oy+171,pcx,oy+167);
      dR(pcx-4,oy+158,8,8);dTc(pcx,oy+151,3,'DISJ. ABONNE '+typeRef[tt].c+'A');dL(pcx,oy+155,pcx,bY)}
    const{dp}=compPos(bD,dI,cL+13);
    const lB=dp[0].cx,rB=dp[dp.length-1].cx;
    if(iF&&iL)dL(lB,bY,rB,bY);
    else if(iF){dL(lB,bY,cR-15,bY);dAR(cR-15,bY)}
    else if(iL){dAL(cL+15,bY);dL(cL+15,bY,rB,bY)}
    else{dAL(cL+15,bY);dL(cL+15,bY,cR-15,bY);dAR(cR-15,bY)}
    dp.forEach(d=>{const{dep,di,cx:dcx}=d;
      dL(dcx,bY,dcx,bY-5);dTc(dcx,oy+130,3,'DEPART '+(di+1)+' - '+dep.mc+' mod');
      dR(dcx-10,oy+102,20,24);dTc(dcx,oy+121,2.8,'30mA');
      dL(dcx-6,oy+117,dcx+6,oy+117);dL(dcx,oy+117,dcx,oy+113);
      dR(dcx-4,oy+104,8,8);dTc(dcx,oy+106,3,dep.type);
      dTc(dcx,oy+97,3,'ID '+dep.cal+'A');dL(dcx,oy+102,dcx,oy+92);
      dL(d.bs,oy+92,d.be,oy+92);
      d.cirs.forEach(ci=>{const{c,x:ccx}=ci;
        dL(ccx,oy+92,ccx,oy+88);const bw=c.mod===2?10:7;dDJ(ccx,oy+72,bw);dL(ccx,oy+72,ccx,oy+68);
        if(c.subs.length)c.subs.forEach(sn=>{const tx=ccx+13.4;dL(ccx,oy+70,tx,oy+70);dL(tx,oy+70,tx,oy+67);dR(tx-4,oy+57,8,10);dT(tx-3.2,oy+60,2.5,sn)});
        if(c.k==='rt'){dL(ccx,oy+68,ccx,oy+55);dR(ccx-15,oy+30,30,25);
          for(let sq=0;sq<5;sq++)dR(ccx-12+sq*5.5,oy+33,4,6);
          dTc(ccx,oy+25,1.8,'Gest. Energie')}
        dTc(ccx,oy+64,2.8,c.a+'A');dTc(ccx,oy+60,2.5,c.n)});
      dR(d.bs-_CS/2,oy+42,d.be-d.bs+_CS,6);
      dTc(dcx,oy+43.5,2,dep.mc+' mod (ID:2 + '+(dep.mc-2)+' disj)')});
    dT(cL+4,oy+17.6,2.5,'CALCUL CALIBRES ID','TITRE');
    dI.forEach((di,li)=>{const dep=bD[di];
      const p=dep.cir.map(c=>c.n+':'+c.a+'A').join(', ');
      dT(cL+4,oy+13.1-li*4,1.8,'DEP '+(di+1)+' ('+dep.type+'): '+p+'  =>  '+dep.fA+'+'+dep.hA+'/2 = '+Math.round(dep.mA)+'A  =>  ID '+dep.cal+'A','CALCUL')});
    // Footer
    [172.5,221.8,254.8].forEach(sx=>dL(cL+sx-_CL,oy+_CB,cL+sx-_CL,oy+4.1,'CADRE'));
    dT(cL+4,oy-8,2,"AL GOMES - Bureau d'Etudes Techniques Electricite");
    dLogo(ox,oy);
    const ds=new Date().toLocaleDateString('fr-FR');
    dTc(cL+(172.5+221.8)/2-_CL,oy-8,3.5,ds);
    dTc(cL+(221.8+254.8)/2-_CL,oy-8,3.5,tpn+'/'+tpt);
    dTc(cL+(254.8+_CR)/2-_CL,oy-8,3.5,'NF C 15-100');
  }

  // Generate all folios
  let curY=0,prevType=null,curX=0;
  sortedT.forEach(([type,cnt])=>{
    const ref=typeRef[type];
    if(!ref._deps){if(!b.typeAuto)b.typeAuto={};if(b.typeAuto[type]!==false)computeAutoDepsType(bi,type,ref)}
    const bD=buildDeps(ref);
    const totalMod=bD.reduce((s,d)=>s+d.mc,0);
    const rangees=Math.ceil(totalMod*1.2/13);
    const groups=splitDeps(bD);const nF=groups.length;
    if(prevType!==null)curY-=_CH+30;
    curX=0;
    groups.forEach((g,gi)=>{
      drawFolio(curX,curY,type,totalMod,rangees,bD,g,gi+1,nF,gi===0,gi===nF-1);
      curX+=_CW+20});
    prevType=type});

  // Assemble DXF R12
  let dxf='999\nDXF generated by AL GOMES - Tableau Abonne\n';
  dxf+='0\nSECTION\n2\nHEADER\n';
  dxf+='9\n$ACADVER\n1\nAC1009\n';
  dxf+='9\n$INSUNITS\n70\n4\n';
  dxf+='0\nENDSEC\n';
  dxf+='0\nSECTION\n2\nTABLES\n';
  dxf+='0\nTABLE\n2\nLAYER\n70\n6\n';
  ['CADRE','TITRE','TEXTE','SCHEMA','CALCUL','LOGO'].forEach(n=>{
    dxf+='0\nLAYER\n2\n'+n+'\n70\n0\n62\n7\n6\nCONTINUOUS\n'});
  dxf+='0\nENDTAB\n0\nENDSEC\n';
  dxf+='0\nSECTION\n2\nENTITIES\n'+ents+'0\nENDSEC\n';
  dxf+='0\nEOF\n';

  const blob=new Blob([dxf],{type:'application/dxf'});
  const url=URL.createObjectURL(blob);
  const aa=document.createElement('a');aa.href=url;
  aa.download=pName.replace(/[^a-zA-Z0-9_-]/g,'_')+'_'+b.n+'_TA.dxf';
  aa.click();URL.revokeObjectURL(url);
}

// âââ AJOUT ALIM PERSONNALISEE âââ
function addAlim(){
  const name=prompt('IntitulÃĐ du circuit :');
  if(!name)return;
  const calStr=prompt('Calibre (A) :','20');
  if(!calStr)return;
  const cal=parseInt(calStr)||20;
  // Type d'interrupteur diffÃĐrentiel sous lequel placer ce nouveau circuit.
  // AC = classique, A = composante continue, F = onduleur/variateur, B = DC.
  const typeIn=(prompt(
    'Type d\'interrupteur diffÃĐrentiel ?\n\n' +
    '  AC  = classique (par dÃĐfaut)\n' +
    '  A   = courants Ã  composante continue (LL, plaqueâĶ)\n' +
    '  F   = onduleur / variateur / PAC / IRVE AC\n' +
    '  B   = bornes IRVE en DC',
    'AC'
  ) || 'AC').trim().toUpperCase();
  const type = ['AC','A','F','B'].includes(typeIn) ? typeIn : 'AC';
  let idx=1;while(CIR.find(c=>c.k==='_a'+idx))idx++;
  const k='_a'+idx;
  CIR.push({k,n:name,a:cal+'A'});
  CIR_AMP[k]=cal;
  if (type !== 'AC') TYPE_BY_KEY[k] = type;
  B.forEach(b=>b.a.forEach(ap=>{if(ap[k]===undefined)ap[k]=0}));
  R();
}
function removeAlim(k){
  if(!confirm('Supprimer la colonne "'+CIR.find(c=>c.k===k).n+'" ?'))return;
  const idx=CIR.findIndex(c=>c.k===k);
  if(idx>-1)CIR.splice(idx,1);
  delete CIR_AMP[k];
  delete TYPE_BY_KEY[k];
  B.forEach(b=>b.a.forEach(ap=>{delete ap[k]}));
  R();
}
