.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;

.tab{padding:10px 22px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(180,165,200,0.40);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s}

.card{border-radius:10px;border:1px solid rgba(123,95,172,0.10);background:linear-gradient(165deg,rgba(22,18,32,0.70) 0%,rgba(14,14,16,0.80) 100%);margin-bottom:18px;position:relative;overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;padding:14px 18px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(220,210,235,0.85);border-bottom:1px solid rgba(123,95,172,0.06)}

table{width:100%;border-collapse:collapse;white-space:nowrap}

input[type="number"]{background:rgba(22,18,32,0.6);border:1px solid rgba(123,95,172,0.10);border-radius:3px;color:rgba(220,210,235,0.90);padding:3px 2px;font-family:inherit;font-size:11px;text-align:center;width:38px;-moz-appearance:textfield}

<script>
// ═══ CIRCUITS ═══
// Ordre d'affichage : Type A d'abord (plaque, LL), puis Type AC, puis Type F/HPI
const CIR=[
  // ── Type A (courants de défaut à composante continue) ──
  {k:'plaq',n:'PLAQUE',a:'32A'},{k:'ll',n:'LL',a:'20A'},
  // ── Type AC (circuits classiques) ──
  {k:'pcgtl',n:'PC GTL',a:'16A'},{k:'ecl',n:'ECL',a:'10A'},{k:'pc',n:'PC',a:'16A'},
  {k:'tele',n:'TELE.',a:'Disj Ecl'},{k:'sonn',n:'SON.',a:'Disj Ecl'},
  {k:'four',n:'Four',a:'20A'},{k:'lv',n:'LV',a:'20A'},
  {k:'sl',n:'SL',a:'20A'},{k:'ss',n:'SS',a:'20A'},{k:'bec',n:'BEC',a:'20A'},
  {k:'chauf',n:'CHAUFF.',a:'20A'},{k:'chaud',n:'CHAUD.',a:'10A'},{k:'vr',n:'VR',a:'10A'},{k:'th',n:'TH',a:'2A'},{k:'rt',n:'RT2012',a:'2A'},{k:'mo',n:'M.ONDE',a:'20A'},
  // ── Type F / HPI (immunité renforcée) ──
  {k:'pac',n:'PAC',a:'20A'},{k:'clim',n:'CLIM',a:'16A'},{k:'pisc',n:'PISC.',a:'16A'},{k:'varm',n:'VAR.M',a:'16A'},{k:'irve_ac',n:'IRVE AC',a:'32A'}
];
// Mapping circuit → type de différentiel
// 'AC' par défaut pour tous les circuits non listés
const TYPE_BY_KEY={
  plaq:'A',ll:'A',
  pac:'F',clim:'F',pisc:'F',varm:'F',irve_ac:'F'
};
function defCir(kva){
  if(kva>=12) return{pcgtl:1,ecl:3,pc:4,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
  if(kva>=9)  return{pcgtl:1,ecl:3,pc:4,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
  return{pcgtl:1,ecl:2,pc:2,tele:1,sonn:1,plaq:1,four:1,ll:1,lv:1,sl:0,ss:1,bec:0,chauf:0,chaud:1,vr:1,th:1,rt:0,mo:0,pac:0,clim:0,pisc:0,varm:0,irve_ac:0};
}
function pw(s){return s<35?6:s<100?9:12}
function cl(p){return p===3?15:p===6?45:p===9?45:p===12?60:45}
function gFL(niv){const f=['RDC'];for(let i=1;i<=niv;i++)f.push('R+'+i);return f}
function getRecap(x){return ''+x.c+CIR.map(c=>x[c.k]).join('')}
const TYPE_COLORS=[
  {bg:'rgba(0,176,240,0.15)',  border:'rgba(0,176,240,0.35)',  color:'#00B0F0'},
  {bg:'rgba(237,125,49,0.15)', border:'rgba(237,125,49,0.35)', color:'#ED7D31'},
  {bg:'rgba(84,130,53,0.15)',  border:'rgba(84,130,53,0.35)',  color:'#70AD47'},
  {bg:'rgba(192,0,0,0.15)',    border:'rgba(192,0,0,0.35)',    color:'#FF4444'},
  {bg:'rgba(155,89,182,0.18)', border:'rgba(155,89,182,0.40)', color:'#BB6BD9'},
  {bg:'rgba(241,196,15,0.15)', border:'rgba(241,196,15,0.35)', color:'#F1C40F'},
  {bg:'rgba(26,188,156,0.15)', border:'rgba(26,188,156,0.35)', color:'#1ABC9C'},
  {bg:'rgba(231,76,60,0.15)',  border:'rgba(231,76,60,0.35)',  color:'#E74C3C'},
  {bg:'rgba(52,152,219,0.15)', border:'rgba(52,152,219,0.35)', color:'#3498DB'},
  {bg:'rgba(230,126,34,0.15)', border:'rgba(230,126,34,0.35)', color:'#E67E22'},
  {bg:'rgba(142,68,173,0.15)', border:'rgba(142,68,173,0.35)', color:'#8E44AD'},
  {bg:'rgba(39,174,96,0.15)',  border:'rgba(39,174,96,0.35)',  color:'#27AE60'},
  {bg:'rgba(44,62,80,0.20)',   border:'rgba(44,62,80,0.40)',   color:'#95A5A6'},
  {bg:'rgba(211,84,0,0.15)',   border:'rgba(211,84,0,0.35)',   color:'#D35400'}
];
function typeBadge(t){const i=t.charCodeAt(0)-65;const c=TYPE_COLORS[i%TYPE_COLORS.length];return '<span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;background:'+c.bg+';color:'+c.color+';border:1px solid '+c.border+'">'+t+'</span>'}

let B=[],curTab=null;

// ═══ CLOCK ═══
function tk(){
  const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
  // Garde-fou : si la topbar n'existe plus dans le DOM (auth-guard a remplacé
  // body, page chargée hors-shell, etc.), on évite de spam les erreurs.
  const elT = document.getElementById('tT');
  if (!elT) return;
  elT.textContent=h+':'+m+':'+s;
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const elD = document.getElementById('topDate');
  if (elD) elD.textContent=days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}
tk();setInterval(tk,1000);

// ═══ RENDER ═══
function R(){
  let total=0;B.forEach(b=>total+=b.a.length);
  document.getElementById('bL').textContent=total+' lgts';
  let th='';B.forEach((b,i)=>{th+=`<div class="tab${curTab==='b'+i?' on':''}" onclick="S('b${i}')">${b.n}</div>`});
  document.getElementById('tabs').innerHTML=th;
  if(!B.length){document.getElementById('sh').innerHTML=`<div class="empty"><div class="ic-big">📋</div><div class="msg">Aucun bâtiment chargé<br><br>Importez un fichier Excel provenant de<br><strong>Dérivations & TGBT</strong> pour commencer</div></div>`;return}
  if(curTab===null)curTab='b0';
  const bi=parseInt(curTab.replace('b',''));
  if(bi>=B.length){curTab='b0';return R()}
  document.getElementById('sh').innerHTML=rB(bi);
}
function S(t){curTab=t;R()}

function figerTypes(bi){
  B[bi].a.forEach(x=>{x.tb=x.type});
  R();
}
function clearTypes(bi){
  B[bi].a.forEach(x=>{delete x.tb});
  R();
}

// ═══ RENDER BUILDING ═══
function rB(bi){
  const b=B[bi],a=b.a;
  if(!b.fl)b.fl=gFL(b.niv||9);
  a.sort((x,y)=>b.fl.indexOf(x.f)-b.fl.indexOf(y.f));

  // ── TABLE PRINCIPALE ──
  // Build type summary first
  const types={};let tIdx=0;
  a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p);const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  const typeCounts={},typeRef={},typeRecap={};
  a.forEach(x=>{typeCounts[x.type]=(typeCounts[x.type]||0)+1;if(!typeRef[x.type])typeRef[x.type]=x;typeRecap[x.type]=getRecap(x)});
  const sortedTypes=Object.entries(typeCounts).sort((a,b)=>a[0].localeCompare(b[0]));
  const hasBefore=a.some(x=>x.tb!==undefined);

  let h=`<div class="card"><div class="card-h">📋 Tableau Abonné — ${b.n}
    <div class="rt">
      <button class="btn-top" style="padding:4px 14px;font-size:10px" onclick="figerTypes(${bi})">📸 Figer types avant correction</button>
      ${hasBefore?`<button class="btn-top" style="padding:4px 14px;font-size:10px" onclick="clearTypes(${bi})">✕ Effacer</button>`:''}
      <span class="badge-count">${a.length} logements</span>
    </div></div><div class="card-b">`;

  // ── BLOC RECAP / QTE / TYPE (placé AU-DESSUS en format horizontal compact) ──
  h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:10px 12px;background:rgba(123,95,172,0.04);border:1px solid rgba(123,95,172,0.12);border-radius:8px;align-items:center">
    <span style="font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(155,125,197,0.65);text-transform:uppercase;margin-right:4px">Récap types :</span>`;
  sortedTypes.forEach(([t,cnt])=>{
    const rc=typeRecap[t];
    h+=`<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(22,18,32,0.55);border:1px solid rgba(123,95,172,0.15);border-radius:6px" title="Recap: ${rc}">
      ${typeBadge(t)}
      <span style="font-weight:700;font-size:13px;color:rgba(220,210,235,0.90)">${cnt}</span>
      <span style="font-size:10px;color:rgba(155,125,197,0.55)">lgt${cnt>1?'s':''}</span>
    </div>`;
  });
  h+=`<div style="margin-left:auto;padding:5px 12px;background:rgba(155,89,182,0.10);border:1px solid rgba(155,89,182,0.25);border-radius:6px">
      <span style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:rgba(155,89,182,0.70);text-transform:uppercase;margin-right:6px">Total</span>
      <span style="font-weight:700;font-size:14px;color:#BB6BD9">${a.length}</span>
    </div>`;
  h+=`</div>`;

  // ── TABLEAU PRINCIPAL (prend toute la largeur disponible) ──
  h+=`<div style="overflow-x:auto"><table><tr>
    <th style="width:60px">Niveau</th><th style="width:90px">N° Archi</th><th style="width:90px">N° ENEDIS</th><th style="width:50px">m²</th><th style="width:40px">kVA</th><th style="width:40px">Cal.</th>`;
  CIR.forEach((c,ci)=>{
    // Couleur de l'en-tête selon le type de différentiel du circuit
    const dt=TYPE_BY_KEY[c.k]||'AC';
    const hc=typeDiffCol(dt);      // couleur du texte
    const hb=typeDiffBg(dt);       // fond léger
    h+=`<th class="${ci===0?'sep-l':''}" style="width:40px;background:${hb};color:${hc};border-top:2px solid ${hc}" title="Type ${dt}">${c.n}${c.k.startsWith('_a')?`<span onclick="removeAlim('${c.k}')" style="cursor:pointer;color:#E74C3C;font-size:10px;margin-left:2px" title="Supprimer">×</span>`:''}<br><span style="font-size:8px;color:${hc};opacity:0.6">${c.a}</span></th>`;
  });
  h+=`<th style="width:30px;cursor:pointer;opacity:0.5" onclick="addAlim()" title="Ajouter une alimentation">＋</th>`;
  h+=`<th class="sep-l">TYPE</th>`;
  if(hasBefore) h+=`<th>AVANT</th>`;
  h+=`</tr>`;

  let prevF='';
  a.forEach((x,i)=>{
    const newF=x.f!==prevF;prevF=x.f;
    const changed=hasBefore&&x.tb!==undefined&&x.tb!==x.type;
    h+=`<tr${newF&&i>0?' class="fsep"':''}${changed?' style="background:rgba(237,125,49,0.06)"':''}>`;
    h+=`<td style="font-weight:${newF?'700':'400'};color:${newF?'rgba(123,95,172,0.90)':'rgba(220,210,235,0.40)'}">${newF?x.f:''}</td>`;
    h+=`<td style="font-size:11px">${x.r}</td><td style="font-size:11px">${x.e}</td>`;
    h+=`<td>${x.u}</td><td style="font-weight:600;color:rgba(123,95,172,0.80)">${x.p}</td><td>${x.c}A</td>`;
    CIR.forEach((c,ci)=>{
      h+=`<td class="${ci===0?'sep-l':''}"><input type="number" value="${x[c.k]}" min="0" onchange="B[${bi}].a[${i}].${c.k}=parseInt(this.value)||0;R()"></td>`;
    });

// ═══ AUTO/MANUAL TOGGLE (per type) ═══
function toggleAutoType(bi,type){
  const b=B[bi];
  if(!b.typeAuto)b.typeAuto={};
  if(b.typeAuto[type]!==false){
    b.typeAuto[type]=false;
  }else{
    b.typeAuto[type]=true;
    // Clear manual deps for this type
    b.a.forEach(x=>{if(x.type===type)delete x._deps});
  }
  R();
}

function computeAutoDepsType(bi,type,refAp){
  const b=B[bi];
  // Apply to all apartments of this type
  b.a.forEach(ap=>{
    if(ap.type!==type)return;
    ap.p=pw(ap.u);ap.c=cl(ap.p);

    // Regrouper les circuits selon leur type de différentiel
    // AC par défaut, sauf ceux listés dans TYPE_BY_KEY
    const byDiff={AC:[],A:[],F:[],B:[]};
    CIR.forEach(c=>{
      if(c.k==='tele'||c.k==='sonn')return;
      const q=ap[c.k]||0;
      const diff=TYPE_BY_KEY[c.k]||'AC';
      for(let i=0;i<q;i++) byDiff[diff].push(c.k);
    });

    const typeACirs=byDiff.AC;
    const typeAcirs=byDiff.A;
    const typeFcirs=byDiff.F;
    const typeBcirs=byDiff.B;

    // Nombre de départs AC (limite de 8 circuits par ID)
    const nbAC=Math.max(1,Math.ceil(typeACirs.length/8));

    // Construction : AC d'abord, puis A si besoin, puis F si besoin, puis B si besoin
    const deps=[]; // array of { cirs: [], diffType: 'AC'|'A'|'F'|'B' }
    for(let i=0;i<nbAC;i++) deps.push({cirs:[],diffType:'AC'});
    const idxA = typeAcirs.length ? deps.length : -1;
    if(typeAcirs.length) deps.push({cirs:[],diffType:'A'});
    const idxF = typeFcirs.length ? deps.length : -1;
    if(typeFcirs.length) deps.push({cirs:[],diffType:'F'});
    const idxB = typeBcirs.length ? deps.length : -1;
    if(typeBcirs.length) deps.push({cirs:[],diffType:'B'});

    // Répartition Type AC : PC GTL sur le 1er, puis ECL / PC / autres équilibrés
    const eclK=typeACirs.filter(k=>k==='ecl');
    const pcK=typeACirs.filter(k=>k==='pc');
    const pcgtlK=typeACirs.filter(k=>k==='pcgtl');
    const otherK=typeACirs.filter(k=>k!=='ecl'&&k!=='pc'&&k!=='pcgtl');

    pcgtlK.forEach(k=>deps[0].cirs.push(k));
    eclK.forEach((k,i)=>deps[i%nbAC].cirs.push(k));
    pcK.forEach((k,i)=>deps[i%nbAC].cirs.push(k));
    otherK.forEach(k=>{let best=0,br=0;for(let i=0;i<nbAC;i++){const r=8-deps[i].cirs.length;if(r>br){br=r;best=i}}deps[best].cirs.push(k)});

    // Type A : plaque + LL
    typeAcirs.forEach(k=>{ if(idxA>=0) deps[idxA].cirs.push(k); });
    // Type F : PAC / CLIM / PISC / VARM / IRVE_AC
    typeFcirs.forEach(k=>{ if(idxF>=0) deps[idxF].cirs.push(k); });
    // Type B : IRVE_DC / VAR.T / CHRG.I
    typeBcirs.forEach(k=>{ if(idxB>=0) deps[idxB].cirs.push(k); });

    // ── OPTIMISATION : remplir Type A pour délester les AC 63A → 40A ──
    if(typeAcirs.length && idxA>=0){
      const depA=deps[idxA].cirs;
      function depCalc(dep){let f=0,h2=0;dep.forEach(k=>{const a=CIR_AMP[k]||0;if(NON_DIV.includes(k))f+=a;else h2+=a});return f+h2/2}
      const pivotOrder=['ecl','pc','vr','th'];
      for(let di=0;di<nbAC;di++){
        const acDep=deps[di].cirs;
        let acMin=depCalc(acDep);
        if(acMin<=40)continue;
        for(const pk of pivotOrder){
          const idx=acDep.indexOf(pk);
          if(idx===-1)continue;
          const newACal=depCalc([...depA,pk]);
          if(newACal>40)continue;
          if(depA.length>=8)continue;
          acDep.splice(idx,1);
          depA.push(pk);
          acMin=depCalc(acDep);
          if(acMin<=40)break;
        }
      }
    }

    // Format de sortie : on conserve la compatibilité avec l'ancienne API
    // (deps = tableau de tableaux de clés), mais on ajoute ap._depTypes
    // pour tracer le type de différentiel de chaque départ.
    ap._deps = deps.map(d => d.cirs);
    ap._depTypes = deps.map(d => d.diffType);
  });
}

// ═══ NF C 15-100 PANEL ═══
const COL_AB='#BB6BD9',COL_AC='#3498DB',COL_A='#ED7D31',COL_F='#F1C40F',COL_B='#E74C3C';
// Helpers pour obtenir couleur + fond selon le type de différentiel
function typeDiffCol(t){return t==='A'?COL_A:t==='F'?COL_F:t==='B'?COL_B:COL_AC}
function typeDiffBg(t){return t==='A'?'rgba(237,125,49,0.06)':t==='F'?'rgba(241,196,15,0.06)':t==='B'?'rgba(231,76,60,0.06)':'rgba(52,152,219,0.06)'}

// Amperage par circuit
const CIR_AMP={pcgtl:16,ecl:10,pc:16,plaq:32,four:20,ll:20,lv:20,sl:20,ss:20,bec:20,chauf:20,chaud:10,vr:10,th:2,rt:2,mo:20,pac:20,clim:16,pisc:16,varm:16,irve_ac:32};
// Circuits non divisés (chauffage + ECS comptés à 100%)
const NON_DIV=['chauf','chaud'];

function calcIDCal(depCirs, diffType){
  let full=0,half=0;
  // Pour Type F et Type B : tous les courants sont comptés à 100%
  // (charges continues / inverses, pas de foisonnement domestique standard)
  const fullAll = (diffType==='F' || diffType==='B');
  depCirs.forEach(c=>{
    const amp=CIR_AMP[c.k]||0;
    if(fullAll || NON_DIV.includes(c.k))full+=amp;
    else half+=amp;
  });
  const minCal=full+half/2;
  if(minCal<=25)return 25;
  if(minCal<=40)return 40;
  if(minCal<=63)return 63;
  if(minCal<=80)return 80;
  if(minCal<=100)return 100;
  return 125;
}

function drawPanel(type,ap,bi,isAuto){
  // Build circuits
  const allCir=[];
  CIR.forEach(c=>{
    if(c.k==='tele'||c.k==='sonn')return;
    const q=ap[c.k]||0;
    const dt=TYPE_BY_KEY[c.k]||'AC';
    for(let i=0;i<q;i++)allCir.push({...c,
      isTypeA:c.k==='plaq'||c.k==='ll',
      diffType:dt,
      mod:c.k==='plaq'?2:c.k==='rt'?6:1,
      subs:[],uid:c.k+'_'+i
    });
  });
  
  // Attach tele/sonn subs
  const ecls=allCir.filter(c=>c.k==='ecl');
  // Distribute tele across ECLs (round-robin)
  for(let i=0;i<(ap.tele||0);i++){if(ecls.length>0)ecls[i%ecls.length].subs.push('TELE.')}
  // Distribute sonn across ECLs (round-robin, offset after tele)
  for(let i=0;i<(ap.sonn||0);i++){
    const idx=(ap.tele||0)+i;
    if(ecls.length>0)ecls[idx%ecls.length].subs.push('SON.');
  }

  // Build departures from _deps + _depTypes (AC/A/F/B)
  const deps=ap._deps||[];
  const depTypes=ap._depTypes||[];
  const builtDeps=[];
  const usedGlobal={};

  deps.forEach((dk,di)=>{
    const depCirs=[];
    dk.forEach(k=>{
      const c=allCir.find(cc=>cc.k===k&&!usedGlobal[cc.uid]);
      if(c){usedGlobal[c.uid]=true;depCirs.push(c)}
    });

    // Type différentiel : priorité à _depTypes (calculé par computeAutoDepsType),
    // sinon fallback sur heuristique historique (dernier dep = A si plaq/ll présents)
    let diffType = depTypes[di];
    if(!diffType){
      diffType = (di===deps.length-1 && allCir.some(c=>c.isTypeA)) ? 'A' : 'AC';
    }
    depCirs.sort((a,b)=>(CIR_AMP[b.k]||0)-(CIR_AMP[a.k]||0));
    builtDeps.push({
      cir:depCirs,
      type:diffType,
      cal:calcIDCal(depCirs, diffType),
      idx:di
    });
  });

  // Fallback if no deps computed
  if(!builtDeps.length){
    const acCir=allCir.filter(c=>!c.isTypeA);
    const aCir=allCir.filter(c=>c.isTypeA);
    builtDeps.push({cir:acCir,type:'AC',cal:calcIDCal(acCir),idx:0});
    if(aCir.length)builtDeps.push({cir:aCir,type:'A',cal:calcIDCal(aCir),idx:1});
  }

  let totalMod=0;
  builtDeps.forEach(d=>{
    const djMod=d.cir.reduce((s,c)=>s+c.mod,0);
    const subMod=d.cir.reduce((s,c)=>s+(c.subs?c.subs.length:0),0);// tele + sonn = 1 mod each
    d.djMod=djMod;d.subMod=subMod;
    d.modCount=2+djMod+subMod;// ID(2) + disj + tele/sonn
    totalMod+=d.modCount;
  });
  const rangees=Math.ceil(totalMod*1.2/13);

  // Validation
  const errors=[];
  builtDeps.forEach((d,i)=>{
    if(d.cir.length>8)errors.push('Départ '+(i+1)+' : '+d.cir.length+' circuits (max 8)');
  });
  // Type A (plaque, lave-linge)
  const hasPlaqInA=builtDeps.some(d=>d.type==='A'&&d.cir.some(c=>c.k==='plaq'));
  const hasLLInA=builtDeps.some(d=>d.type==='A'&&d.cir.some(c=>c.k==='ll'));
  if(allCir.some(c=>c.k==='plaq')&&!hasPlaqInA)errors.push('PLAQUE doit être sur un départ Type A');
  if(allCir.some(c=>c.k==='ll')&&!hasLLInA)errors.push('LL doit être sur un départ Type A');
  // Type F / HPI (PAC, clim, piscine, variateur mono, IRVE AC)
  const F_KEYS=['pac','clim','pisc','varm','irve_ac'];
  F_KEYS.forEach(k=>{
    if(!allCir.some(c=>c.k===k))return;
    const onF=builtDeps.some(d=>d.type==='F'&&d.cir.some(c=>c.k===k));
    if(!onF){
      const n=CIR.find(c=>c.k===k)?.n||k.toUpperCase();
      errors.push(n+' doit être sur un départ Type F (HPI)');
    }
  });

  const tc=TYPE_COLORS[(type.charCodeAt(0)-65)%TYPE_COLORS.length];

    <span style="font-size:16px;font-weight:700;color:rgba(220,210,235,0.90)">${ap.p} kVA — Calibre ${ap.c}A</span>

      ${totalMod} modules — ${rangees} rangée${rangees>1?'s':''}</span>

  // Errors
  if(errors.length){
    h+=`<div style="margin-bottom:16px;padding:10px 14px;border:1px solid rgba(255,68,68,0.30);border-radius:6px;background:rgba(255,68,68,0.06)">`;
    errors.forEach(e=>{h+=`<div style="font-size:11px;color:#FF6B6B;margin:3px 0">⚠ ${e}</div>`});
    h+=`</div>`;
  }

  if(!isAuto){
    h+=`<div style="margin-bottom:16px;padding:8px 14px;border:1px solid rgba(52,152,219,0.20);border-radius:6px;background:rgba(52,152,219,0.04)">
      <div style="font-size:11px;color:#3498DB">💡 Glissez les disjoncteurs entre les départs pour réorganiser</div>
    </div>`;
  }

  // Schéma arbre + calcul calibres
  h+=`<div style="display:flex;align-items:flex-start;gap:0">`;
  h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center">`;
  // Disj abonné
  h+=`<div style="display:flex;flex-direction:column;align-items:center">
    <div style="width:66px;height:72px;border:2.5px solid ${COL_AB};border-radius:6px;background:rgba(155,89,182,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="width:26px;height:4px;background:${COL_AB};border-radius:2px"></div>
      <div style="width:2px;height:8px;background:${COL_AB};opacity:0.5"></div>
      <div style="width:22px;height:22px;border:2px solid ${COL_AB};border-radius:3px"></div>
    </div>
    <div style="font-size:13px;font-weight:700;color:${COL_AB};margin-top:6px">DISJ. ABONNÉ ${ap.c}A</div>
  </div>`;
  h+=`<div style="width:2.5px;height:30px;background:rgba(155,125,197,0.25)"></div>`;
  const barW=Math.max(builtDeps.length*240,320);
  h+=`<div style="width:${barW}px;height:2.5px;background:rgba(155,125,197,0.25)"></div>`;

  // Encode ap ref for drag/drop
  const apRef=`${bi}_${type}`;

  h+=`<div style="display:flex;gap:28px;justify-content:center">`;
  builtDeps.forEach((dep,di)=>{
    const col=typeDiffCol(dep.type);
    const bg=typeDiffBg(dep.type);
    const overMax=dep.cir.length>8;

    h+=`<div style="display:flex;flex-direction:column;align-items:center;min-width:${Math.max(dep.cir.length*36,140)}px"

    >`;
    h+=`<div style="width:2px;height:20px;background:${col};opacity:0.3"></div>`;
    h+=`<div style="font-size:11px;font-weight:700;color:${overMax?'#FF6B6B':col};letter-spacing:1.5px;margin-bottom:8px">DÉPART ${di+1} · ${dep.modCount} mod ${overMax?'⚠':''}</div>`;

    // ID
    h+=`<div style="width:62px;height:68px;border:2px solid ${col};border-radius:6px;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center">

      <div style="width:22px;height:3.5px;background:${col};border-radius:2px;margin:3px 0"></div>
      <div style="width:2px;height:7px;background:${col};opacity:0.4"></div>

    h+=`<div style="font-size:12px;font-weight:700;color:${col};margin-top:5px">ID ${dep.cal}A</div>`;
    // Show dimensioning detail
    let fullA=0,halfA=0;dep.cir.forEach(c=>{const a=CIR_AMP[c.k]||0;if(NON_DIV.includes(c.k))fullA+=a;else halfA+=a});
    const minA=fullA+halfA/2;

    h+=`<div style="width:2px;height:16px;background:${col};opacity:0.2"></div>`;
    h+=`<div style="width:${Math.max(dep.cir.length*36,70)}px;height:2px;background:${col};opacity:0.2"></div>`;

    // Disjoncteurs
    h+=`<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">`;
    dep.cir.forEach((c,ci)=>{
      const w=c.k==='rt'?26:c.mod===2?48:26;
      const hasSubs=c.subs&&c.subs.length>0;
      h+=`<div style="display:flex;flex-direction:column;align-items:center;width:${w+8}px;${!isAuto?'cursor:grab;':''}${!isAuto?'opacity:0.9;':''}transition:transform 0.15s"
        ${!isAuto?'draggable="true" ondragstart="dragCir(event,\''+apRef+'\','+di+',\''+c.k+'\')" onmouseenter="this.style.transform=\'scale(1.1)\'" onmouseleave="this.style.transform=\'scale(1)\'"':''}
      >
        <div style="width:1.5px;height:10px;background:${col};opacity:0.2"></div>
        <div style="width:${w}px;height:46px;border:1.5px solid ${col};border-radius:3px;background:rgba(0,0,0,0.25);display:flex;flex-direction:column;align-items:center;justify-content:center;${!isAuto?'border-style:solid;box-shadow:0 0 6px '+col+'33;':''}">
          <div style="width:${w>30?18:10}px;height:3px;background:${col};border-radius:1px;margin-bottom:3px"></div>
          <div style="width:${w>30?14:8}px;height:${w>30?14:8}px;border:1.5px solid ${col};border-radius:2px;opacity:0.7"></div>
        </div>
        <div style="font-size:11px;font-weight:700;color:${col};margin-top:3px">${c.a}</div>
        <div style="font-size:10px;color:${col};opacity:0.55;white-space:nowrap">${c.n}</div>`;
      if(hasSubs){
        c.subs.forEach(s=>{
          const isTele=s.includes('TELE');
          const subCol=isTele?'#F1C40F':'#1ABC9C';
          const subBg=isTele?'rgba(241,196,15,0.10)':'rgba(26,188,156,0.10)';
          h+=`<div style="width:1.5px;height:8px;background:${subCol};opacity:0.3"></div>
          <div style="width:26px;height:30px;border:1.5px solid ${subCol};border-radius:3px;background:${subBg};display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="width:10px;height:10px;border:1.5px solid ${subCol};border-radius:50%;opacity:0.7"></div>
          </div>
          <div style="font-size:9px;font-weight:700;color:${subCol};margin-top:2px;white-space:nowrap">${s}</div>`;
        });
      }
      // RT2012 gestionnaire box
      if(c.k==='rt'){
        h+=`<div style="width:1.5px;height:8px;background:#E74C3C;opacity:0.3"></div>
        <div style="width:60px;height:40px;border:1.5px solid #E74C3C;border-radius:3px;background:rgba(231,76,60,0.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
          <div style="display:flex;gap:2px">${'<div style=\"width:6px;height:8px;border:1px solid #E74C3C;border-radius:1px;opacity:0.6\"></div>'.repeat(5)}</div>
          <div style="font-size:6px;font-weight:600;color:#E74C3C;opacity:0.8">Gest. Énergie</div>
        </div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>
    <div style="margin-top:10px;padding:4px 10px;border-radius:4px;background:${col}10;border:1px solid ${col}25;text-align:center">
      <span style="font-size:10px;font-weight:700;color:${col}">${dep.modCount} modules</span>
      <span style="font-size:9px;color:${col};opacity:0.5"> (ID 2 + ${dep.djMod} disj${dep.subMod?' + '+dep.subMod+' app':''})</span>
    </div></div>`;
  });

  // Close schema tree flex container
  h+=`</div></div>`;

  // ── CALCUL CALIBRES (à droite) ──
  h+=`<div style="flex-shrink:0;min-width:220px;margin-left:24px;border-left:1px solid rgba(123,95,172,0.10);padding-left:20px">`;
  h+=`<div style="font-size:11px;font-weight:700;color:rgba(220,210,235,0.60);letter-spacing:1.5px;margin-bottom:14px;text-transform:uppercase">Calcul calibres ID</div>`;
  
  builtDeps.forEach((dep,di)=>{
    const col=typeDiffCol(dep.type);
    let fullSum=0,halfItems=[],fullItems=[];
    dep.cir.forEach(c=>{
      const a=CIR_AMP[c.k]||0;
      if(NON_DIV.includes(c.k)){fullSum+=a;fullItems.push({n:c.n,a})}
      else{halfItems.push({n:c.n,a})}
    });
    const halfSum=halfItems.reduce((s,x)=>s+x.a,0);
    const minCal=fullSum+halfSum/2;

    h+=`<div style="margin-bottom:16px;padding:10px 12px;border:1px solid ${col}30;border-radius:6px;background:${col}08">`;
    h+=`<div style="font-size:11px;font-weight:700;color:${col};margin-bottom:8px">DÉPART ${di+1} — Type ${dep.type}</div>`;
    
    // Full items (100%)
    if(fullItems.length){
      h+=`<div style="font-size:9px;color:rgba(220,210,235,0.45);margin-bottom:2px">100% (chauff/ECS) :</div>`;
      fullItems.forEach(x=>{
        h+=`<div style="font-size:10px;color:${col};padding:1px 0">${x.n} = <strong>${x.a}A</strong></div>`;
      });
    }
    
    // Half items (÷2)
    if(halfItems.length){
      h+=`<div style="font-size:9px;color:rgba(220,210,235,0.45);margin-top:4px;margin-bottom:2px">÷2 (autres) :</div>`;
      halfItems.forEach(x=>{
        h+=`<div style="font-size:10px;color:${col};opacity:0.7;padding:1px 0">${x.n} ${x.a}A → <strong>${x.a/2}A</strong></div>`;
      });
    }
    
    // Result
    h+=`<div style="margin-top:6px;padding-top:6px;border-top:1px solid ${col}25">`;
    if(fullItems.length) h+=`<div style="font-size:10px;color:${col}">${fullSum}A`;
    else h+=`<div style="font-size:10px;color:${col}">0A`;
    h+=` + ${halfSum}A÷2 = <strong>${Math.round(minCal*10)/10}A</strong></div>`;
    h+=`<div style="font-size:12px;font-weight:700;color:${col};margin-top:4px">→ ID ${dep.cal}A</div>`;
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // Close main flex row + panel
  h+=`</div></div>`;
  return h;
}

// ═══ DRAG & DROP ═══
let _dragData=null;

function dragCir(ev,apRef,depIdx,cirKey){
  _dragData={apRef,depIdx,cirKey};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain','');
}

function dropCir(ev,apRef,targetDepIdx){
  ev.preventDefault();
  if(!_dragData||_dragData.apRef!==apRef)return;
  const{depIdx:srcDep,cirKey}=_dragData;
  if(srcDep===targetDepIdx)return;
  _dragData=null;
  
  // Find the apartment
  const[bi,type]=apRef.split('_');
  const b=B[parseInt(bi)];
  const types={};let tIdx=0;
  b.a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p);const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  
  // Find all apartments of this type
  const aps=b.a.filter(x=>x.type===type);
  if(!aps.length)return;
  
  // Move circuit by key in _deps
  aps.forEach(ap=>{
    if(!ap._deps)return;
    if(srcDep>=ap._deps.length||targetDepIdx>=ap._deps.length)return;
    const idx=ap._deps[srcDep].indexOf(cirKey);
    if(idx===-1)return;
    ap._deps[srcDep].splice(idx,1);
    ap._deps[targetDepIdx].push(cirKey);
  });
  
  R();
}


// ═══ IMPORT DERIVATIONS ═══
// Accepte 2 formats :
//  - .xlsx exporté par Dérivations TGBT (feuille cachée _DATA avec JSON)
//  - .alg / .ALG : fichier de partage texte/JSON (créé par Dérivations TGBT →
//    bouton « 🔗 Partage TA »). Non lisible dans Excel, juste importable ici.
// La détection se fait sur les MAGIC BYTES du fichier (PK = zip = xlsx,
// sinon JSON .ALG) plutôt que sur l'extension, pour gérer correctement
// les fichiers renommés ou les extensions différentes par majuscule.
async function importDeriv(input){
  if(!input.files.length)return;
  const file=input.files[0];
  try{
    // Sniff des 4 premiers bytes : "PK" + 2 bytes = zip (xlsx, format ECMA-376)
    // Tout le reste = on tente du JSON (.ALG) sinon erreur claire.
    const head=new Uint8Array(await file.slice(0,4).arrayBuffer());
    const isZip=head.length>=2 && head[0]===0x50 && head[1]===0x4B; // 'PK'

    let data=null;
    if(isZip){
      // Format .xlsx (Excel) — onglet caché _DATA contenant le JSON
      const buf=await file.arrayBuffer();
      const wb=new ExcelJS.Workbook();await wb.xlsx.load(buf);
      let ds=null;wb.eachSheet(ws=>{if(ws.name==='_DATA')ds=ws});
      if(!ds){alert('Ce fichier Excel ne provient pas de Dérivations & TGBT.\nAucun onglet _DATA trouvé.');input.value='';return}
      const raw=ds.getCell('A1').value;
      if(!raw){alert('Données vides.');input.value='';return}
      data=JSON.parse(raw);
    } else {
      // Format .ALG — JSON brut texte
      const txt=await file.text();
      try{ data=JSON.parse(txt); }
      catch{
        alert('Fichier non reconnu.\n\nFormats acceptés : .xlsx exporté par Dérivations TGBT, ou .ALG (Partage TA).');
        input.value='';return;
      }
      if(!data || data._format!=='algomes-tgbt-share'){
        alert('Ce fichier .ALG n\'est pas un partage valide A.L.GOMES.\n\nAttendu : un fichier généré par le bouton « 🔗 Partage TA » de Dérivations TGBT.');
        input.value='';return;
      }
    }
    if(data._cir)data._cir.forEach(c=>{if(!CIR.find(x=>x.k===c.k)){CIR.push(c);CIR_AMP[c.k]=parseInt(c.a)||20}});
    if(data.P)document.getElementById('projName').value=data.P;
    if(data.B&&data.B.length>0){
      B=data.B.map(b=>({
        n:b.n,niv:b.niv||9,fl:b.fl||gFL(b.niv||9),
        a:b.a.map(ap=>{
          const p=pw(ap.u||0);
          return{f:ap.f||'RDC',r:ap.r||'',e:ap.e||'',u:ap.u||0,p,c:cl(p),...defCir(p)};
        })
      }));
      curTab='b0';R();
    }else{alert('Aucun bâtiment trouvé.')}
  }catch(e){alert('Erreur : '+e.message)}
  input.value='';
}
// ═══ IMPORT TABLEAU ABONNÉ ═══
// Import Tableau Abonné — accepte :
//  - .xlsx (export historique avec onglet caché _DATA)
//  - .ALG  (sauvegarde du bouton « 💾 Sauvegarder » — signature algomes-ta-save)
// Détection par magic bytes (PK = zip = xlsx, sinon JSON .ALG).
async function importTA(input){
  if(!input.files.length)return;
  const file=input.files[0];
  try{
    const head=new Uint8Array(await file.slice(0,4).arrayBuffer());
    const isZip=head.length>=2 && head[0]===0x50 && head[1]===0x4B;
    let data=null;
    if(isZip){
      const buf=await file.arrayBuffer();
      const wb=new ExcelJS.Workbook();await wb.xlsx.load(buf);
      let ds=null;wb.eachSheet(ws=>{if(ws.name==='_DATA')ds=ws});
      if(!ds){alert('Ce fichier Excel ne provient pas de Tableau Abonné.\nAucun onglet _DATA trouvé.');input.value='';return}
      const raw=ds.getCell('A1').value;
      if(!raw){alert('Données vides.');input.value='';return}
      data=JSON.parse(raw);
    } else {
      const txt=await file.text();
      try{ data=JSON.parse(txt); }
      catch{ alert('Fichier non reconnu.\n\nFormats acceptés : .xlsx exporté par Tableau Abonné, ou .ALG (Sauvegarde).');input.value='';return; }
      if(!data || data._format!=='algomes-ta-save'){
        alert('Ce fichier .ALG n\'est pas une sauvegarde Tableau Abonné valide.\n\nAttendu : un fichier généré par le bouton « 💾 Sauvegarder » de Tableau Abonné.');input.value='';return;
      }
    }
    if(data._cir)data._cir.forEach(c=>{if(!CIR.find(x=>x.k===c.k)){CIR.push(c);CIR_AMP[c.k]=parseInt(c.a)||20}});
    if(data.P)document.getElementById('projName').value=data.P;
    if(data.B&&data.B.length>0){
      B=data.B.map(b=>({
        n:b.n,niv:b.niv||9,fl:b.fl||gFL(b.niv||9),typeAuto:b.typeAuto||{},
        a:b.a.map(ap=>{
          const p=pw(ap.u||0);const c=cl(p);
          const o={f:ap.f||'RDC',r:ap.r||'',e:ap.e||'',u:ap.u||0,p,c};
          CIR.forEach(ci=>{o[ci.k]=ap[ci.k]!==undefined?ap[ci.k]:defCir(p)[ci.k]});
          if(ap.tb)o.tb=ap.tb;
          if(ap._deps)o._deps=ap._deps;
          return o;
        })
      }));
      curTab='b0';R();
    }else{alert('Aucun bâtiment trouvé.')}
  }catch(e){alert('Erreur : '+e.message)}
  input.value='';
}

// ═══ SAUVEGARDE .ALG (bouton « 💾 Sauvegarder ») ═══
// Génère un fichier "<NOM AFFAIRE> - TABLEAUX ABONNES.ALG" qui contient
// l'état complet du projet Tableau Abonné, réimportable via le bouton
// « 📤 Importer Tableau Abonné » (qui détecte automatiquement le format).
// Le payload reprend EXACTEMENT la même structure que celle écrite dans
// l'onglet _DATA de l'export Excel — d'où la compatibilité totale.
async function saveTaAlg(){
  const pName=document.getElementById('projName').value.trim()||'Sans titre';
  const payload={
    _format:'algomes-ta-save',
    _version:1,
    _exportedAt:new Date().toISOString(),
    _note:'Sauvegarde Tableau Abonné — A.L. GOMES',
    P:pName,
    _cir:CIR.filter(c=>c.k.startsWith('_a')),
    B:B.map(b=>({n:b.n,niv:b.niv,fl:b.fl,typeAuto:b.typeAuto,
      a:b.a.map(x=>{const o={f:x.f,r:x.r,e:x.e,u:x.u};CIR.forEach(c=>{o[c.k]=x[c.k]});if(x.tb)o.tb=x.tb;if(x._deps)o._deps=x._deps;return o})}))
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/octet-stream'});
  // Format demandé : "<NOM AFFAIRE> - TABLEAUX ABONNES.ALG"

      // Helper couleur par type de différentiel pour l'export SVG

      function svgBgByType(t){return t==='A'?'#FFF3E8':t==='F'?'#FEF9E7':t==='B'?'#FDECEA':'#E8F0FE'}

      let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}" width="100%">`;
      

      // Title
      svg+=`<text x="20" y="30" font-size="16" font-weight="bold" fill="#1F3864" font-family="Segoe UI,Calibri">TYPE ${t} — ${cnt} lgts</text>`;
      svg+=`<rect x="${svgW-200}" y="12" width="180" height="26" rx="6" fill="none" stroke="${purp}" stroke-width="1.5"/>`;
      svg+=`<text x="${svgW-110}" y="30" font-size="12" font-weight="bold" fill="${purp}" text-anchor="middle" font-family="Segoe UI">${tM} mod — ${rg} rangée${rg>1?'s':''}</text>`;

      // Disj Abonné
      let sy=65;
      svg+=`<rect x="${cxA-45}" y="${sy}" width="90" height="55" rx="6" fill="#2D1B4E" stroke="${purp}" stroke-width="2.5"/>`;
      // Symbol inside
      svg+=`<line x1="${cxA-15}" y1="${sy+18}" x2="${cxA+15}" y2="${sy+18}" stroke="${purp}" stroke-width="2.5"/>`;
      svg+=`<line x1="${cxA}" y1="${sy+18}" x2="${cxA}" y2="${sy+26}" stroke="${purp}" stroke-width="1.5" opacity="0.5"/>`;
      svg+=`<rect x="${cxA-10}" y="${sy+26}" width="20" height="16" rx="3" fill="none" stroke="${purp}" stroke-width="2"/>`;
      svg+=`<text x="${cxA}" y="${sy+55+16}" font-size="13" font-weight="bold" fill="${purp}" text-anchor="middle" font-family="Segoe UI">DISJ. ABONNÉ ${ref.c}A</text>`;
      sy+=55;

      // Vertical from abonné
      svg+=`<line x1="${cxA}" y1="${sy}" x2="${cxA}" y2="${sy+35}" stroke="${purp}" stroke-width="2"/>`;
      sy+=35;

      // Horizontal bar
      const barL=ox+depW/2,barR=ox+nD*depW-depW/2;
      svg+=`<line x1="${barL}" y1="${sy}" x2="${barR}" y2="${sy}" stroke="#777" stroke-width="2.5"/>`;

      // Departures
      bD.forEach((dep,di)=>{
        const col=svgColByType(dep.type);
        const bg=svgBgByType(dep.type);
        const dCx=ox+di*depW+depW/2;let dy=sy;

        // Vertical from bar
        svg+=`<line x1="${dCx}" y1="${dy}" x2="${dCx}" y2="${dy+20}" stroke="${col}" stroke-width="2"/>`;
        dy+=20;

        // Dep label
        svg+=`<text x="${dCx}" y="${dy+12}" font-size="11" font-weight="bold" fill="${col}" text-anchor="middle" font-family="Segoe UI" letter-spacing="1">DÉPART ${di+1} · ${dep.mc} mod</text>`;
        dy+=18;

        // ID box
        svg+=`<rect x="${dCx-38}" y="${dy}" width="76" height="62" rx="6" fill="${bg}" stroke="${col}" stroke-width="2"/>`;
        svg+=`<text x="${dCx}" y="${dy+16}" font-size="9" font-weight="bold" fill="${col}" text-anchor="middle" opacity="0.7">30mA</text>`;
        // ID symbol
        svg+=`<line x1="${dCx-12}" y1="${dy+22}" x2="${dCx+12}" y2="${dy+22}" stroke="${col}" stroke-width="2"/>`;
        svg+=`<line x1="${dCx}" y1="${dy+22}" x2="${dCx}" y2="${dy+28}" stroke="${col}" stroke-width="1" opacity="0.5"/>`;
        svg+=`<rect x="${dCx-8}" y="${dy+28}" width="16" height="14" rx="3" fill="none" stroke="${col}" stroke-width="1.5"/>`;
        svg+=`<text x="${dCx}" y="${dy+38}" font-size="9" font-weight="bold" fill="${col}" text-anchor="middle">${dep.type}</text>`;
        svg+=`<text x="${dCx}" y="${dy+56}" font-size="13" font-weight="bold" fill="${col}" text-anchor="middle">ID ${dep.cal}A</text>`;
        dy+=62;

        // Calc label
        let f=0,h=0;dep.cir.forEach(c=>{const am=CIR_AMP[c.k]||0;if(NON_DIV.includes(c.k))f+=am;else h+=am});
        svg+=`<text x="${dCx}" y="${dy+12}" font-size="9" fill="${col}" text-anchor="middle" font-style="italic" opacity="0.5">${Math.round(f+h/2)}A calc.</text>`;
        dy+=16;

        // Vertical from ID
        svg+=`<line x1="${dCx}" y1="${dy}" x2="${dCx}" y2="${dy+18}" stroke="${col}" stroke-width="1.5"/>`;
        dy+=18;

        // Sub bar
        const nC=dep.cir.length;const cW=nC*32;const cS=dCx-cW/2;
        svg+=`<line x1="${cS+16}" y1="${dy}" x2="${cS+cW-16}" y2="${dy}" stroke="${col}" stroke-width="1.5"/>`;

        // Disjoncteurs
        dep.cir.forEach((c,ci)=>{
          const ccx=cS+ci*32+16;
          // Tick
          svg+=`<line x1="${ccx}" y1="${dy}" x2="${ccx}" y2="${dy+8}" stroke="${col}" stroke-width="1"/>`;
          // Box
          const bw=c.k==='rt'?20:c.mod===2?28:20;
          svg+=`<rect x="${ccx-bw/2}" y="${dy+8}" width="${bw}" height="36" rx="3" fill="${drk}" stroke="${col}" stroke-width="1.5"/>`;
          // Symbol
          svg+=`<line x1="${ccx-6}" y1="${dy+18}" x2="${ccx+6}" y2="${dy+18}" stroke="${col}" stroke-width="1.5"/>`;
          svg+=`<rect x="${ccx-5}" y="${dy+22}" width="10" height="10" rx="2" fill="none" stroke="${col}" stroke-width="1" opacity="0.7"/>`;
          // Labels
          svg+=`<text x="${ccx}" y="${dy+56}" font-size="10" font-weight="bold" fill="${col}" text-anchor="middle">${c.a}</text>`;
          svg+=`<text x="${ccx}" y="${dy+68}" font-size="8" fill="${col}" text-anchor="middle" opacity="0.6">${c.n}</text>`;
          // TELE/SON
          if(c._s&&c._s.length){
            c._s.forEach((s,si)=>{
              const isTl=s.includes('TELE');const sc=isTl?'#F1C40F':'#1ABC9C';
              svg+=`<rect x="${ccx-14}" y="${dy+72+si*16}" width="28" height="14" rx="3" fill="none" stroke="${sc}" stroke-dasharray="3,2"/>`;
              svg+=`<text x="${ccx}" y="${dy+82+si*16}" font-size="8" font-weight="bold" fill="${sc}" text-anchor="middle">${s}</text>`;
            });
          }
          // RT2012 gestionnaire box
          if(c.k==='rt'){
            const rx=ccx+20,ry=dy+12;
            svg+=`<line x1="${ccx+10}" y1="${dy+24}" x2="${rx}" y2="${dy+24}" stroke="#E74C3C" stroke-width="1"/>`;
            svg+=`<line x1="${rx}" y1="${dy+24}" x2="${rx}" y2="${ry}" stroke="#E74C3C" stroke-width="1"/>`;
            svg+=`<rect x="${rx-2}" y="${ry}" width="50" height="28" rx="3" fill="rgba(231,76,60,0.06)" stroke="#E74C3C" stroke-width="1"/>`;
            for(let sq=0;sq<5;sq++) svg+=`<rect x="${rx+2+sq*9}" y="${ry+3}" width="6" height="9" rx="1" fill="none" stroke="#E74C3C" stroke-width="0.7" opacity="0.6"/>`;
            svg+=`<text x="${rx+23}" y="${ry+22}" font-size="5" fill="#E74C3C" text-anchor="middle" font-family="Segoe UI" font-weight="bold">Gest. Énergie</text>`;
          }
        });
      });

      // Calcul calibres
      // On positionne désormais les 2 boxes (CALIBRES puis RANGÉES) en bas
      // du SVG, l'une au-dessus de l'autre, avec 14 px d'écart.
      const _calBoxH = 10 + bD.length * 18 + 12;
      let cy = svgH - _rgBoxH - 14 - _calBoxH + 4; // +4 pour compenser le rect y=cy-4
      svg+=`<rect x="16" y="${cy-4}" width="${svgW-32}" height="${_calBoxH}" rx="4" fill="#F8F8FA" stroke="#DDD"/>`;
      svg+=`<text x="28" y="${cy+10}" font-size="10" font-weight="bold" fill="#1F3864" font-family="Segoe UI">CALCUL CALIBRES ID</text>`;
      cy+=18;
      bD.forEach((dep,di)=>{
        const col2=svgColByType(dep.type);
        let f2=0,h2=0;const fI=[],hI=[];
        dep.cir.forEach(c=>{const am=CIR_AMP[c.k]||0;if(NON_DIV.includes(c.k)){f2+=am;fI.push(c.n+' '+am+'A')}else{h2+=am;hI.push(c.n+' '+(am/2)+'A')}});
        svg+=`<text x="28" y="${cy+10}" font-size="8" font-weight="bold" fill="${col2}" font-family="Segoe UI">DÉP.${di+1} ${dep.type}:</text>`;
        svg+=`<text x="80" y="${cy+10}" font-size="8" fill="${col2}" font-family="Segoe UI">${fI.length?fI.join(' + ')+' (100%)':'0A'} + ${hI.length?hI.join(' + ')+' (÷2)':'0A'} = ${Math.round((f2+h2/2)*10)/10}A → ID ${dep.cal}A</text>`;
        cy+=14;
      });

      // CALCUL RANGÉES : détail du calcul du nombre de rangées du tableau
      // Formule NF C 15-100 : ⌈ (somme modules × 1.2) / 13 ⌉
      //   - 2 modules par départ pour l'ID
      //   - + modules des circuits (1 par disjoncteur, sauf plaque=2, RT=6)
      //   - × 1.2 = marge de réserve 20 %
      //   - / 13 = modules max par rangée standard
      const _ryTop = svgH - _rgBoxH;
      svg+=`<rect x="16" y="${_ryTop}" width="${svgW-32}" height="${_rgBoxH}" rx="4" fill="#FAF5FF" stroke="#BB6BD9" stroke-width="0.8"/>`;
      svg+=`<text x="28" y="${_ryTop+14}" font-size="10" font-weight="bold" fill="#BB6BD9" font-family="Segoe UI">CALCUL RANGÉES</text>`;
      let _ry = _ryTop + 26;
      bD.forEach((dep, di) => {
        const _col = svgColByType(dep.type);
        const _cirMod = dep.cir.reduce((s, c) => s + c.mod, 0);
        svg+=`<text x="28" y="${_ry+10}" font-size="8" font-weight="bold" fill="${_col}" font-family="Segoe UI">DÉP.${di+1}:</text>`;
        svg+=`<text x="80" y="${_ry+10}" font-size="8" fill="#1F3864" font-family="Segoe UI">2 (ID) + ${_cirMod} (circuits) = ${dep.mc} modules</text>`;
        _ry += 14;
      });
      const _modParts = bD.map(d => d.mc).join(' + ');
      svg+=`<text x="28" y="${_ry+10}" font-size="8" font-weight="bold" fill="#1F3864" font-family="Segoe UI">TOTAL:</text>`;
      svg+=`<text x="80" y="${_ry+10}" font-size="8" fill="#1F3864" font-family="Segoe UI">${_modParts} = ${tM} modules</text>`;
      _ry += 14;
      svg+=`<text x="28" y="${_ry+10}" font-size="8" font-weight="bold" fill="#BB6BD9" font-family="Segoe UI">FORMULE:</text>`;
      svg+=`<text x="80" y="${_ry+10}" font-size="8" fill="#BB6BD9" font-family="Segoe UI">⌈ ${tM} × 1.2 / 13 ⌉ = ⌈ ${(tM*1.2/13).toFixed(2)} ⌉ = ${rg} rangée${rg>1?'s':''}</text>`;

      svg+=`</svg>`;

      pw2.document.write(`<div class="pb"></div><div class="pg" style="page-break-inside:avoid">
        <div class="hdr" style="margin-bottom:4px"><img src='${_LOGO_B64}' style='height:28px;border-radius:4px'><h1>${pNameH} — ${_e(b.n)} — Schéma Type ${_e(t)}</h1><span>NF C 15-100 · AL GOMES</span></div>
        ${svg}
        <div class="ft" style="margin-top:4px;font-size:8px">AL GOMES — Bureau d'Études Techniques Électricité — NF C 15-100</div>
      </div>`);
    });
  });

  pw2.document.write(`</body></html>`);
  pw2.document.close();
  setTimeout(()=>{pw2.print()},600);
}



// ═══ EXPORT DXF (AutoCAD) — Layout exact du modèle AL GOMES ═══
function exportDXF(){
  if(!B.length){alert('Aucun bâtiment');return}
  const pName=document.getElementById('projName').value.trim()||'Sans titre';
  const bi=parseInt((curTab||'b0').replace('b',''));
  const b=B[bi];if(!b){alert('Bâtiment introuvable');return}
  const a=[...b.a];if(!b.fl)b.fl=gFL(b.niv||9);
  a.forEach(x=>{x.p=pw(x.u);x.c=cl(x.p)});
  a.sort((x,y)=>b.fl.indexOf(x.f)-b.fl.indexOf(y.f));
  const types={};let tIdx=0;
  a.forEach(x=>{const rc=getRecap(x);if(!types[rc])types[rc]=String.fromCharCode(65+tIdx++);x.type=types[rc]});
  const typeCounts={},typeRef={};
  a.forEach(x=>{typeCounts[x.type]=(typeCounts[x.type]||0)+1;if(!typeRef[x.type])typeRef[x.type]=x});
  const sortedT=Object.entries(typeCounts).sort((a2,b2)=>a2[0].localeCompare(b2[0]));

  let ents='';
  const _CS=16,_DG=22;
  const _CL=8,_CR=337,_CB=-15.7,_CT=227,_CW=329,_CH=242.7;
  const _CN={pcgtl:'PC-GTL',ecl:'ECL',pc:'PC',plaq:'PLAQ',four:'FOUR',ll:'LL',lv:'LV',sl:'SL',ss:'SS',bec:'BEC',chauf:'CHAUF',chaud:'CHAUD',vr:'VR',th:'TH',rt:'RT2012',mo:'M.ONDE',pac:'PAC',clim:'CLIM',pisc:'PISC',varm:'VAR.M',irve_ac:'IRVE-AC'};

  function dL(x1,y1,x2,y2,ly){ents+='0\nLINE\n8\n'+(ly||'SCHEMA')+'\n10\n'+x1.toFixed(3)+'\n20\n'+y1.toFixed(3)+'\n30\n0\n11\n'+x2.toFixed(3)+'\n21\n'+y2.toFixed(3)+'\n31\n0\n'}
  function dT(x,y,h,txt,ly,rot){ents+='0\nTEXT\n8\n'+(ly||'TEXTE')+'\n10\n'+x.toFixed(3)+'\n20\n'+y.toFixed(3)+'\n30\n0\n40\n'+h.toFixed(2)+'\n1\n'+txt+'\n';if(rot)ents+='50\n'+rot.toFixed(1)+'\n'}
  function dTc(cx,y,h,txt,ly){dT(cx-(''+txt).length*h*0.55/2,y,h,''+txt,ly)}
  function dR(x,y,w,h,ly){dL(x,y,x+w,y,ly);dL(x+w,y,x+w,y+h,ly);dL(x+w,y+h,x,y+h,ly);dL(x,y+h,x,y,ly)}
  function dDJ(cx,by,bw){dR(cx-bw/2,by,bw,16);dL(cx-bw/2+1.5,by+13,cx+bw/2-1.5,by+13);dL(cx,by+13,cx,by+10);dR(cx-2.5,by+1.5,5,5)}
  function dAR(x,y){dL(x,y-6,x,y+6);dL(x,y+6,x+10,y);dL(x+10,y,x,y-6)}
  function dAL(x,y){dL(x,y-6,x,y+6);dL(x,y+6,x-10,y);dL(x-10,y,x,y-6)}

  function dLogo(ox,oy){
    const cx=ox+153.7,cy=oy-12,ro=13.2,ri=7.2,n=40,ly='LOGO';
    for(let i=0;i<n;i++){const a1=Math.PI*i/n,a2=Math.PI*(i+1)/n;
      dL(cx+ro*Math.cos(a1),cy+ro*Math.sin(a1),cx+ro*Math.cos(a2),cy+ro*Math.sin(a2),ly);
      dL(cx+ri*Math.cos(a1),cy+ri*Math.sin(a1),cx+ri*Math.cos(a2),cy+ri*Math.sin(a2),ly)}
    dL(cx+ri,cy,cx+ro,cy,ly);dL(cx-ri,cy,cx-ro,cy,ly);dL(cx,cy+ri,cx,cy+ro,ly);
    [['A',144.1,-8.5,70],['.',145.6,-5.8,52.5],['L',147.8,-3.6,35],['.',150.6,-2.3,17.5],
     ['G',153.7,-1.8,0],['O',156.7,-2.3,342.5],['M',159.5,-3.6,325],['E',161.7,-5.8,307.5],['S',163.2,-8.5,290]
    ].forEach(([ch,x,y,r])=>dT(ox+x,oy+y,1.65,ch,'LOGO',r));
  }

  function buildDeps(ref){
    const allCir=[];
    CIR.forEach(c=>{if(c.k==='tele'||c.k==='sonn')return;const q=ref[c.k]||0;
      for(let i=0;i<q;i++)allCir.push({k:c.k,n:_CN[c.k]||c.k,a:CIR_AMP[c.k]||10,mod:c.k==='plaq'?2:c.k==='rt'?6:1,subs:[],uid:c.k+'_'+i});
      if(!_CN[c.k])_CN[c.k]=c.n});
    const ecls=allCir.filter(c=>c.k==='ecl');
    for(let i=0;i<(ref.tele||0);i++)if(ecls.length)ecls[i%ecls.length].subs.push('TEL');
    for(let i=0;i<(ref.sonn||0);i++){const idx=(ref.tele||0)+i;if(ecls.length)ecls[idx%ecls.length].subs.push('SON')}
    const deps=ref._deps||[];const bD=[];const used={};
    deps.forEach((dk,di)=>{const dc=[];
      dk.forEach(k=>{if(k==='tele'||k==='sonn')return;const c=allCir.find(cc=>cc.k===k&&!used[cc.uid]);if(c){used[c.uid]=true;dc.push(c)}});
      dc.sort((x,y)=>y.a-x.a);
      const isA=di===deps.length-1&&allCir.some(c=>c.k==='plaq'||c.k==='ll');
      let fA=0,hA=0;dc.forEach(c=>{if(NON_DIV.includes(c.k))fA+=c.a;else hA+=c.a});
      const mA=fA+hA/2;const cal=mA<=40?40:63;
      const mc=2+dc.reduce((s,c)=>s+c.mod+c.subs.length,0);
      bD.push({type:isA?'A':'AC',cal,cir:dc,mc,fA,hA,mA})});
    if(!bD.length){const ac=allCir.filter(c=>c.k!=='plaq'&&c.k!=='ll');const ta=allCir.filter(c=>c.k==='plaq'||c.k==='ll');
      let f1=0,h1=0;ac.forEach(c=>{if(NON_DIV.includes(c.k))f1+=c.a;else h1+=c.a});
      bD.push({type:'AC',cal:f1+h1/2<=40?40:63,cir:ac,mc:2+ac.reduce((s,c)=>s+c.mod+c.subs.length,0),fA:f1,hA:h1,mA:f1+h1/2});
      if(ta.length){let f2=0,h2=0;ta.forEach(c=>{if(NON_DIV.includes(c.k))f2+=c.a;else h2+=c.a});
        bD.push({type:'A',cal:f2+h2/2<=40?40:63,cir:ta,mc:2+ta.reduce((s,c)=>s+c.mod+c.subs.length,0),fA:f2,hA:h2,mA:f2+h2/2})}}
    return bD;
  }

  function compPos(bD,dI,sX){
    const dp=[];let cx=sX;
    dI.forEach(di=>{const dep=bD[di];const cx2=[];
      dep.cir.forEach(c=>{cx2.push({c,x:cx});cx+=_CS;if(c.subs.length)cx+=9});
      const bs=cx2[0].x,be=cx2[cx2.length-1].x;
      dp.push({dep,di,cx:(bs+be)/2,bs,be,cirs:cx2});cx+=_DG-_CS});
    return{dp,w:cx-_DG+_CS}
  }

  function splitDeps(bD){
    const mw=_CW-26;const all=[];for(let i=0;i<bD.length;i++)all.push(i);
    const{w}=compPos(bD,all,0);if(w<=mw)return[all];
    const groups=[];let cur=[];
    for(let di=0;di<bD.length;di++){const test=[...cur,di];const{w:tw}=compPos(bD,test,0);
      if(tw>mw&&cur.length){groups.push(cur);cur=[di]}else cur=test}

  function drawFolio(ox,oy,tt,tm,rg,bD,dI,tpn,tpt,iF,iL){

    dTc(pcx,oy+218,4.5,pName+' - '+b.n,'TITRE');
    dT(cL+7,oy+205,4.5,'TYPE '+tt,'TITRE');
    dR(cR-48,oy+205,38,7,'CADRE');dTc(cR-29,oy+207,2.2,tm+' mod - '+rg+' r.','TEXTE');
    if(iF){dR(pcx-9,oy+155,18,20);dL(pcx-4,oy+171,pcx+4,oy+171);dL(pcx,oy+171,pcx,oy+167);
      dR(pcx-4,oy+158,8,8);dTc(pcx,oy+151,3,'DISJ. ABONNE '+typeRef[tt].c+'A');dL(pcx,oy+155,pcx,bY)}
    const{dp}=compPos(bD,dI,cL+13);
    const lB=dp[0].cx,rB=dp[dp.length-1].cx;
    if(iF&&iL)dL(lB,bY,rB,bY);
    else if(iF){dL(lB,bY,cR-15,bY);dAR(cR-15,bY)}
    else if(iL){dAL(cL+15,bY);dL(cL+15,bY,rB,bY)}
    else{dAL(cL+15,bY);dL(cL+15,bY,cR-15,bY);dAR(cR-15,bY)}
    dp.forEach(d=>{const{dep,di,cx:dcx}=d;
      dL(dcx,bY,dcx,bY-5);dTc(dcx,oy+130,3,'DEPART '+(di+1)+' - '+dep.mc+' mod');
      dR(dcx-10,oy+102,20,24);dTc(dcx,oy+121,2.8,'30mA');
      dL(dcx-6,oy+117,dcx+6,oy+117);dL(dcx,oy+117,dcx,oy+113);

        if(c.subs.length)c.subs.forEach(sn=>{const tx=ccx+13.4;dL(ccx,oy+70,tx,oy+70);dL(tx,oy+70,tx,oy+67);dR(tx-4,oy+57,8,10);dT(tx-3.2,oy+60,2.5,sn)});
        if(c.k==='rt'){dL(ccx,oy+68,ccx,oy+55);dR(ccx-15,oy+30,30,25);
          for(let sq=0;sq<5;sq++)dR(ccx-12+sq*5.5,oy+33,4,6);
          dTc(ccx,oy+25,1.8,'Gest. Energie')}
        dTc(ccx,oy+64,2.8,c.a+'A');dTc(ccx,oy+60,2.5,c.n)});
      dR(d.bs-_CS/2,oy+42,d.be-d.bs+_CS,6);
      dTc(dcx,oy+43.5,2,dep.mc+' mod (ID:2 + '+(dep.mc-2)+' disj)')});
    dT(cL+4,oy+17.6,2.5,'CALCUL CALIBRES ID','TITRE');
    dI.forEach((di,li)=>{const dep=bD[di];
      const p=dep.cir.map(c=>c.n+':'+c.a+'A').join(', ');
      dT(cL+4,oy+13.1-li*4,1.8,'DEP '+(di+1)+' ('+dep.type+'): '+p+'  =>  '+dep.fA+'+'+dep.hA+'/2 = '+Math.round(dep.mA)+'A  =>  ID '+dep.cal+'A','CALCUL')});
    // Footer
    [172.5,221.8,254.8].forEach(sx=>dL(cL+sx-_CL,oy+_CB,cL+sx-_CL,oy+4.1,'CADRE'));
    dT(cL+4,oy-8,2,"AL GOMES - Bureau d'Etudes Techniques Electricite");
    dLogo(ox,oy);
    const ds=new Date().toLocaleDateString('fr-FR');
    dTc(cL+(172.5+221.8)/2-_CL,oy-8,3.5,ds);
    dTc(cL+(221.8+254.8)/2-_CL,oy-8,3.5,tpn+'/'+tpt);
    dTc(cL+(254.8+_CR)/2-_CL,oy-8,3.5,'NF C 15-100');
  }

  // Generate all folios
  let curY=0,prevType=null,curX=0;
  sortedT.forEach(([type,cnt])=>{
    const ref=typeRef[type];
    if(!ref._deps){if(!b.typeAuto)b.typeAuto={};if(b.typeAuto[type]!==false)computeAutoDepsType(bi,type,ref)}
    const bD=buildDeps(ref);
    const totalMod=bD.reduce((s,d)=>s+d.mc,0);
    const rangees=Math.ceil(totalMod*1.2/13);
    const groups=splitDeps(bD);const nF=groups.length;
    if(prevType!==null)curY-=_CH+30;
    curX=0;
    groups.forEach((g,gi)=>{
      drawFolio(curX,curY,type,totalMod,rangees,bD,g,gi+1,nF,gi===0,gi===nF-1);
      curX+=_CW+20});
    prevType=type});

  // Assemble DXF R12
  let dxf='999\nDXF generated by AL GOMES - Tableau Abonne\n';
  dxf+='0\nSECTION\n2\nHEADER\n';
  dxf+='9\n$ACADVER\n1\nAC1009\n';
  dxf+='9\n$INSUNITS\n70\n4\n';
  dxf+='0\nENDSEC\n';
  dxf+='0\nSECTION\n2\nTABLES\n';
  dxf+='0\nTABLE\n2\nLAYER\n70\n6\n';
  ['CADRE','TITRE','TEXTE','SCHEMA','CALCUL','LOGO'].forEach(n=>{
    dxf+='0\nLAYER\n2\n'+n+'\n70\n0\n62\n7\n6\nCONTINUOUS\n'});
  dxf+='0\nENDTAB\n0\nENDSEC\n';
  dxf+='0\nSECTION\n2\nENTITIES\n'+ents+'0\nENDSEC\n';
  dxf+='0\nEOF\n';

  const blob=new Blob([dxf],{type:'application/dxf'});
  const url=URL.createObjectURL(blob);
  const aa=document.createElement('a');aa.href=url;
  aa.download=pName.replace(/[^a-zA-Z0-9_-]/g,'_')+'_'+b.n+'_TA.dxf';
  aa.click();URL.revokeObjectURL(url);
}

// ═══ AJOUT ALIM PERSONNALISEE ═══
function addAlim(){
  const name=prompt('Intitulé du circuit :');
  if(!name)return;
  const calStr=prompt('Calibre (A) :','20');
  if(!calStr)return;
  const cal=parseInt(calStr)||20;
  let idx=1;while(CIR.find(c=>c.k==='_a'+idx))idx++;
  const k='_a'+idx;
  CIR.push({k,n:name,a:cal+'A'});
  CIR_AMP[k]=cal;
  B.forEach(b=>b.a.forEach(ap=>{if(ap[k]===undefined)ap[k]=0}));
  R();
}
function removeAlim(k){
  if(!confirm('Supprimer la colonne "'+CIR.find(c=>c.k===k).n+'" ?'))return;
  const idx=CIR.findIndex(c=>c.k===k);
  if(idx>-1)CIR.splice(idx,1);
  delete CIR_AMP[k];
  B.forEach(b=>b.a.forEach(ap=>{delete ap[k]}));
  R();
}

R();
</script>
