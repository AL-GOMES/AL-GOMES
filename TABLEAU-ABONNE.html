<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#14161e;color:rgba(236,239,246,0.90);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px),
  repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px);background-size:4px 4px}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:linear-gradient(180deg,rgba(20,22,30,0.92) 0%,rgba(20,22,30,0.75) 100%);border-bottom:1px solid rgba(104,118,156,0.10);backdrop-filter:blur(12px)}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-center{display:flex;align-items:center;gap:16px}
.btn-top{display:flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(104,118,156,0.25);border-radius:6px;
  background:rgba(62,76,112,0.08);color:rgba(208,217,233,0.85);font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease;text-decoration:none}
.btn-top:hover{background:rgba(62,76,112,0.20);border-color:rgba(104,118,156,0.45);color:#EDF0F7}
.btn-top svg{width:14px;height:14px;opacity:0.7}
.topbar-sep{width:1px;height:18px;background:rgba(104,118,156,0.15)}
.topbar-title{font-size:14px;font-weight:600;color:rgba(236,239,246,0.9);letter-spacing:1px}
.topbar-clock{display:flex;align-items:center;gap:20px;color:rgba(208,217,233,0.6);font-size:13px}
.topbar-time{font-size:15px;font-weight:500;color:rgba(236,239,246,0.85);font-variant-numeric:tabular-nums;letter-spacing:1.5px}
.topbar-date{font-size:12.5px;color:rgba(190,199,219,0.50);letter-spacing:1px;text-transform:uppercase}
.badge-count{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;background:rgba(62,76,112,0.25);color:rgba(208,217,233,0.90);border:1px solid rgba(104,118,156,0.30)}

.tabs{position:fixed;top:48px;left:0;right:0;z-index:99;display:flex;gap:0;background:rgba(20,22,30,0.90);border-bottom:1px solid rgba(104,118,156,0.08);backdrop-filter:blur(8px);padding:0 24px}
.tab{padding:10px 22px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(190,199,219,0.40);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.3s}
.tab:hover{color:rgba(208,217,233,0.70)}
.tab.on{color:rgba(240,243,250,0.95);border-bottom-color:#7E7BCE}

.content{padding:90px 24px 40px;position:relative;z-index:1}

.card{border-radius:10px;border:1px solid rgba(104,118,156,0.10);background:linear-gradient(165deg,rgba(29,33,48,0.70) 0%,rgba(20,22,30,0.80) 100%);margin-bottom:18px;position:relative;overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;padding:14px 18px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(236,239,246,0.85);border-bottom:1px solid rgba(104,118,156,0.06)}
.card-h .rt{margin-left:auto;display:flex;align-items:center;gap:8px}
.card-b{padding:16px 18px;overflow-x:auto}

table{width:100%;border-collapse:collapse;white-space:nowrap}
th{text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(150,165,200,0.60);padding:6px 4px;border-bottom:1px solid rgba(104,118,156,0.12)}
td{padding:4px 3px;text-align:center;border-bottom:1px solid rgba(104,118,156,0.05);font-size:12px}
th.sep-l,td.sep-l{border-left:2px solid rgba(104,118,156,0.20)}
.fsep td{border-top:2px solid rgba(104,118,156,0.20)}
table tr:hover td{background:rgba(62,76,112,0.10)}
table tr.row-hl td{background:rgba(187,107,217,0.18)!important;box-shadow:inset 0 0 0 1px rgba(187,107,217,0.55)}
table tr.row-hl td:first-child{border-left:3px solid #BB6BD9!important}

input[type="number"]{background:rgba(29,33,48,0.6);border:1px solid rgba(104,118,156,0.10);border-radius:3px;color:rgba(236,239,246,0.90);padding:3px 2px;font-family:inherit;font-size:11px;text-align:center;width:38px;-moz-appearance:textfield}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus{outline:none;border-color:rgba(104,118,156,0.35)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:20px;color:rgba(190,199,219,0.30)}
.empty .ic-big{font-size:48px;opacity:0.4}
.empty .msg{font-size:14px;letter-spacing:1px;text-align:center;line-height:1.8}

.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;
  background:rgba(62,76,112,0.15);color:rgba(150,165,200,0.85);border:1px solid rgba(104,118,156,0.20)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(104,118,156,0.15);border-radius:3px}
</style>
