<script>
(function(){
  var fc={apiKey:"AIzaSyAXuLjl6_yZNB28anBGSPP6PptugpkDJ4k",authDomain:"algomes-a4e46.firebaseapp.com",projectId:"algomes-a4e46",storageBucket:"algomes-a4e46.firebasestorage.app",messagingSenderId:"827799257472",appId:"1:827799257472:web:b2248e501a5f72b63ec165"};
  if(!firebase.apps.length) firebase.initializeApp(fc);
  var auth=firebase.auth(), db=firebase.firestore();
  var page=window.location.pathname.split('/').pop()||'accueil.html';
  document.documentElement.style.visibility='hidden';
  auth.onAuthStateChanged(function(user){
    if(!user){window.location.href='index.html';return}
    db.collection('users').doc(user.uid).get().then(function(doc){
      if(!doc.exists){auth.signOut();window.location.href='index.html';return}
      var role=doc.data().role;
      db.collection('config').doc('pageAccess').get().then(function(cfgDoc){
        var access=cfgDoc.exists?cfgDoc.data():{};
        var allowed=access[page]||['admin','ingenieur','lecteur'];
        if(!allowed.includes(role)){
          document.documentElement.style.visibility='visible';
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:sans-serif;background:#0A0816"><div style="font-size:20px;color:#E74C3C;margin-bottom:12px">Accès refusé</div><div style="font-size:13px;color:#888;margin-bottom:20px">Votre rôle ('+role+') n\'a pas accès à cette page.</div><a href="accueil.html" style="color:#BB6BD9;font-size:14px">Retour à l\'accueil</a></div>';
          return;
        }
        document.documentElement.style.visibility='visible';
        window._algomesUser={uid:user.uid,role:role,login:doc.data().login,name:doc.data().name};
      }).catch(function(){document.documentElement.style.visibility='visible'});
    }).catch(function(){auth.signOut();window.location.href='index.html'});
  });
})();
</script>

<script>
function updateClock(){
  const now=new Date();
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('topTime').textContent=h+':'+m+':'+s;
  document.getElementById('topDate').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
}
updateClock();
setInterval(updateClock,1000);

function showBE(){
  document.getElementById('mainView').style.display='none';
  document.getElementById('beView').classList.add('on');
}
function showMain(){
  document.getElementById('beView').classList.remove('on');
  document.getElementById('mainView').style.display='';
}
</script>

// Show admin button only for admin users

    if(btn) btn.style.display='';
  } else {
    setTimeout(checkAdminBtn, 300);
  }
})();
</script>
