<style id="shell-override">
.topbar,.btn-admin,.topbar-clock,.topbar-left,.topbar-right,.topbar-center,.topbar-presence,.btn-topbar-logout{display:none!important;height:0!important}

<meta charset="UTF-8">

<title>A.L.GOMES — Entreprise</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0e0e10}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:48px;position:relative}
/* Carbon fiber */
body::before,body::after{content:'';position:absolute;inset:0;pointer-events:none}
body::before{background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px),repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.018) 1px,rgba(255,255,255,0.018) 2px);background-size:4px 4px}
body::after{background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px),repeating-linear-gradient(90deg,transparent 0px,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);background-size:4px 4px}
/* Top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:10;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:linear-gradient(180deg,rgba(14,14,16,0.92) 0%,rgba(14,14,16,0.75) 100%);border-bottom:1px solid rgba(123,95,172,0.10);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:16px}
.btn-admin{display:flex;align-items:center;gap:8px;padding:6px 18px;border:1px solid rgba(123,95,172,0.25);border-radius:6px;background:rgba(91,63,140,0.08);color:rgba(200,186,216,0.85);font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease}
.btn-admin:hover{background:rgba(91,63,140,0.20);border-color:rgba(123,95,172,0.45);color:#E8E0F2}
.btn-admin svg{width:14px;height:14px;opacity:0.7}
.topbar-clock{display:flex;align-items:center;gap:20px;font-family:'Segoe UI',system-ui,sans-serif;color:rgba(200,186,216,0.6);font-size:13px;letter-spacing:0.8px}
.topbar-time{font-size:15px;font-weight:500;color:rgba(220,210,235,0.85);font-variant-numeric:tabular-nums;letter-spacing:1.5px}
.topbar-date{font-size:12.5px;color:rgba(180,165,200,0.50);letter-spacing:1px;text-transform:uppercase}
.topbar-sep{width:1px;height:18px;background:rgba(123,95,172,0.15)}
/* Vignette */
.vignette{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 0%,rgba(6,4,12,0.65) 100%)}
/* Ambient glow */
.ambient-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);width:500px;height:340px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(91,63,140,0.08) 0%,rgba(91,63,140,0.03) 40%,transparent 70%);pointer-events:none;animation:ambientPulse 6s ease-in-out infinite}
@keyframes ambientPulse{0%,100%{opacity:0.8;transform:translate(-50%,-55%) scale(1)}50%{opacity:1;transform:translate(-50%,-55%) scale(1.06)}}
/* Logo container */
.logo-wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-top:40px}
.logo-float{animation:floatUp 4s ease-in-out infinite}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
/* Ground shadow */
.ground-shadow{width:320px;height:18px;margin-top:10px;border-radius:50%;background:radial-gradient(ellipse at center,rgba(91,63,140,0.30) 0%,rgba(30,17,56,0.10) 50%,transparent 80%);animation:shadowPulse 4s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{opacity:1;transform:scaleX(1) scaleY(1)}50%{opacity:0.45;transform:scaleX(0.82) scaleY(0.6)}}
/* Ground glow line */
.ground-glow{width:260px;height:1px;margin-top:4px;background:linear-gradient(90deg,transparent,rgba(123,95,172,0.18),transparent);animation:glowLine 4s ease-in-out infinite}
@keyframes glowLine{0%,100%{opacity:1;transform:scaleX(1)}50%{opacity:0.3;transform:scaleX(0.7)}}
/* Logo SVG styling */
.logo-svg{width:480px;max-width:90vw;height:auto;display:block;filter:drop-shadow(0 0 40px rgba(91,63,140,0.15))}

/* ═══════════════════════════════════════════════════════════════════════
   CARDS - Code couleur par catégorie (Option 1 conservatrice)
   Chaque carte définit ses couleurs via des CSS custom properties en
   style="..." inline. Le CSS générique consomme ces variables.
   ═══════════════════════════════════════════════════════════════════════ */
.cards-section{position:relative;z-index:2;display:flex;flex-wrap:wrap;justify-content:center;gap:22px;width:100%;max-width:820px;padding:0 24px;margin-top:50px;margin-bottom:60px}
.cards-section .card{flex:0 0 calc((100% - 44px) / 3)}

.card{
  --accent:#7B5DA8;
  --accent-bg:rgba(123,95,172,0.10);
  --accent-bg-strong:rgba(123,95,172,0.18);
  --accent-border:rgba(123,95,172,0.45);
  --accent-icon:rgba(160,140,195,0.95);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:24px 18px 22px;
  border-radius:10px;
  border:1px solid rgba(123,95,172,0.12);
  border-top:3px solid var(--accent);
  background:linear-gradient(165deg,rgba(22,18,32,0.85) 0%,rgba(14,14,16,0.90) 100%);
  cursor:pointer;
  transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.card::before{content:'';position:absolute;inset:0;border-radius:10px;background:repeating-linear-gradient(45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.012) 1px,rgba(255,255,255,0.012) 2px),repeating-linear-gradient(-45deg,transparent 0px,transparent 1px,rgba(255,255,255,0.012) 1px,rgba(255,255,255,0.012) 2px);background-size:4px 4px;pointer-events:none}
.card::after{content:'';position:absolute;top:3px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-bg-strong),transparent);pointer-events:none}
.card:hover{
  border-color:var(--accent-border);
  background:linear-gradient(165deg,var(--accent-bg) 0%,rgba(18,14,28,0.95) 100%);
  transform:translateY(-4px);
  box-shadow:0 8px 24px -10px var(--accent);
}
.card:hover .card-icon{transform:scale(1.08);background:var(--accent-bg-strong);border-color:var(--accent-border)}
.card:hover .card-label{color:#fff}
.card:hover .card-sub{color:rgba(220,210,235,0.85)}

.card-icon{
  position:relative;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:var(--accent-bg);
  border:1px solid var(--accent-bg-strong);
  color:var(--accent-icon);
  transition:all 0.35s ease;
}
.card-icon svg{width:24px;height:24px}

.card-label{
  position:relative;
  font-family:'Segoe UI',system-ui,sans-serif;
  font-size:14px;
  font-weight:600;
  letter-spacing:0.3px;
  text-align:center;
  color:rgba(232,224,242,0.92);
  line-height:1.35;
  transition:color 0.35s ease;
}

.card-sub{
  position:relative;
  font-family:'Segoe UI',system-ui,sans-serif;
  font-size:10.5px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  text-align:center;
  color:rgba(180,165,200,0.55);
  line-height:1.4;
  transition:color 0.35s ease;
}

.card{opacity:0;animation:cardIn 0.6s ease forwards}
.card:nth-child(1){animation-delay:0.3s}
.card:nth-child(2){animation-delay:0.42s}
.card:nth-child(3){animation-delay:0.54s}
.card:nth-child(4){animation-delay:0.66s}
.card:nth-child(5){animation-delay:0.78s}
.card:nth-child(6){animation-delay:0.90s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:760px){.cards-section{max-width:520px;gap:18px}.cards-section .card{flex:0 0 calc((100% - 18px) / 2)}}
@media(max-width:480px){.cards-section{max-width:300px}.cards-section .card{flex:0 0 100%}}

<script>
// ═══════════════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════════════
function updateClock(){
  const now=new Date();
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  const tTime = document.getElementById('topTime');
  const tDate = document.getElementById('topDate');
  if(tTime) tTime.textContent=h+':'+m+':'+s;
  if(tDate) tDate.textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
}
updateClock();
const _clockTimerId = setInterval(updateClock, 1000);
window.addEventListener('beforeunload', () => { try { clearInterval(_clockTimerId); } catch {} });

// ═══════════════════════════════════════════════════════════════════════
// NAVIGATION : utilise navigateTo() du shell si dispo, sinon redirection directe
// ═══════════════════════════════════════════════════════════════════════
function goTo(page){
  try {
    if(window.parent && window.parent !== window && window.parent.navigateTo){
      window.parent.navigateTo(page);
      return;
    }
  } catch(e){}
  location.href = page;
}

// ═══════════════════════════════════════════════════════════════════════
// ACCESS CONTROL : masque les vignettes auxquelles l'utilisateur n'a pas accès
// Lit config/pageAccess depuis Firestore (via l'instance Firebase du shell parent)
// et le rôle depuis window.parent._algomesUser
// ═══════════════════════════════════════════════════════════════════════

// Attend que _algomesUser soit prêt dans le shell parent en passant par
// window.parent.AlgomesShell.getUser() (Promise). Fallback sur l'ancien
// polling pour rester compatible si le shell n'a pas encore l'API.
function waitForUser(maxMs = 5000){
  return new Promise(resolve => {
    let done = false;
    const finish = (res) => { if (!done) { done = true; resolve(res); } };
    try {
      if (window.parent && window.parent !== window &&
          window.parent.AlgomesShell && window.parent.AlgomesShell.getUser) {
        window.parent.AlgomesShell.getUser().then(u => {
          try {
            const fb = window.parent.firebase;
            if (u && fb && fb.firestore) { finish({ user: u, fb }); return; }
          } catch {}
          finish(null);
        });
        setTimeout(() => finish(null), maxMs);
        return;
      }
    } catch {}
    // Fallback : polling court compatibilité ascendante
    const start = Date.now();
    (function poll(){
      try {
        const u = window.parent && window.parent._algomesUser;
        const fb = window.parent && window.parent.firebase;
        if (u && fb && fb.firestore) { finish({ user: u, fb }); return; }
      } catch {}
      if (Date.now() - start > maxMs) { finish(null); return; }
      setTimeout(poll, 100);
    })();
  });
}

(async function filterCards(){
  // En accès direct (hors shell), rien à filtrer
  let inShell = false;
  try { inShell = window.parent && window.parent !== window; } catch(e){}
  if(!inShell) return;

  const ctx = await waitForUser();
  if(!ctx){
    console.warn('[home] _algomesUser non disponible après 5s, filtrage ignoré');
    return;
  }
  const { user, fb } = ctx;

  try {
    const doc = await fb.firestore().collection('config').doc('pageAccess').get();
    if(!doc.exists) return;
    const access = doc.data() || {};
    const role = user.role;

    // Fonction : la page pageId est-elle accessible pour ce rôle ?
    function canAccess(pageId){
      const allowed = access[pageId];
      // Si aucune config pour cette page → défaut = tous les rôles ont accès
      if(!Array.isArray(allowed)) return true;
      return allowed.includes(role);
    }

    // Filtrer les vignettes du bandeau principal
    document.querySelectorAll('#mainCards .card').forEach(card => {
      const pageId = card.dataset.page;
      const childrenAttr = card.dataset.children;
      if(pageId === '__BE__' && childrenAttr){
        // Vignette "Bureau d'études" : visible si AU MOINS UNE page enfant est accessible
        const children = childrenAttr.split(',').map(s => s.trim()).filter(Boolean);
        const anyVisible = children.some(canAccess);
        if(!anyVisible) card.style.display = 'none';
      } else if(pageId && !canAccess(pageId)){
        card.style.display = 'none';
      }
    });

    // Filtrer les vignettes du bandeau Bureau d'études
    document.querySelectorAll('#beCards .be-card').forEach(card => {
      const pageId = card.dataset.page;
      if(pageId && !canAccess(pageId)) card.style.display = 'none';
    });

    // Bouton admin : visible uniquement pour les rôles admin
    const isAdmin = role === 'admin' || role === 'patron_al_gomes';
    const btnAdmin = document.getElementById('btn-admin');
    if (btnAdmin && isAdmin) btnAdmin.style.display = '';

    // Si toutes les vignettes du bandeau principal sont masquées, afficher un message
    const visibleMain = [...document.querySelectorAll('#mainCards .card')].filter(c => c.style.display !== 'none');
    if(visibleMain.length === 0){
      const section = document.getElementById('mainCards');
      if(section){
        section.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(180,165,200,0.55);padding:40px 20px;font-family:\'Segoe UI\',system-ui,sans-serif;font-size:13px;letter-spacing:1px">Aucune application accessible avec votre rôle.<br>Contactez l\'administrateur.</div>';
      }
    }
  } catch(e){
    console.warn('Filtrage des accès échoué', e);
  }
})();

// ═══════════════════════════════════════════════════════════════════════
// SWITCH MAIN / BE VIEW

function showBE(){
  document.getElementById('mainView').style.display='none';
  document.getElementById('beView').classList.add('on');
}
function showMain(){
  document.getElementById('beView').classList.remove('on');
  document.getElementById('mainView').style.display='';
}
