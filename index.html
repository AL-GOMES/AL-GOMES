<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/img/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://api.github.com https://ipapi.co https://dns.google https://tile.openstreetmap.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'self' blob: data:; frame-src 'self' blob: data:; media-src 'self' blob: data:; worker-src 'self' blob:;">
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.L.GOMES — Connexion</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" integrity="sha384-sEVIly94UBRLKWdkYoPpSG7GD/e79YHMrxVyZaOk712Ga7+EAw6w1EFi+xBzBdd+" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" integrity="sha384-EkqK+ezBWJuvO3hfrSx2iVqr3YQbhmnzn8kPhOpBZ+0GMVU5oGSgptwIu8D84HjE" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" integrity="sha384-M481iNZJtbpypKgvlvZ+78Giq0BsewFLk5r2k+MOcGXlwKCc27DQRZ+WCV/zpmpC" crossorigin="anonymous"></script>
<script src="js/firebase-init.js"></script>
<script src="js/util.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;background:#14161e;overflow:hidden;position:relative}
  body::before{content:'';position:fixed;inset:0;background:repeating-conic-gradient(#111 0% 25%,#14161e 0% 50%) 0 0/4px 4px,radial-gradient(ellipse at 30% 20%,rgba(135,120,215,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(80,30,200,.06) 0%,transparent 60%);z-index:0}
  body::after{content:'';position:fixed;inset:0;background:linear-gradient(90deg,rgba(135,120,215,.03) 1px,transparent 1px),linear-gradient(0deg,rgba(135,120,215,.03) 1px,transparent 1px);background-size:60px 60px;z-index:0;animation:gridPulse 8s ease-in-out infinite}
  @keyframes gridPulse{0%,100%{opacity:.3}50%{opacity:.7}}
  .login-container{position:relative;z-index:1;width:420px;max-width:94vw}
  .login-card{background:linear-gradient(145deg,rgba(18,18,30,.95),rgba(20,22,30,.98));border:1px solid rgba(135,120,215,.2);border-radius:16px;padding:44px 40px;backdrop-filter:blur(20px);box-shadow:0 0 40px rgba(135,120,215,.08),0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);animation:cardAppear .8s cubic-bezier(.16,1,.3,1)}
  @keyframes cardAppear{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .logo-section{text-align:center;margin-bottom:32px}
  .logo-icon{width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,#8378d0,#5a1ecc);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(135,120,215,.3);animation:logoPulse 3s ease-in-out infinite}
  @keyframes logoPulse{0%,100%{box-shadow:0 4px 20px rgba(135,120,215,.3)}50%{box-shadow:0 4px 30px rgba(135,120,215,.5)}}
  .logo-title{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#fff,#B0A8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-subtitle{font-size:13px;color:rgba(180,160,255,.5);letter-spacing:6px;text-transform:uppercase;margin-top:6px;font-weight:300}
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:12px;font-weight:600;color:rgba(180,160,255,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .input-wrapper{position:relative}
  .input-wrapper .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;transition:opacity .3s}
  .form-group input{width:100%;padding:14px 16px 14px 44px;background:rgba(135,120,215,.06);border:1px solid rgba(135,120,215,.15);border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;color:#EAEDF6;outline:none;transition:all .3s}
  .form-group input::placeholder{color:rgba(180,160,255,.25)}
  .form-group input:focus{border-color:rgba(135,120,215,.5);background:rgba(135,120,215,.1);box-shadow:0 0 20px rgba(135,120,215,.1)}
  .input-wrapper:focus-within .icon{opacity:.8}
  .btn-login{width:100%;padding:15px;margin-top:8px;background:linear-gradient(135deg,#8378d0,#5a1ecc);border:none;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;color:#fff;cursor:pointer;transition:all .3s;text-transform:uppercase;position:relative;overflow:hidden}
  .btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.1),transparent);transform:translateX(-100%);transition:transform .5s}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(135,120,215,.4)}
  .btn-login:hover::before{transform:translateX(100%)}
  .btn-login:active{transform:translateY(0)}
  .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
  .msg{text-align:center;font-size:14px;font-weight:500;margin-top:14px;min-height:20px;opacity:0;transition:opacity .3s}
  .msg.visible{opacity:1}
  .msg.error{color:#ff4466;animation:shake .4s ease}
  .msg.success{color:#22c55e}
  .msg.info{color:#B0A8E8}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}
  .footer-text{text-align:center;margin-top:20px;font-size:11px;color:rgba(180,160,255,.25);letter-spacing:1px}
  .setup-badge{display:none;text-align:center;margin-bottom:16px;padding:10px 16px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:8px;color:#4ade80;font-size:13px;font-weight:500;letter-spacing:1px}
  .setup-badge.visible{display:block;animation:cardAppear .5s ease}
  .particle{position:fixed;width:2px;height:2px;background:rgba(135,120,215,.4);border-radius:50%;z-index:0;animation:float linear infinite}
  @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
  .loading-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(10,10,15,.95);align-items:center;justify-content:center;flex-direction:column}
  .loading-overlay.active{display:flex}
  .spinner{width:48px;height:48px;border:3px solid rgba(135,120,215,.15);border-top-color:#8378d0;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{margin-top:16px;color:#B0A8E8;font-size:14px;letter-spacing:2px}
</style>
</head>
<body oncontextmenu="return false">

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Vérification...</div>
</div>

<script>for(let i=0;i<25;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'vw';p.style.animationDuration=(6+Math.random()*10)+'s';p.style.animationDelay=(Math.random()*8)+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';document.body.appendChild(p)}</script>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">⚡</div>
      <div class="logo-title">A.L.GOMES</div>
      <div class="logo-subtitle">Bureau d'études</div>
    </div>

    <div class="setup-badge" id="setupBadge">🔧 Premier lancement — Création du compte administrateur</div>

    <div class="form-group">
      <label>Identifiant</label>
      <div class="input-wrapper">
        <span class="icon">👤</span>
        <input type="text" id="login" placeholder="Votre identifiant" autocomplete="username" autofocus>
      </div>
    </div>

    <div class="form-group" id="nameGroup" style="display:none">
      <label>Nom complet</label>
      <div class="input-wrapper">
        <span class="icon">📝</span>
        <input type="text" id="displayName" placeholder="Prénom Nom" autocomplete="name">
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Connexion</button>

    <div class="msg" id="msg"></div>
    <div class="footer-text">Accès réservé — A.L.GOMES © 2026</div>
  </div>
</div>

<script>
// ============================================================
// FIREBASE — auth et db sont initialisés par js/firebase-init.js
// (window.auth, window.db). On garde des const locales pour
// la lisibilité du reste du fichier.
// ============================================================
// (firebase déjà initialisé par firebase-init.js)

// Convertit un login en faux email pour Firebase Auth
function toEmail(login) {
  return login.toLowerCase().trim().replace(/\s+/g, '') + '@algomes.local';
}

let isSetupMode = false;

// ============================================================
// CHECK IF ALREADY LOGGED IN
// ============================================================
document.getElementById('loadingOverlay').classList.add('active');

auth.onAuthStateChanged(async (user) => {
  if (user) {
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) {
        // Tous les utilisateurs vont vers accueil.html — le routage par rôle
        // est ensuite géré par auth-guard.js et l'access control des pages.
        window.location.href = 'accueil.html?v=' + Date.now();
        return;
      }
    } catch(e) { console.error(e); }
  }
  // Pas d'utilisateur connecté : on est sur la page de login après un logout
  // ou sur un poste partagé. On purge les données sensibles éventuellement
  // laissées par la session précédente (tokens admin, buffer console).
  try { if (window.AlgomesPurgeSensitive) window.AlgomesPurgeSensitive(); } catch (e) {}
  document.getElementById('loadingOverlay').classList.remove('active');
  checkSetupMode();
});

// ============================================================
// CHECK IF FIRST USER (SETUP MODE)
// ============================================================
async function checkSetupMode() {
  try {
    const snap = await db.collection('users').limit(1).get();
    if (snap.empty) {
      isSetupMode = true;
      document.getElementById('setupBadge').classList.add('visible');
      document.getElementById('nameGroup').style.display = 'block';
      document.getElementById('btnLogin').textContent = 'CRÉER LE COMPTE ADMIN';
    }
  } catch(e) {
    // Sans authentification, les rules Firestore refusent la lecture de
    // /users — c'est attendu et sans impact (on n'est juste pas en mode
    // 'first setup'). On log en warn discret au lieu d'error pour ne pas
    // polluer la console.
    if (e && e.code === 'permission-denied') {
      console.warn('checkSetupMode skipped (Firestore rules require auth)');
    } else {
      console.error('Erreur Firestore:', e);
    }
  }
}

// ============================================================
// HANDLE LOGIN / SETUP
// ============================================================
async function handleLogin() {
  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const msg = document.getElementById('msg');

  msg.className = 'msg';

  if (!login || !password) {
    showMsg('Veuillez remplir tous les champs', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'VÉRIFICATION...';

  const email = toEmail(login);

  try {
    if (isSetupMode) {
      const name = document.getElementById('displayName').value.trim() || login;

      // Validation stricte du login admin : alphanumérique + . _ - uniquement
      if (!/^[a-z0-9._-]{2,32}$/i.test(login)) {
        showMsg('Identifiant invalide (2-32 car., lettres/chiffres/._- uniquement)', 'error');
        btn.disabled = false;
        btn.textContent = 'CRÉER LE COMPTE ADMIN';
        return;
      }

      if (password.length < 6) {
        showMsg('Le mot de passe doit contenir au moins 6 caractères', 'error');
        btn.disabled = false;
        btn.textContent = 'CRÉER LE COMPTE ADMIN';
        return;
      }

      const cred = await auth.createUserWithEmailAndPassword(email, password);
      await cred.user.updateProfile({ displayName: name });
      
      await db.collection('users').doc(cred.user.uid).set({
        login: login.toLowerCase().trim(),
        name: name,
        role: 'admin',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdBy: 'setup'
      });

      await db.collection('config').doc('pageAccess').set({
        'accueil.html':              ['admin', 'conducteur', 'lecteur'],
        'Derivations-TGBT.html':     ['admin', 'conducteur'],
        'CALCUL_SECTION_CABLE.html': ['admin', 'conducteur'],
        'TABLEAU-ABONNE.html':       ['admin', 'conducteur'],
        'ATTESTATIONS.html':         ['admin', 'conducteur'],
        'HISTORIQUE-ATTESTATIONS.html': ['admin', 'conducteur'],
        'PLANNING.html':             ['admin', 'conducteur'],
        'AUTOCONTROLE.html':         ['admin', 'conducteur'],
        'liseuse-normes.html':       ['admin', 'conducteur', 'lecteur'],
        'admin.html':                ['admin']
      });

      await db.collection('config').doc('roles').set({
        list: [
          { id: 'admin', label: 'Administrateur', color: '#8378d0' },
          { id: 'conducteur', label: 'Conducteur de travaux', color: '#22c55e' },
          { id: 'lecteur', label: 'Lecteur', color: '#f59e0b' }
        ]
      });

      showMsg('Compte admin créé !', 'success');
      btn.textContent = '✓ CONNECTÉ';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
      setTimeout(() => { window.location.href = 'accueil.html?v=' + Date.now(); }, 800);

    } else {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      const doc = await db.collection('users').doc(cred.user.uid).get();

      if (!doc.exists) {
        await auth.signOut();
        showMsg('Compte non autorisé. Contactez l\'administrateur.', 'error');
        btn.disabled = false;
        btn.textContent = 'CONNEXION';
        return;
      }

      // Vérification IP bannie
      try {
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        if (geo && geo.ip) {
          const ipDocId = String(geo.ip).replace(/[.:]/g, '_');
          const banDoc = await db.collection('bannedIps').doc(ipDocId).get();
          if (banDoc.exists) {
            await auth.signOut();
            showMsg('Connexion refusée : votre adresse IP est bloquée.', 'error');
            btn.disabled = false;
            btn.textContent = 'CONNEXION';
            return;
          }
        }
      } catch (_) { /* erreur réseau geoloc : on laisse passer */ }

      showMsg('Connexion réussie !', 'success');
      btn.textContent = '✓ CONNECTÉ';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

      setTimeout(() => {
        window.location.href = 'accueil.html?v=' + Date.now();
      }, 600);
    }
  } catch(error) {
    btn.disabled = false;
    btn.textContent = isSetupMode ? 'CRÉER LE COMPTE ADMIN' : 'CONNEXION';
    
    const messages = {
      'auth/invalid-email': 'Identifiant invalide',
      // Réponse identique pour user-not-found et wrong-password : évite l'énumération de comptes
      'auth/user-not-found': 'Identifiant ou mot de passe incorrect',
      'auth/wrong-password': 'Identifiant ou mot de passe incorrect',
      'auth/invalid-credential': 'Identifiant ou mot de passe incorrect',
      'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
      'auth/email-already-in-use': 'Cet identifiant est déjà utilisé',
      'auth/weak-password': 'Le mot de passe doit contenir au moins 6 caractères'
    };
    showMsg(messages[error.code] || 'Erreur : ' + error.message, 'error');
  }
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg visible ' + type;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
