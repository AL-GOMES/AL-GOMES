<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.L.GOMES — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    background: #0a0a0f;
    overflow: hidden;
    position: relative;
  }

  /* Carbon fiber background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-conic-gradient(#111 0% 25%, #0d0d12 0% 50%) 0 0 / 4px 4px,
      radial-gradient(ellipse at 30% 20%, rgba(120, 50, 255, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(80, 30, 200, 0.06) 0%, transparent 60%);
    z-index: 0;
  }

  /* Animated grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(120, 50, 255, 0.03) 1px, transparent 1px),
      linear-gradient(0deg, rgba(120, 50, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
    animation: gridPulse 8s ease-in-out infinite;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .login-container {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 92vw;
  }

  .login-card {
    background: linear-gradient(145deg, rgba(18, 18, 30, 0.95), rgba(10, 10, 18, 0.98));
    border: 1px solid rgba(120, 50, 255, 0.2);
    border-radius: 16px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 40px rgba(120, 50, 255, 0.08),
      0 20px 60px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-section {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, #7832ff, #5a1ecc);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 20px rgba(120, 50, 255, 0.3);
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(120, 50, 255, 0.3); }
    50% { box-shadow: 0 4px 30px rgba(120, 50, 255, 0.5); }
  }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 0%, #b388ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-subtitle {
    font-size: 13px;
    color: rgba(180, 160, 255, 0.5);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 300;
  }

  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: rgba(180, 160, 255, 0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.4;
    transition: opacity 0.3s;
  }

  .form-group input {
    width: 100%;
    padding: 14px 16px 14px 46px;
    background: rgba(120, 50, 255, 0.06);
    border: 1px solid rgba(120, 50, 255, 0.15);
    border-radius: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: #e0d8ff;
    outline: none;
    transition: all 0.3s ease;
  }

  .form-group input::placeholder {
    color: rgba(180, 160, 255, 0.25);
  }

  .form-group input:focus {
    border-color: rgba(120, 50, 255, 0.5);
    background: rgba(120, 50, 255, 0.1);
    box-shadow: 0 0 20px rgba(120, 50, 255, 0.1);
  }

  .form-group input:focus ~ .icon,
  .form-group input:focus + .icon {
    opacity: 0.8;
  }

  .input-wrapper:focus-within .icon {
    opacity: 0.8;
  }

  .btn-login {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: linear-gradient(135deg, #7832ff, #5a1ecc);
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(120, 50, 255, 0.4);
  }

  .btn-login:hover::before {
    transform: translateX(100%);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .error-msg {
    text-align: center;
    color: #ff4466;
    font-size: 14px;
    font-weight: 500;
    margin-top: 16px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .error-msg.visible {
    opacity: 1;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-4px); }
  }

  /* Particules décoratives */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: rgba(120, 50, 255, 0.4);
    border-radius: 50%;
    z-index: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: rgba(180, 160, 255, 0.25);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- Particules -->
<script>
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (6 + Math.random() * 10) + 's';
  p.style.animationDelay = (Math.random() * 8) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
  document.body.appendChild(p);
}
</script>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon">⚡</div>
      <div class="logo-title">A.L.GOMES</div>
      <div class="logo-subtitle">Bureau d'études</div>
    </div>

    <div class="form-group">
      <label>Identifiant</label>
      <div class="input-wrapper">
        <span class="icon">👤</span>
        <input type="text" id="login" placeholder="Votre identifiant" autocomplete="username" autofocus>
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrapper">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="attemptLogin()">Connexion</button>

    <div class="error-msg" id="errorMsg">Identifiant ou mot de passe incorrect</div>

    <div class="footer-text">Accès réservé — A.L.GOMES © 2026</div>
  </div>
</div>

<script>
  // ---- CONFIGURATION ----
  // Login attendu (en clair, pas critique)
  const VALID_LOGIN = 'admin';

  // Mot de passe hashé en SHA-256 (MonMotDePasse2026)
  // Pour changer le mot de passe : remplacer ce hash
  const VALID_PASS_HASH = 'bc5b8ee78e111bfc8dd0bb1b479a5ce1edf5d775adeb9167ad4307948d3861ba';

  // Page vers laquelle rediriger après connexion
  const REDIRECT_URL = 'accueil.html';

  // Clé de session localStorage
  const SESSION_KEY = 'algomes_auth';
  const SESSION_EXPIRY_KEY = 'algomes_auth_expiry';
  const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24h en ms

  // ---- VÉRIFIER SI DÉJÀ CONNECTÉ ----
  (function checkSession() {
    const session = localStorage.getItem(SESSION_KEY);
    const expiry = localStorage.getItem(SESSION_EXPIRY_KEY);
    if (session === 'authenticated' && expiry && Date.now() < parseInt(expiry)) {
      window.location.href = REDIRECT_URL;
    }
  })();

  // ---- HASH SHA-256 ----
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ---- TENTATIVE DE CONNEXION ----
  async function attemptLogin() {
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('btnLogin');

    errorMsg.classList.remove('visible');

    if (!login || !password) {
      errorMsg.textContent = 'Veuillez remplir tous les champs';
      errorMsg.classList.add('visible');
      return;
    }

    btn.textContent = 'VÉRIFICATION...';
    btn.disabled = true;

    const passHash = await sha256(password);

    if (login === VALID_LOGIN && passHash === VALID_PASS_HASH) {
      // Succès
      localStorage.setItem(SESSION_KEY, 'authenticated');
      localStorage.setItem('algomes_session', JSON.stringify({user: VALID_LOGIN, role: 'admin', ts: Date.now()}));
      localStorage.setItem(SESSION_EXPIRY_KEY, (Date.now() + SESSION_DURATION).toString());
      btn.textContent = '✓ CONNECTÉ';
      btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
      setTimeout(() => { window.location.href = REDIRECT_URL; }, 600);
    } else {
      // Échec
      errorMsg.textContent = 'Identifiant ou mot de passe incorrect';
      errorMsg.classList.add('visible');
      btn.textContent = 'CONNEXION';
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  // ---- ENTER POUR VALIDER ----
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') attemptLogin();
  });
</script>

</body>
</html>
